<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizzy Pro • Unit 3: The Data Link Layer (30 MCQs)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Inter:wght@400;500;600&display=swap');
       
        :root {
            --primary: 103 232 249;
        }
       
        body {
            font-family: 'Inter', system_ui, sans-serif;
        }
       
        .title-font {
            font-family: 'Poppins', sans-serif;
        }
        .option-btn {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
       
        .option-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 15px -3px rgb(103 232 249 / 0.3);
        }
       
        .option-btn.selected-correct {
            background-color: #10b981;
            color: white;
            border-color: #10b981;
        }
       
        .option-btn.selected-wrong {
            background-color: #ef4444;
            color: white;
            border-color: #ef4444;
        }
       
        .option-btn.correct {
            background-color: #10b981;
            color: white;
            border-color: #10b981;
        }
       
        .progress-bar {
            transition: width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .modal {
            animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
       
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .question-card {
            animation: fadeSlide 0.4s ease forwards;
        }
       
        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200 min-h-screen">
    <div class="max-w-3xl mx-auto">
        <!-- HEADER -->
        <header class="bg-gradient-to-r from-cyan-600 to-teal-600 text-white shadow-2xl">
            <div class="px-6 py-5 flex items-center justify-between">
                <div class="flex items-center gap-x-4">
                    <div class="w-12 h-12 bg-white/20 backdrop-blur-md rounded-3xl flex items-center justify-center text-4xl shadow-inner">
                        📡
                    </div>
                    <div>
                        <h1 class="title-font text-3xl font-semibold tracking-tighter">Quizzy Pro</h1>
                        <p class="text-cyan-100 text-sm font-medium -mt-1">Unit 3: The Data Link Layer (30 MCQs)</p>
                    </div>
                </div>
                <div onclick="restartQuiz()"
                     class="flex items-center gap-x-2 bg-white/20 hover:bg-white/30 transition-colors px-5 py-2.5 rounded-3xl text-sm font-semibold cursor-pointer">
                    <i class="fas fa-redo"></i>
                    <span>Restart</span>
                </div>
            </div>
           
            <!-- PROGRESS -->
            <div class="h-2 bg-black/30 relative">
                <div id="progress-bar"
                     class="progress-bar h-2 bg-white rounded-r-full w-0"></div>
            </div>
        </header>
        <!-- QUIZ CONTAINER -->
        <div id="quiz-screen" class="p-6">
            <div class="flex justify-center items-center mb-8">
                <div class="px-5 py-1.5 bg-zinc-900 rounded-3xl text-sm font-mono font-medium text-cyan-400" id="question-counter">1 / 30</div>
            </div>
            <!-- QUESTION -->
            <div id="question-card" class="question-card bg-zinc-900 rounded-3xl p-8 shadow-2xl border border-zinc-800">
                <p id="question-text" class="text-2xl leading-tight font-medium text-white"></p>
               
                <!-- OPTIONS -->
                <div id="options-container" class="mt-10 space-y-4"></div>
            </div>
            <!-- NAVIGATION -->
            <div class="flex gap-4 mt-10">
                <button onclick="prevQuestion()"
                        id="btn-prev"
                        class="flex-1 bg-zinc-900 hover:bg-zinc-800 transition-colors text-white font-semibold py-5 rounded-3xl flex items-center justify-center gap-x-3 shadow-inner">
                    <i class="fas fa-chevron-left"></i>
                    <span>Previous</span>
                </button>
               
                <button onclick="nextQuestion()"
                        id="btn-next"
                        class="flex-1 bg-gradient-to-r from-cyan-500 to-teal-500 hover:from-cyan-400 hover:to-teal-400 transition-all font-semibold py-5 rounded-3xl flex items-center justify-center gap-x-3 shadow-lg shadow-cyan-500/30">
                    <span id="next-text">Next</span>
                    <i class="fas fa-chevron-right"></i>
                </button>
            </div>
        </div>
        <!-- RESULTS SCREEN -->
        <div id="results-screen" class="hidden p-6">
            <div class="bg-zinc-900 rounded-3xl p-10 text-center">
                <div id="trophy" class="mx-auto w-32 h-32 flex items-center justify-center text-8xl mb-6"></div>
               
                <h2 class="text-6xl font-bold text-white mb-1" id="score">92</h2>
                <p class="text-cyan-400 text-2xl font-semibold">Score • <span id="percentage">92</span>%</p>
               
                <div class="grid grid-cols-3 gap-6 mt-12">
                    <div class="bg-zinc-800 rounded-3xl p-6">
                        <div class="flex items-center justify-center gap-x-3 text-emerald-400">
                            <i class="fas fa-check-circle text-3xl"></i>
                        </div>
                        <div id="correct-count" class="text-5xl font-bold mt-4 text-white">28</div>
                        <div class="text-zinc-400 text-sm font-medium mt-1">CORRECT</div>
                    </div>
                    <div class="bg-zinc-800 rounded-3xl p-6">
                        <div class="flex items-center justify-center gap-x-3 text-red-400">
                            <i class="fas fa-times-circle text-3xl"></i>
                        </div>
                        <div id="incorrect-count" class="text-5xl font-bold mt-4 text-white">1</div>
                        <div class="text-zinc-400 text-sm font-medium mt-1">INCORRECT</div>
                    </div>
                    <div class="bg-zinc-800 rounded-3xl p-6">
                        <div class="flex items-center justify-center gap-x-3 text-amber-400">
                            <i class="fas fa-forward text-3xl"></i>
                        </div>
                        <div id="skipped-count" class="text-5xl font-bold mt-4 text-white">1</div>
                        <div class="text-zinc-400 text-sm font-medium mt-1">SKIPPED</div>
                    </div>
                </div>
                <div class="mt-10 bg-zinc-800/70 rounded-3xl p-8 text-left">
                    <p id="insight-text" class="text-zinc-300 leading-relaxed text-lg"></p>
                </div>
                <div class="flex flex-col sm:flex-row gap-4 mt-12">
                    <button onclick="showReviewModal()"
                            class="flex-1 py-6 bg-white text-zinc-900 rounded-3xl font-semibold flex items-center justify-center gap-x-3 hover:scale-105 transition-transform">
                        <i class="fas fa-list-check"></i>
                        REVIEW ALL ANSWERS
                    </button>
                   
                    <button onclick="shareResults()"
                            class="flex-1 py-6 bg-zinc-800 hover:bg-zinc-700 rounded-3xl font-semibold flex items-center justify-center gap-x-3 transition-colors">
                        <i class="fas fa-share-nodes"></i>
                        SHARE RESULT
                    </button>
                </div>
               
                <button onclick="restartQuiz()"
                        class="mt-6 w-full py-5 text-cyan-400 font-medium flex items-center justify-center gap-x-2 hover:text-cyan-300">
                    <i class="fas fa-rotate"></i>
                    <span>Restart Quiz</span>
                </button>
            </div>
        </div>
    </div>
    <!-- REVIEW MODAL -->
    <div id="review-modal" onclick="if(event.target.id==='review-modal')hideReviewModal()"
         class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
        <div onclick="event.stopImmediatePropagation()"
             class="modal bg-zinc-900 w-full max-w-2xl max-h-[85vh] rounded-3xl shadow-2xl flex flex-col">
            <div class="px-8 py-6 border-b border-zinc-700 flex items-center justify-between">
                <div class="font-semibold text-xl">Review All Answers</div>
                <button onclick="hideReviewModal()"
                        class="w-9 h-9 flex items-center justify-center text-3xl leading-none text-zinc-400 hover:text-white">×</button>
            </div>
           
            <div id="review-list" class="flex-1 overflow-auto p-6 space-y-8"></div>
           
            <div class="p-6 border-t border-zinc-700">
                <button onclick="hideReviewModal()"
                        class="w-full py-5 bg-cyan-500 hover:bg-cyan-400 transition-colors rounded-3xl text-white font-semibold">
                    Close Review
                </button>
            </div>
        </div>
    </div>
    <script>
        const originalQuestions = [
            { question: "Which sublayer of the Data Link Layer is responsible for physical addressing and access control?", options: ["Logical Link Control (LLC)", "Media Access Control (MAC)", "Network Layer", "Transport Layer"], answer: 1 },
            { question: "What is the PDU of the Data Link Layer?", options: ["Packet", "Frame", "Segment", "Datagram"], answer: 1 },
            { question: "Which framing technique uses bit stuffing to prevent flag patterns in data?", options: ["Character-oriented framing", "Bit-oriented framing", "Fixed-size framing", "Variable-size framing without stuffing"], answer: 1 },
            { question: "In HDLC, what is the purpose of the FCS field?", options: ["To carry user data", "Error detection using CRC", "To indicate frame type", "To carry sequence numbers"], answer: 1 },
            { question: "Which ARQ protocol retransmits only the lost frame and allows out-of-order acceptance?", options: ["Go-Back-N ARQ", "Selective Repeat ARQ", "Stop-and-Wait ARQ", "Simple Protocol"], answer: 1 },
            { question: "The vulnerable period in Pure ALOHA is:", options: ["Equal to frame transmission time", "Twice the frame transmission time", "Half the frame transmission time", "Zero"], answer: 1 },
            { question: "What problem does CSMA/CA solve that CSMA/CD cannot in wireless networks?", options: ["Hidden terminal problem", "Exposed terminal problem", "Both hidden and exposed terminal problems", "None"], answer: 0 },
            { question: "Which protocol is used for link establishment and configuration in PPP?", options: ["NCP", "LCP", "HDLC", "IPCP"], answer: 1 },
            { question: "In Token Ring, the frame is removed by:", options: ["The receiver", "The sender after full circulation", "The monitor station", "The next station"], answer: 1 },
            { question: "IEEE 802.1Q tagging is used for:", options: ["Identifying VLANs on trunk links", "Error detection", "Flow control", "Token passing"], answer: 0 },
            { question: "What is the maximum throughput of Slotted ALOHA?", options: ["18.4%", "36.8%", "50%", "100%"], answer: 1 },
            { question: "Which flow control method allows the sender to transmit multiple frames before receiving an ACK?", options: ["Stop-and-Wait", "Sliding Window", "Simple Protocol", "None"], answer: 1 },
            { question: "The MAC sublayer in IEEE 802 handles:", options: ["Logical addressing", "Physical addressing and access control", "Routing", "End-to-end delivery"], answer: 1 },
            { question: "In Ethernet, the minimum frame size is 64 bytes to ensure:", options: ["Error detection", "Collision detection in CSMA/CD", "Flow control", "Address resolution"], answer: 1 },
            { question: "FDDI uses which access method?", options: ["CSMA/CD", "Token passing with dual rings", "CSMA/CA", "Polling"], answer: 1 },
            { question: "Which Bluetooth topology allows a device to be master in one piconet and slave in another?", options: ["Piconet", "Scatternet", "Mesh", "Star"], answer: 1 },
            { question: "VLANs are defined by which standard?", options: ["IEEE 802.3", "IEEE 802.1Q", "IEEE 802.11", "IEEE 802.15"], answer: 1 },
            { question: "In CSMA/CD, after a collision the station waits for a time based on:", options: ["Fixed delay", "Binary exponential backoff", "Random fixed time", "No wait"], answer: 1 },
            { question: "Which protocol uses RTS/CTS to solve the hidden terminal problem?", options: ["CSMA/CD", "CSMA/CA", "Token Ring", "ALOHA"], answer: 1 },
            { question: "The LLC sublayer provides:", options: ["Physical addressing", "Multiplexing and flow/error control for upper layers", "Token management", "Collision detection"], answer: 1 },
            { question: "In PPP, authentication is handled by:", options: ["LCP", "NCP", "IPCP only", "HDLC"], answer: 0 },
            { question: "Token Bus combines which two topologies?", options: ["Star and ring", "Bus physical with ring logical", "Mesh and star", "Ring physical with bus logical"], answer: 1 },
            { question: "Which multiplexing technique divides the channel by frequency bands?", options: ["TDMA", "FDMA", "CDMA", "Statistical TDM"], answer: 1 },
            { question: "The active monitor in Token Ring is responsible for:", options: ["Token generation and lost token recovery", "Data transmission only", "Address resolution", "Error correction"], answer: 0 },
            { question: "In VLANs, inter-VLAN communication requires:", options: ["A switch only", "A router or Layer-3 switch", "No device", "Only wireless AP"], answer: 1 },
            { question: "Which error detection method treats data as a polynomial and uses CRC?", options: ["Parity check", "Checksum", "Cyclic Redundancy Check", "Hamming code"], answer: 2 },
            { question: "Bluetooth Low Energy (BLE) was introduced in which version?", options: ["1.2", "2.0", "4.0", "5.0"], answer: 2 },
            { question: "The maximum number of active slaves in a Bluetooth piconet is:", options: ["7", "15", "31", "255"], answer: 0 },
            { question: "Which protocol is used for point-to-point links over serial connections?", options: ["HDLC", "PPP", "Ethernet", "Token Ring"], answer: 1 },
            { question: "In Go-Back-N ARQ, when a frame is lost the sender retransmits:", options: ["Only the lost frame", "All frames from the lost one onwards", "Only the next frame", "Nothing"], answer: 1 }
        ];

        let shuffledQuestions = [];
        let currentIndex = 0;
        let userAnswers = [];
        let isAnswered = [];

        function shuffleArray(array) {
            let arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function prepareShuffledQuestions() {
            shuffledQuestions = originalQuestions.map(q => {
                const shuffledOpts = shuffleArray(q.options);
                const correctIndex = shuffledOpts.indexOf(q.options[q.answer]);
                return {
                    question: q.question,
                    options: shuffledOpts,
                    correctIndex: correctIndex
                };
            });
        }

        function renderQuestion() {
            const q = shuffledQuestions[currentIndex];
            document.getElementById("question-counter").textContent = `${currentIndex + 1} / 30`;
            document.getElementById("question-text").textContent = q.question;
           
            const container = document.getElementById("options-container");
            container.innerHTML = "";
            const labels = ["A", "B", "C", "D"];
           
            q.options.forEach((option, idx) => {
                const btn = document.createElement("button");
                btn.className = `option-btn w-full text-left px-7 py-6 rounded-3xl border-2 border-zinc-700 bg-zinc-800 hover:border-cyan-400 transition-all flex items-start gap-4 group`;
                btn.innerHTML = `
                    <span class="w-8 h-8 flex-shrink-0 rounded-2xl bg-zinc-700 text-cyan-400 font-bold flex items-center justify-center text-lg transition-colors group-hover:bg-cyan-400 group-hover:text-white">${labels[idx]}</span>
                    <span class="text-lg leading-tight">${option}</span>
                `;
                btn.onclick = () => selectOption(idx);
                container.appendChild(btn);
            });
           
            updateProgress();
            updateNavigation();
            if (isAnswered[currentIndex]) showFeedback();
        }

        function selectOption(selectedIdx) {
            if (isAnswered[currentIndex]) return;
            isAnswered[currentIndex] = true;
            userAnswers[currentIndex] = selectedIdx;
            showFeedback();
            updateNavigation();
        }

        function showFeedback() {
            const q = shuffledQuestions[currentIndex];
            const container = document.getElementById("options-container");
            const buttons = container.children;
            const userChoice = userAnswers[currentIndex];
           
            for (let i = 0; i < buttons.length; i++) {
                const btn = buttons[i];
                if (i === q.correctIndex) {
                    btn.classList.add("correct");
                    btn.innerHTML += `<span class="ml-auto text-white text-2xl">✓</span>`;
                }
                if (i === userChoice) {
                    if (userChoice === q.correctIndex) {
                        btn.classList.add("selected-correct");
                    } else {
                        btn.classList.add("selected-wrong");
                        btn.innerHTML += `<span class="ml-auto text-white text-2xl">✕</span>`;
                    }
                }
                btn.onclick = null;
                btn.style.cursor = "default";
            }
        }

        function updateProgress() {
            const progress = ((currentIndex + 1) / 30) * 100;
            document.getElementById("progress-bar").style.width = `${progress}%`;
        }

        function updateNavigation() {
            const prevBtn = document.getElementById("btn-prev");
            const nextText = document.getElementById("next-text");
            prevBtn.disabled = currentIndex === 0;
            prevBtn.style.opacity = currentIndex === 0 ? "0.4" : "1";
            nextText.textContent = currentIndex === 29 ? "Finish Quiz" : "Next";
        }

        function nextQuestion() {
            if (currentIndex < 29) {
                currentIndex++;
                renderQuestion();
            } else {
                showResults();
            }
        }

        function prevQuestion() {
            if (currentIndex > 0) {
                currentIndex--;
                renderQuestion();
            }
        }

        function calculateResults() {
            let correct = 0, incorrect = 0, skipped = 0;
            for (let i = 0; i < 30; i++) {
                if (!isAnswered[i]) skipped++;
                else if (userAnswers[i] === shuffledQuestions[i].correctIndex) correct++;
                else incorrect++;
            }
            const percentage = Math.round((correct / 30) * 100);
            return { correct, incorrect, skipped, percentage };
        }

        function showResults() {
            document.getElementById("quiz-screen").classList.add("hidden");
            const resultsScreen = document.getElementById("results-screen");
            resultsScreen.classList.remove("hidden");
           
            const stats = calculateResults();
            document.getElementById("score").textContent = stats.correct;
            document.getElementById("percentage").textContent = stats.percentage;
            document.getElementById("correct-count").textContent = stats.correct;
            document.getElementById("incorrect-count").textContent = stats.incorrect;
            document.getElementById("skipped-count").textContent = stats.skipped;
           
            const trophyEl = document.getElementById("trophy");
            trophyEl.innerHTML = stats.percentage >= 80 ? "🏆" : stats.percentage >= 60 ? "🎉" : "📡";
           
            let insight = stats.percentage >= 90 ? "Outstanding mastery of Data Link Layer functions, protocols and multiple access methods!" :
                          stats.percentage >= 75 ? "Excellent understanding of framing, error control, HDLC, PPP and Ethernet standards." :
                          stats.percentage >= 60 ? "Good effort! Review ARQ protocols, CSMA variants and VLAN tagging." :
                          "Review Unit 3 thoroughly — focus on framing techniques, multiple access and VLAN concepts.";
            document.getElementById("insight-text").innerHTML = insight;
        }

        function showReviewModal() {
            const modal = document.getElementById("review-modal");
            const list = document.getElementById("review-list");
            list.innerHTML = "";
           
            shuffledQuestions.forEach((q, i) => {
                const answered = isAnswered[i];
                const userIdx = userAnswers[i];
                const isCorrect = answered && (userIdx === q.correctIndex);
               
                const div = document.createElement("div");
                div.className = "border border-zinc-700 rounded-3xl p-6";
                div.innerHTML = `
                    <div class="flex items-start justify-between">
                        <div class="flex-1">
                            <div class="flex items-center gap-x-3">
                                <span class="font-mono text-xs bg-zinc-800 px-3 py-1 rounded-2xl">${i+1}</span>
                                <p class="font-medium text-white leading-tight">${q.question}</p>
                            </div>
                            <div class="mt-6 grid grid-cols-1 gap-4">
                                ${q.options.map((opt, idx) => {
                                    let statusHTML = "";
                                    if (answered && idx === userIdx) {
                                        statusHTML = isCorrect ? `<span class="text-emerald-400 text-xs font-bold">YOUR ANSWER ✓</span>` : `<span class="text-red-400 text-xs font-bold">YOUR ANSWER ✕</span>`;
                                    }
                                    if (idx === q.correctIndex) statusHTML += ` <span class="text-emerald-400 text-xs font-bold">CORRECT</span>`;
                                    return `
                                        <div class="flex justify-between items-center ${idx === q.correctIndex ? 'text-emerald-400' : 'text-zinc-300'}">
                                            <span>${String.fromCharCode(65 + idx)}. ${opt}</span>
                                            ${statusHTML}
                                        </div>
                                    `;
                                }).join("")}
                            </div>
                        </div>
                    </div>
                `;
                list.appendChild(div);
            });
            modal.classList.remove("hidden");
            modal.classList.add("flex");
        }

        function hideReviewModal() {
            const modal = document.getElementById("review-modal");
            modal.classList.add("hidden");
            modal.classList.remove("flex");
        }

        function shareResults() {
            const stats = calculateResults();
            const text = `📡 I just scored ${stats.percentage}% on Quizzy Pro • Unit 3: The Data Link Layer!\n\n✅ Correct: ${stats.correct}\n❌ Incorrect: ${stats.incorrect}\n⏭️ Skipped: ${stats.skipped}\n\nTest your knowledge of framing, error control, HDLC, PPP and multiple access protocols!`;
            navigator.clipboard.writeText(text).then(() => {
                const btn = event.currentTarget;
                const orig = btn.innerHTML;
                btn.innerHTML = `<i class="fas fa-check"></i> COPIED!`;
                setTimeout(() => btn.innerHTML = orig, 2000);
            });
        }

        function restartQuiz() {
            currentIndex = 0;
            userAnswers = new Array(30).fill(null);
            isAnswered = new Array(30).fill(false);
            prepareShuffledQuestions();
            document.getElementById("quiz-screen").classList.remove("hidden");
            document.getElementById("results-screen").classList.add("hidden");
            renderQuestion();
            console.log("%cQuizzy Pro • Unit 3: The Data Link Layer restarted with fresh random order!", "color:#67e8f9; font-weight:600");
        }

        function handleKeyboard(e) {
            if (!document.getElementById("results-screen").classList.contains("hidden")) return;
            if (e.key === "ArrowRight") nextQuestion();
            if (e.key === "ArrowLeft") prevQuestion();
            if (e.key >= "1" && e.key <= "4" && !isAnswered[currentIndex]) {
                selectOption(parseInt(e.key) - 1);
            }
        }

        function startQuiz() {
            prepareShuffledQuestions();
            userAnswers = new Array(30).fill(null);
            isAnswered = new Array(30).fill(false);
            currentIndex = 0;
            renderQuestion();
            document.addEventListener("keydown", handleKeyboard);
            console.log("%c✅ Quizzy Pro • Unit 3: The Data Link Layer loaded successfully! (30 tricky MCQs)", "color:#67e8f9; font-family:monospace; font-size:13px");
        }

        window.onload = startQuiz;
    </script>
</body>
</html>
