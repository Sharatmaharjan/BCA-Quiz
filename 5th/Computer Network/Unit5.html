<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizzy Pro • Unit 5: The Transport Layer (30 MCQs)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Inter:wght@400;500;600&display=swap');
       
        :root {
            --primary: 103 232 249;
        }
       
        body {
            font-family: 'Inter', system_ui, sans-serif;
        }
       
        .title-font {
            font-family: 'Poppins', sans-serif;
        }
        .option-btn {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
       
        .option-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 15px -3px rgb(103 232 249 / 0.3);
        }
       
        .option-btn.selected-correct {
            background-color: #10b981;
            color: white;
            border-color: #10b981;
        }
       
        .option-btn.selected-wrong {
            background-color: #ef4444;
            color: white;
            border-color: #ef4444;
        }
       
        .option-btn.correct {
            background-color: #10b981;
            color: white;
            border-color: #10b981;
        }
       
        .progress-bar {
            transition: width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .modal {
            animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
       
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .question-card {
            animation: fadeSlide 0.4s ease forwards;
        }
       
        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200 min-h-screen">
    <div class="max-w-3xl mx-auto">
        <!-- HEADER -->
        <header class="bg-gradient-to-r from-cyan-600 to-teal-600 text-white shadow-2xl">
            <div class="px-6 py-5 flex items-center justify-between">
                <div class="flex items-center gap-x-4">
                    <div class="w-12 h-12 bg-white/20 backdrop-blur-md rounded-3xl flex items-center justify-center text-4xl shadow-inner">
                        📦
                    </div>
                    <div>
                        <h1 class="title-font text-3xl font-semibold tracking-tighter">Quizzy Pro</h1>
                        <p class="text-cyan-100 text-sm font-medium -mt-1">Unit 5: The Transport Layer (30 MCQs)</p>
                    </div>
                </div>
                <div onclick="restartQuiz()"
                     class="flex items-center gap-x-2 bg-white/20 hover:bg-white/30 transition-colors px-5 py-2.5 rounded-3xl text-sm font-semibold cursor-pointer">
                    <i class="fas fa-redo"></i>
                    <span>Restart</span>
                </div>
            </div>
           
            <!-- PROGRESS -->
            <div class="h-2 bg-black/30 relative">
                <div id="progress-bar"
                     class="progress-bar h-2 bg-white rounded-r-full w-0"></div>
            </div>
        </header>
        <!-- QUIZ CONTAINER -->
        <div id="quiz-screen" class="p-6">
            <div class="flex justify-center items-center mb-8">
                <div class="px-5 py-1.5 bg-zinc-900 rounded-3xl text-sm font-mono font-medium text-cyan-400" id="question-counter">1 / 30</div>
            </div>
            <!-- QUESTION -->
            <div id="question-card" class="question-card bg-zinc-900 rounded-3xl p-8 shadow-2xl border border-zinc-800">
                <p id="question-text" class="text-2xl leading-tight font-medium text-white"></p>
               
                <!-- OPTIONS -->
                <div id="options-container" class="mt-10 space-y-4"></div>
            </div>
            <!-- NAVIGATION -->
            <div class="flex gap-4 mt-10">
                <button onclick="prevQuestion()"
                        id="btn-prev"
                        class="flex-1 bg-zinc-900 hover:bg-zinc-800 transition-colors text-white font-semibold py-5 rounded-3xl flex items-center justify-center gap-x-3 shadow-inner">
                    <i class="fas fa-chevron-left"></i>
                    <span>Previous</span>
                </button>
               
                <button onclick="nextQuestion()"
                        id="btn-next"
                        class="flex-1 bg-gradient-to-r from-cyan-500 to-teal-500 hover:from-cyan-400 hover:to-teal-400 transition-all font-semibold py-5 rounded-3xl flex items-center justify-center gap-x-3 shadow-lg shadow-cyan-500/30">
                    <span id="next-text">Next</span>
                    <i class="fas fa-chevron-right"></i>
                </button>
            </div>
        </div>
        <!-- RESULTS SCREEN -->
        <div id="results-screen" class="hidden p-6">
            <div class="bg-zinc-900 rounded-3xl p-10 text-center">
                <div id="trophy" class="mx-auto w-32 h-32 flex items-center justify-center text-8xl mb-6"></div>
               
                <h2 class="text-6xl font-bold text-white mb-1" id="score">92</h2>
                <p class="text-cyan-400 text-2xl font-semibold">Score • <span id="percentage">92</span>%</p>
               
                <div class="grid grid-cols-3 gap-6 mt-12">
                    <div class="bg-zinc-800 rounded-3xl p-6">
                        <div class="flex items-center justify-center gap-x-3 text-emerald-400">
                            <i class="fas fa-check-circle text-3xl"></i>
                        </div>
                        <div id="correct-count" class="text-5xl font-bold mt-4 text-white">28</div>
                        <div class="text-zinc-400 text-sm font-medium mt-1">CORRECT</div>
                    </div>
                    <div class="bg-zinc-800 rounded-3xl p-6">
                        <div class="flex items-center justify-center gap-x-3 text-red-400">
                            <i class="fas fa-times-circle text-3xl"></i>
                        </div>
                        <div id="incorrect-count" class="text-5xl font-bold mt-4 text-white">1</div>
                        <div class="text-zinc-400 text-sm font-medium mt-1">INCORRECT</div>
                    </div>
                    <div class="bg-zinc-800 rounded-3xl p-6">
                        <div class="flex items-center justify-center gap-x-3 text-amber-400">
                            <i class="fas fa-forward text-3xl"></i>
                        </div>
                        <div id="skipped-count" class="text-5xl font-bold mt-4 text-white">1</div>
                        <div class="text-zinc-400 text-sm font-medium mt-1">SKIPPED</div>
                    </div>
                </div>
                <div class="mt-10 bg-zinc-800/70 rounded-3xl p-8 text-left">
                    <p id="insight-text" class="text-zinc-300 leading-relaxed text-lg"></p>
                </div>
                <div class="flex flex-col sm:flex-row gap-4 mt-12">
                    <button onclick="showReviewModal()"
                            class="flex-1 py-6 bg-white text-zinc-900 rounded-3xl font-semibold flex items-center justify-center gap-x-3 hover:scale-105 transition-transform">
                        <i class="fas fa-list-check"></i>
                        REVIEW ALL ANSWERS
                    </button>
                   
                    <button onclick="shareResults()"
                            class="flex-1 py-6 bg-zinc-800 hover:bg-zinc-700 rounded-3xl font-semibold flex items-center justify-center gap-x-3 transition-colors">
                        <i class="fas fa-share-nodes"></i>
                        SHARE RESULT
                    </button>
                </div>
               
                <button onclick="restartQuiz()"
                        class="mt-6 w-full py-5 text-cyan-400 font-medium flex items-center justify-center gap-x-2 hover:text-cyan-300">
                    <i class="fas fa-rotate"></i>
                    <span>Restart Quiz</span>
                </button>
            </div>
        </div>
    </div>
    <!-- REVIEW MODAL -->
    <div id="review-modal" onclick="if(event.target.id==='review-modal')hideReviewModal()"
         class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
        <div onclick="event.stopImmediatePropagation()"
             class="modal bg-zinc-900 w-full max-w-2xl max-h-[85vh] rounded-3xl shadow-2xl flex flex-col">
            <div class="px-8 py-6 border-b border-zinc-700 flex items-center justify-between">
                <div class="font-semibold text-xl">Review All Answers</div>
                <button onclick="hideReviewModal()"
                        class="w-9 h-9 flex items-center justify-center text-3xl leading-none text-zinc-400 hover:text-white">×</button>
            </div>
           
            <div id="review-list" class="flex-1 overflow-auto p-6 space-y-8"></div>
           
            <div class="p-6 border-t border-zinc-700">
                <button onclick="hideReviewModal()"
                        class="w-full py-5 bg-cyan-500 hover:bg-cyan-400 transition-colors rounded-3xl text-white font-semibold">
                    Close Review
                </button>
            </div>
        </div>
    </div>
    <script>
        const originalQuestions = [
            { question: "What uniquely identifies a TCP connection globally?", options: ["IP address only", "Socket pair (source IP:port + destination IP:port)", "MAC address", "Sequence number"], answer: 1 },
            { question: "Which TCP flag is set in the second step of the three-way handshake?", options: ["SYN", "SYN+ACK", "ACK", "FIN"], answer: 1 },
            { question: "The purpose of the TIME-WAIT state in TCP connection termination is to", options: ["Immediately free resources", "Allow old duplicate segments to expire (2×MSL)", "Send a final RST", "Re-negotiate window size"], answer: 1 },
            { question: "In TCP, the sequence number field is 32 bits because", options: ["It tracks segments", "It tracks individual bytes in the stream", "It is used for port numbers", "It is used for flags"], answer: 1 },
            { question: "UDP is preferred over TCP for DNS queries primarily because", options: ["It provides guaranteed delivery", "It has lower latency and no connection overhead", "It supports congestion control", "It guarantees in-order delivery"], answer: 1 },
            { question: "Which field in the TCP header is used for flow control?", options: ["Sequence Number", "Window", "Checksum", "Urgent Pointer"], answer: 1 },
            { question: "The transport layer PDU for TCP is called a", options: ["Frame", "Packet", "Segment", "Datagram"], answer: 2 },
            { question: "In the TCP pseudo-header used for checksum, the protocol field value is", options: ["17 for UDP", "6 for TCP", "1 for ICMP", "0 for reserved"], answer: 1 },
            { question: "Which ARQ protocol retransmits only the lost segment and buffers out-of-order packets?", options: ["Go-Back-N", "Selective Repeat", "Stop-and-Wait", "Simple Protocol"], answer: 1 },
            { question: "The well-known port range for standard services is", options: ["0-1023", "1024-49151", "49152-65535", "1-1024"], answer: 0 },
            { question: "Fast Retransmit in TCP is triggered by", options: ["Timeout", "3 duplicate ACKs", "Window size zero", "Checksum failure"], answer: 1 },
            { question: "In congestion avoidance phase of TCP, the congestion window grows", options: ["Exponentially", "Linearly (additive increase)", "Multiplicatively", "Randomly"], answer: 1 },
            { question: "The purpose of the URG flag in TCP is", options: ["To mark urgent data (now largely obsolete)", "To request retransmission", "To close the connection", "To acknowledge data"], answer: 0 },
            { question: "Which transport protocol performs multiplexing using only the destination port number?", options: ["TCP", "UDP", "Both", "Neither"], answer: 1 },
            { question: "The maximum window size advertised in a standard TCP header is", options: ["65,535 bytes", "1 GB", "65,535 segments", "No limit"], answer: 0 },
            { question: "In TCP, when a receiver sends a duplicate ACK for an already received segment, it indicates", options: ["The segment was lost", "The sender should enter fast recovery", "The receiver buffer is full", "Nothing – it is ignored"], answer: 1 },
            { question: "The SEARCH algorithm in modern TCP improves slow start by", options: ["Exiting early when delivered bytes are less than expected", "Always doubling window", "Disabling congestion control", "Using only timeout"], answer: 0 },
            { question: "TCP connection release uses a", options: ["One-way FIN", "Three-way FIN handshake", "RST only", "No release mechanism"], answer: 1 },
            { question: "The transport layer provides which service that the network layer does not?", options: ["Host-to-host delivery", "Process-to-process delivery", "Routing", "Physical addressing"], answer: 1 },
            { question: "In UDP, the checksum calculation includes", options: ["Only UDP header", "UDP header + data + pseudo header", "Only data", "No checksum"], answer: 1 },
            { question: "The sliding window in TCP is used for", options: ["Error detection only", "Flow control and reliability", "Congestion control only", "Addressing"], answer: 1 },
            { question: "Which TCP state follows the final ACK in graceful termination?", options: ["FIN-WAIT-1", "TIME-WAIT", "CLOSE-WAIT", "LAST-ACK"], answer: 1 },
            { question: "AIMD stands for the TCP congestion control principle of", options: ["Additive Increase Multiplicative Decrease", "Aggressive Increase Moderate Decrease", "Automatic Increase Maximum Decrease", "All Increase Minimum Decrease"], answer: 0 },
            { question: "The minimum TCP header size is", options: ["8 bytes", "20 bytes", "40 bytes", "60 bytes"], answer: 1 },
            { question: "In Go-Back-N, when a single frame is lost the sender retransmits", options: ["Only the lost frame", "All frames from the lost one onward", "Nothing", "Only the next frame"], answer: 1 },
            { question: "Port numbers in the range 49152-65535 are called", options: ["Well-known", "Registered", "Dynamic/ephemeral", "Reserved"], answer: 2 },
            { question: "The purpose of the MSS option in TCP is", options: ["To negotiate maximum segment size", "To set window scale", "To enable SACK", "To add timestamps"], answer: 0 },
            { question: "Which protocol does not provide flow control?", options: ["TCP", "UDP", "Both", "Neither"], answer: 1 },
            { question: "The receiver window (rwnd) in TCP prevents", options: ["Network congestion", "Receiver buffer overflow", "Packet reordering", "Duplicate segments"], answer: 1 },
            { question: "In Selective Repeat, the receiver must buffer", options: ["Only in-order packets", "Out-of-order packets", "Nothing", "All packets"], answer: 1 }
        ];

        let shuffledQuestions = [];
        let currentIndex = 0;
        let userAnswers = [];
        let isAnswered = [];

        function shuffleArray(array) {
            let arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function prepareShuffledQuestions() {
            shuffledQuestions = originalQuestions.map(q => {
                const shuffledOpts = shuffleArray(q.options);
                const correctIndex = shuffledOpts.indexOf(q.options[q.answer]);
                return {
                    question: q.question,
                    options: shuffledOpts,
                    correctIndex: correctIndex
                };
            });
        }

        function renderQuestion() {
            const q = shuffledQuestions[currentIndex];
            document.getElementById("question-counter").textContent = `${currentIndex + 1} / 30`;
            document.getElementById("question-text").textContent = q.question;
           
            const container = document.getElementById("options-container");
            container.innerHTML = "";
            const labels = ["A", "B", "C", "D"];
           
            q.options.forEach((option, idx) => {
                const btn = document.createElement("button");
                btn.className = `option-btn w-full text-left px-7 py-6 rounded-3xl border-2 border-zinc-700 bg-zinc-800 hover:border-cyan-400 transition-all flex items-start gap-4 group`;
                btn.innerHTML = `
                    <span class="w-8 h-8 flex-shrink-0 rounded-2xl bg-zinc-700 text-cyan-400 font-bold flex items-center justify-center text-lg transition-colors group-hover:bg-cyan-400 group-hover:text-white">${labels[idx]}</span>
                    <span class="text-lg leading-tight">${option}</span>
                `;
                btn.onclick = () => selectOption(idx);
                container.appendChild(btn);
            });
           
            updateProgress();
            updateNavigation();
            if (isAnswered[currentIndex]) showFeedback();
        }

        function selectOption(selectedIdx) {
            if (isAnswered[currentIndex]) return;
            isAnswered[currentIndex] = true;
            userAnswers[currentIndex] = selectedIdx;
            showFeedback();
            updateNavigation();
        }

        function showFeedback() {
            const q = shuffledQuestions[currentIndex];
            const container = document.getElementById("options-container");
            const buttons = container.children;
            const userChoice = userAnswers[currentIndex];
           
            for (let i = 0; i < buttons.length; i++) {
                const btn = buttons[i];
                if (i === q.correctIndex) {
                    btn.classList.add("correct");
                    btn.innerHTML += `<span class="ml-auto text-white text-2xl">✓</span>`;
                }
                if (i === userChoice) {
                    if (userChoice === q.correctIndex) {
                        btn.classList.add("selected-correct");
                    } else {
                        btn.classList.add("selected-wrong");
                        btn.innerHTML += `<span class="ml-auto text-white text-2xl">✕</span>`;
                    }
                }
                btn.onclick = null;
                btn.style.cursor = "default";
            }
        }

        function updateProgress() {
            const progress = ((currentIndex + 1) / 30) * 100;
            document.getElementById("progress-bar").style.width = `${progress}%`;
        }

        function updateNavigation() {
            const prevBtn = document.getElementById("btn-prev");
            const nextText = document.getElementById("next-text");
            prevBtn.disabled = currentIndex === 0;
            prevBtn.style.opacity = currentIndex === 0 ? "0.4" : "1";
            nextText.textContent = currentIndex === 29 ? "Finish Quiz" : "Next";
        }

        function nextQuestion() {
            if (currentIndex < 29) {
                currentIndex++;
                renderQuestion();
            } else {
                showResults();
            }
        }

        function prevQuestion() {
            if (currentIndex > 0) {
                currentIndex--;
                renderQuestion();
            }
        }

        function calculateResults() {
            let correct = 0, incorrect = 0, skipped = 0;
            for (let i = 0; i < 30; i++) {
                if (!isAnswered[i]) skipped++;
                else if (userAnswers[i] === shuffledQuestions[i].correctIndex) correct++;
                else incorrect++;
            }
            const percentage = Math.round((correct / 30) * 100);
            return { correct, incorrect, skipped, percentage };
        }

        function showResults() {
            document.getElementById("quiz-screen").classList.add("hidden");
            const resultsScreen = document.getElementById("results-screen");
            resultsScreen.classList.remove("hidden");
           
            const stats = calculateResults();
            document.getElementById("score").textContent = stats.correct;
            document.getElementById("percentage").textContent = stats.percentage;
            document.getElementById("correct-count").textContent = stats.correct;
            document.getElementById("incorrect-count").textContent = stats.incorrect;
            document.getElementById("skipped-count").textContent = stats.skipped;
           
            const trophyEl = document.getElementById("trophy");
            trophyEl.innerHTML = stats.percentage >= 80 ? "🏆" : stats.percentage >= 60 ? "🎉" : "📦";
           
            let insight = stats.percentage >= 90 ? "Outstanding mastery of transport layer functions, TCP/UDP, reliable transfer, and congestion control!" :
                          stats.percentage >= 75 ? "Excellent grasp of ports, handshakes, ARQ protocols, and TCP congestion phases." :
                          stats.percentage >= 60 ? "Good effort! Review 3-way handshake, fast recovery, and AIMD." :
                          "Review Unit 5 thoroughly — focus on TCP header, sliding window, and UDP vs TCP use cases.";
            document.getElementById("insight-text").innerHTML = insight;
        }

        function showReviewModal() {
            const modal = document.getElementById("review-modal");
            const list = document.getElementById("review-list");
            list.innerHTML = "";
           
            shuffledQuestions.forEach((q, i) => {
                const answered = isAnswered[i];
                const userIdx = userAnswers[i];
                const isCorrect = answered && (userIdx === q.correctIndex);
               
                const div = document.createElement("div");
                div.className = "border border-zinc-700 rounded-3xl p-6";
                div.innerHTML = `
                    <div class="flex items-start justify-between">
                        <div class="flex-1">
                            <div class="flex items-center gap-x-3">
                                <span class="font-mono text-xs bg-zinc-800 px-3 py-1 rounded-2xl">${i+1}</span>
                                <p class="font-medium text-white leading-tight">${q.question}</p>
                            </div>
                            <div class="mt-6 grid grid-cols-1 gap-4">
                                ${q.options.map((opt, idx) => {
                                    let statusHTML = "";
                                    if (answered && idx === userIdx) {
                                        statusHTML = isCorrect ? `<span class="text-emerald-400 text-xs font-bold">YOUR ANSWER ✓</span>` : `<span class="text-red-400 text-xs font-bold">YOUR ANSWER ✕</span>`;
                                    }
                                    if (idx === q.correctIndex) statusHTML += ` <span class="text-emerald-400 text-xs font-bold">CORRECT</span>`;
                                    return `
                                        <div class="flex justify-between items-center ${idx === q.correctIndex ? 'text-emerald-400' : 'text-zinc-300'}">
                                            <span>${String.fromCharCode(65 + idx)}. ${opt}</span>
                                            ${statusHTML}
                                        </div>
                                    `;
                                }).join("")}
                            </div>
                        </div>
                    </div>
                `;
                list.appendChild(div);
            });
            modal.classList.remove("hidden");
            modal.classList.add("flex");
        }

        function hideReviewModal() {
            const modal = document.getElementById("review-modal");
            modal.classList.add("hidden");
            modal.classList.remove("flex");
        }

        function shareResults() {
            const stats = calculateResults();
            const text = `📦 I just scored ${stats.percentage}% on Quizzy Pro • Unit 5: The Transport Layer!\n\n✅ Correct: ${stats.correct}\n❌ Incorrect: ${stats.incorrect}\n⏭️ Skipped: ${stats.skipped}\n\nTest your knowledge of TCP/UDP, handshakes, ARQ, and congestion control!`;
            navigator.clipboard.writeText(text).then(() => {
                const btn = event.currentTarget;
                const orig = btn.innerHTML;
                btn.innerHTML = `<i class="fas fa-check"></i> COPIED!`;
                setTimeout(() => btn.innerHTML = orig, 2000);
            });
        }

        function restartQuiz() {
            currentIndex = 0;
            userAnswers = new Array(30).fill(null);
            isAnswered = new Array(30).fill(false);
            prepareShuffledQuestions();
            document.getElementById("quiz-screen").classList.remove("hidden");
            document.getElementById("results-screen").classList.add("hidden");
            renderQuestion();
            console.log("%cQuizzy Pro • Unit 5: The Transport Layer restarted with fresh random order!", "color:#67e8f9; font-weight:600");
        }

        function handleKeyboard(e) {
            if (!document.getElementById("results-screen").classList.contains("hidden")) return;
            if (e.key === "ArrowRight") nextQuestion();
            if (e.key === "ArrowLeft") prevQuestion();
            if (e.key >= "1" && e.key <= "4" && !isAnswered[currentIndex]) {
                selectOption(parseInt(e.key) - 1);
            }
        }

        function startQuiz() {
            prepareShuffledQuestions();
            userAnswers = new Array(30).fill(null);
            isAnswered = new Array(30).fill(false);
            currentIndex = 0;
            renderQuestion();
            document.addEventListener("keydown", handleKeyboard);
            console.log("%c✅ Quizzy Pro • Unit 5: The Transport Layer loaded successfully! (30 tricky MCQs)", "color:#67e8f9; font-family:monospace; font-size:13px");
        }

        window.onload = startQuiz;
    </script>
</body>
</html>
