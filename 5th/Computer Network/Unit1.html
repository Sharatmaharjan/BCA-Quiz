<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizzy Pro • Unit 1: Introduction to Computer Networks (30 MCQs)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&amp;family=Inter:wght@400;500;600&amp;display=swap');
        
        :root {
            --primary: 103 232 249;
        }
        
        body {
            font-family: 'Inter', system_ui, sans-serif;
        }
        
        .title-font {
            font-family: 'Poppins', sans-serif;
        }

        .option-btn {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .option-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 15px -3px rgb(103 232 249 / 0.3);
        }
        
        .option-btn.selected-correct {
            background-color: #10b981;
            color: white;
            border-color: #10b981;
        }
        
        .option-btn.selected-wrong {
            background-color: #ef4444;
            color: white;
            border-color: #ef4444;
        }
        
        .option-btn.correct {
            background-color: #10b981;
            color: white;
            border-color: #10b981;
        }
        
        .progress-bar {
            transition: width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .modal {
            animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .question-card {
            animation: fadeSlide 0.4s ease forwards;
        }
        
        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200 min-h-screen">
    <div class="max-w-3xl mx-auto">
        <!-- HEADER -->
        <header class="bg-gradient-to-r from-cyan-600 to-teal-600 text-white shadow-2xl">
            <div class="px-6 py-5 flex items-center justify-between">
                <div class="flex items-center gap-x-4">
                    <div class="w-12 h-12 bg-white/20 backdrop-blur-md rounded-3xl flex items-center justify-center text-4xl shadow-inner">
                        🌐
                    </div>
                    <div>
                        <h1 class="title-font text-3xl font-semibold tracking-tighter">Quizzy Pro</h1>
                        <p class="text-cyan-100 text-sm font-medium -mt-1">Unit 1: Introduction to Computer Networks (30 MCQs)</p>
                    </div>
                </div>
                <div onclick="restartQuiz()" 
                     class="flex items-center gap-x-2 bg-white/20 hover:bg-white/30 transition-colors px-5 py-2.5 rounded-3xl text-sm font-semibold cursor-pointer">
                    <i class="fas fa-redo"></i>
                    <span>Restart</span>
                </div>
            </div>
            
            <!-- PROGRESS -->
            <div class="h-2 bg-black/30 relative">
                <div id="progress-bar" 
                     class="progress-bar h-2 bg-white rounded-r-full w-0"></div>
            </div>
        </header>

        <!-- QUIZ CONTAINER -->
        <div id="quiz-screen" class="p-6">
            <div class="flex justify-center items-center mb-8">
                <div class="px-5 py-1.5 bg-zinc-900 rounded-3xl text-sm font-mono font-medium text-cyan-400" id="question-counter">1 / 30</div>
            </div>

            <!-- QUESTION -->
            <div id="question-card" class="question-card bg-zinc-900 rounded-3xl p-8 shadow-2xl border border-zinc-800">
                <p id="question-text" class="text-2xl leading-tight font-medium text-white"></p>
                
                <!-- OPTIONS -->
                <div id="options-container" class="mt-10 space-y-4"></div>
            </div>

            <!-- NAVIGATION -->
            <div class="flex gap-4 mt-10">
                <button onclick="prevQuestion()" 
                        id="btn-prev"
                        class="flex-1 bg-zinc-900 hover:bg-zinc-800 transition-colors text-white font-semibold py-5 rounded-3xl flex items-center justify-center gap-x-3 shadow-inner">
                    <i class="fas fa-chevron-left"></i>
                    <span>Previous</span>
                </button>
                
                <button onclick="nextQuestion()" 
                        id="btn-next"
                        class="flex-1 bg-gradient-to-r from-cyan-500 to-teal-500 hover:from-cyan-400 hover:to-teal-400 transition-all font-semibold py-5 rounded-3xl flex items-center justify-center gap-x-3 shadow-lg shadow-cyan-500/30">
                    <span id="next-text">Next</span>
                    <i class="fas fa-chevron-right"></i>
                </button>
            </div>
        </div>

        <!-- RESULTS SCREEN -->
        <div id="results-screen" class="hidden p-6">
            <div class="bg-zinc-900 rounded-3xl p-10 text-center">
                <div id="trophy" class="mx-auto w-32 h-32 flex items-center justify-center text-8xl mb-6"></div>
                
                <h2 class="text-6xl font-bold text-white mb-1" id="score">92</h2>
                <p class="text-cyan-400 text-2xl font-semibold">Score • <span id="percentage">92</span>%</p>
                
                <div class="grid grid-cols-3 gap-6 mt-12">
                    <div class="bg-zinc-800 rounded-3xl p-6">
                        <div class="flex items-center justify-center gap-x-3 text-emerald-400">
                            <i class="fas fa-check-circle text-3xl"></i>
                        </div>
                        <div id="correct-count" class="text-5xl font-bold mt-4 text-white">28</div>
                        <div class="text-zinc-400 text-sm font-medium mt-1">CORRECT</div>
                    </div>
                    <div class="bg-zinc-800 rounded-3xl p-6">
                        <div class="flex items-center justify-center gap-x-3 text-red-400">
                            <i class="fas fa-times-circle text-3xl"></i>
                        </div>
                        <div id="incorrect-count" class="text-5xl font-bold mt-4 text-white">1</div>
                        <div class="text-zinc-400 text-sm font-medium mt-1">INCORRECT</div>
                    </div>
                    <div class="bg-zinc-800 rounded-3xl p-6">
                        <div class="flex items-center justify-center gap-x-3 text-amber-400">
                            <i class="fas fa-forward text-3xl"></i>
                        </div>
                        <div id="skipped-count" class="text-5xl font-bold mt-4 text-white">1</div>
                        <div class="text-zinc-400 text-sm font-medium mt-1">SKIPPED</div>
                    </div>
                </div>

                <div class="mt-10 bg-zinc-800/70 rounded-3xl p-8 text-left">
                    <p id="insight-text" class="text-zinc-300 leading-relaxed text-lg"></p>
                </div>

                <div class="flex flex-col sm:flex-row gap-4 mt-12">
                    <button onclick="showReviewModal()" 
                            class="flex-1 py-6 bg-white text-zinc-900 rounded-3xl font-semibold flex items-center justify-center gap-x-3 hover:scale-105 transition-transform">
                        <i class="fas fa-list-check"></i>
                        REVIEW ALL ANSWERS
                    </button>
                    
                    <button onclick="shareResults()" 
                            class="flex-1 py-6 bg-zinc-800 hover:bg-zinc-700 rounded-3xl font-semibold flex items-center justify-center gap-x-3 transition-colors">
                        <i class="fas fa-share-nodes"></i>
                        SHARE RESULT
                    </button>
                </div>
                
                <button onclick="restartQuiz()" 
                        class="mt-6 w-full py-5 text-cyan-400 font-medium flex items-center justify-center gap-x-2 hover:text-cyan-300">
                    <i class="fas fa-rotate"></i>
                    <span>Restart Quiz</span>
                </button>
            </div>
        </div>
    </div>

    <!-- REVIEW MODAL -->
    <div id="review-modal" onclick="if(event.target.id==='review-modal')hideReviewModal()" 
         class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
        <div onclick="event.stopImmediatePropagation()" 
             class="modal bg-zinc-900 w-full max-w-2xl max-h-[85vh] rounded-3xl shadow-2xl flex flex-col">
            <div class="px-8 py-6 border-b border-zinc-700 flex items-center justify-between">
                <div class="font-semibold text-xl">Review All Answers</div>
                <button onclick="hideReviewModal()" 
                        class="w-9 h-9 flex items-center justify-center text-3xl leading-none text-zinc-400 hover:text-white">×</button>
            </div>
            
            <div id="review-list" class="flex-1 overflow-auto p-6 space-y-8"></div>
            
            <div class="p-6 border-t border-zinc-700">
                <button onclick="hideReviewModal()" 
                        class="w-full py-5 bg-cyan-500 hover:bg-cyan-400 transition-colors rounded-3xl text-white font-semibold">
                    Close Review
                </button>
            </div>
        </div>
    </div>

    <script>
        // ====================== ORIGINAL QUESTIONS (30 MCQs with tricky balanced options) ======================
        const originalQuestions = [
            {
                question: "A computer network is best defined as",
                options: [
                    "A collection of standalone computers for local storage",
                    "An infrastructure connecting nodes for data communication and resource sharing",
                    "Only wireless devices used for gaming",
                    "A single server managing all printers"
                ],
                correctAnswer: "An infrastructure connecting nodes for data communication and resource sharing"
            },
            {
                question: "The main purpose of a computer network is similar to",
                options: [
                    "A local hard drive for backups",
                    "A highway system providing a pathway for data from sender to receiver",
                    "A single application for video editing",
                    "A router used only for internet access"
                ],
                correctAnswer: "A highway system providing a pathway for data from sender to receiver"
            },
            {
                question: "Hardware components of network infrastructure include",
                options: [
                    "Protocols and operating systems only",
                    "NICs, cables, switches, and routers",
                    "Email servers and social media apps",
                    "Database software exclusively"
                ],
                correctAnswer: "NICs, cables, switches, and routers"
            },
            {
                question: "Software components of a network primarily consist of",
                options: [
                    "Physical cables and connectors",
                    "Protocols and network operating systems",
                    "Printers and scanners",
                    "Fiber optic cables only"
                ],
                correctAnswer: "Protocols and network operating systems"
            },
            {
                question: "Transmission media in a network refer to",
                options: [
                    "Software rules for data formatting",
                    "The physical path (guided cables or unguided radio waves)",
                    "Centralized backup servers",
                    "Application-level encryption tools"
                ],
                correctAnswer: "The physical path (guided cables or unguided radio waves)"
            },
            {
                question: "The core function of a computer network is to",
                options: [
                    "Store all data locally on each device",
                    "Govern formatting, addressing, transmission, and reception of data",
                    "Replace all physical hardware",
                    "Limit access to only one user"
                ],
                correctAnswer: "Govern formatting, addressing, transmission, and reception of data"
            },
            {
                question: "Resource sharing in business applications of networks means",
                options: [
                    "Only video conferencing tools",
                    "Sharing hardware like printers and software to reduce costs",
                    "Streaming services for entertainment",
                    "Online shopping transactions"
                ],
                correctAnswer: "Sharing hardware like printers and software to reduce costs"
            },
            {
                question: "A key communication application using SMTP is",
                options: [
                    "Real-time video calls",
                    "Email as the primary written communication method",
                    "Digital marketing campaigns",
                    "Multiplayer online gaming"
                ],
                correctAnswer: "Email as the primary written communication method"
            },
            {
                question: "E-commerce applications of networks enable",
                options: [
                    "Centralized data management only",
                    "Online transactions, banking, and shopping",
                    "Resource sharing in offices",
                    "Educational portals exclusively"
                ],
                correctAnswer: "Online transactions, banking, and shopping"
            },
            {
                question: "Entertainment applications primarily rely on networks for",
                options: [
                    "Email and social networking",
                    "Streaming services like Netflix and online gaming",
                    "Business resource sharing",
                    "Centralized server backups"
                ],
                correctAnswer: "Streaming services like Netflix and online gaming"
            },
            {
                question: "Educational applications of networks include",
                options: [
                    "Online gaming platforms",
                    "Learning portals, virtual classrooms, and digital libraries",
                    "Cable TV distribution",
                    "VoIP voice calls only"
                ],
                correctAnswer: "Learning portals, virtual classrooms, and digital libraries"
            },
            {
                question: "In client-server architecture, the central device",
                options: [
                    "Has equal status with all clients",
                    "Provides services while clients request them",
                    "Uses Bluetooth for file sharing",
                    "Eliminates any single point of failure"
                ],
                correctAnswer: "Provides services while clients request them"
            },
            {
                question: "A real-world example of client-server architecture is",
                options: [
                    "BitTorrent file downloads",
                    "Accessing a university exam portal where laptop requests from server",
                    "Bluetooth sharing between mobiles",
                    "Home Wi-Fi without any server"
                ],
                correctAnswer: "Accessing a university exam portal where laptop requests from server"
            },
            {
                question: "A major advantage of client-server architecture is",
                options: [
                    "No single point of failure",
                    "Centralized management, security, and high performance",
                    "Low setup cost",
                    "Decentralized control"
                ],
                correctAnswer: "Centralized management, security, and high performance"
            },
            {
                question: "Peer-to-peer architecture means all devices",
                options: [
                    "Depend on a powerful central server",
                    "Have equal status and can both request and provide services",
                    "Use only leased lines",
                    "Require dedicated bandwidth reservation"
                ],
                correctAnswer: "Have equal status and can both request and provide services"
            },
            {
                question: "A real-world example of peer-to-peer architecture is",
                options: [
                    "University exam form portal",
                    "Bluetooth file sharing or BitTorrent downloads",
                    "Netflix video streaming",
                    "Company centralized database"
                ],
                correctAnswer: "Bluetooth file sharing or BitTorrent downloads"
            },
            {
                question: "Local Area Network (LAN) is characterized by",
                options: [
                    "Country-wide coverage",
                    "Small area (room/building/campus) with high speed (100-1000 Mbps)",
                    "Satellite-based global links",
                    "City-wide cable TV only"
                ],
                correctAnswer: "Small area (room/building/campus) with high speed (100-1000 Mbps)"
            },
            {
                question: "A typical real-world example of LAN is",
                options: [
                    "The entire Internet",
                    "College computer lab, cyber cafe, or home network",
                    "Bank branches across a country",
                    "Undersea cable connections"
                ],
                correctAnswer: "College computer lab, cyber cafe, or home network"
            },
            {
                question: "Metropolitan Area Network (MAN) covers",
                options: [
                    "A single room or building",
                    "A city or town (larger than LAN, smaller than WAN)",
                    "Continents using satellites",
                    "Only wireless radio waves"
                ],
                correctAnswer: "A city or town (larger than LAN, smaller than WAN)"
            },
            {
                question: "A real-world example of MAN is",
                options: [
                    "Home Wi-Fi network",
                    "Cable TV network in a city or bank branches in Kathmandu valley",
                    "International university links",
                    "Bluetooth between two phones"
                ],
                correctAnswer: "Cable TV network in a city or bank branches in Kathmandu valley"
            },
            {
                question: "Wide Area Network (WAN) spans",
                options: [
                    "A single campus",
                    "Large areas like countries or continents",
                    "Only one building",
                    "City-wide cable systems"
                ],
                correctAnswer: "Large areas like countries or continents"
            },
            {
                question: "The largest example of a WAN is",
                options: [
                    "A college computer lab",
                    "The Internet itself",
                    "Local Bluetooth pairing",
                    "Home Ethernet setup"
                ],
                correctAnswer: "The Internet itself"
            },
            {
                question: "A protocol in computer networks is defined as",
                options: [
                    "Physical cables and connectors",
                    "A set of rules defining what, how, and when to communicate",
                    "Only email applications",
                    "Hardware interface cards"
                ],
                correctAnswer: "A set of rules defining what, how, and when to communicate"
            },
            {
                question: "The 'syntax' element of a protocol refers to",
                options: [
                    "Meaning of data bits",
                    "Structure or format of the data (e.g., first 8 bits as address)",
                    "Timing and speed of transmission",
                    "Only error detection methods"
                ],
                correctAnswer: "Structure or format of the data (e.g., first 8 bits as address)"
            },
            {
                question: "The 'semantics' element of a protocol refers to",
                options: [
                    "Data format structure",
                    "Meaning of each section of bits",
                    "When data should be sent",
                    "Physical cable specifications"
                ],
                correctAnswer: "Meaning of each section of bits"
            },
            {
                question: "The 'timing' element of a protocol concerns",
                options: [
                    "Data format only",
                    "When data should be sent and synchronization speed",
                    "Meaning of control signals",
                    "Hardware voltage levels"
                ],
                correctAnswer: "When data should be sent and synchronization speed"
            },
            {
                question: "A de facto standard in networking is one that",
                options: [
                    "Is officially legislated by ISO",
                    "Arises from widespread use (e.g., HTTP, Ethernet)",
                    "Applies only to OSI model",
                    "Is limited to physical layer"
                ],
                correctAnswer: "Arises from widespread use (e.g., HTTP, Ethernet)"
            },
            {
                question: "The OSI Reference Model has how many layers?",
                options: [
                    "4 layers",
                    "7 layers",
                    "5 layers",
                    "10 layers"
                ],
                correctAnswer: "7 layers"
            },
            {
                question: "In the OSI model, the bottom layer (Physical) uses which PDU?",
                options: [
                    "Frame with MAC addressing",
                    "Bits for raw bit stream transmission",
                    "Packet with IP routing",
                    "Segment with port numbers"
                ],
                correctAnswer: "Bits for raw bit stream transmission"
            },
            {
                question: "The TCP/IP model differs from OSI mainly in",
                options: [
                    "Having more layers",
                    "Combining upper layers and using 4 practical layers",
                    "Being purely theoretical",
                    "Requiring de jure standards only"
                ],
                correctAnswer: "Combining upper layers and using 4 practical layers"
            }
        ];

        // ====================== QUIZ STATE ======================
        let shuffledQuestions = [];
        let currentIndex = 0;
        let userAnswers = [];
        let isAnswered = [];

        function shuffleArray(array) {
            let arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function prepareShuffledQuestions() {
            shuffledQuestions = originalQuestions.map(q => {
                const shuffledOpts = shuffleArray(q.options);
                const correctIndex = shuffledOpts.indexOf(q.correctAnswer);
                return {
                    question: q.question,
                    options: shuffledOpts,
                    correctIndex: correctIndex
                };
            });
        }

        function renderQuestion() {
            const q = shuffledQuestions[currentIndex];
            document.getElementById("question-counter").textContent = `${currentIndex + 1} / 30`;
            document.getElementById("question-text").textContent = q.question;
            
            const container = document.getElementById("options-container");
            container.innerHTML = "";
            const labels = ["A", "B", "C", "D"];
            
            q.options.forEach((option, idx) => {
                const btn = document.createElement("button");
                btn.className = `option-btn w-full text-left px-7 py-6 rounded-3xl border-2 border-zinc-700 bg-zinc-800 hover:border-cyan-400 transition-all flex items-start gap-4 group`;
                btn.innerHTML = `
                    <span class="w-8 h-8 flex-shrink-0 rounded-2xl bg-zinc-700 text-cyan-400 font-bold flex items-center justify-center text-lg transition-colors group-hover:bg-cyan-400 group-hover:text-white">${labels[idx]}</span>
                    <span class="text-lg leading-tight">${option}</span>
                `;
                btn.onclick = () => selectOption(idx);
                container.appendChild(btn);
            });
            
            updateProgress();
            updateNavigation();
            if (isAnswered[currentIndex]) showFeedback();
        }

        function selectOption(selectedIdx) {
            if (isAnswered[currentIndex]) return;
            isAnswered[currentIndex] = true;
            userAnswers[currentIndex] = selectedIdx;
            showFeedback();
            updateNavigation();
        }

        function showFeedback() {
            const q = shuffledQuestions[currentIndex];
            const container = document.getElementById("options-container");
            const buttons = container.children;
            const userChoice = userAnswers[currentIndex];
            
            for (let i = 0; i < buttons.length; i++) {
                const btn = buttons[i];
                if (i === q.correctIndex) {
                    btn.classList.add("correct");
                    btn.innerHTML += `<span class="ml-auto text-white text-2xl">✓</span>`;
                }
                if (i === userChoice) {
                    if (userChoice === q.correctIndex) {
                        btn.classList.add("selected-correct");
                    } else {
                        btn.classList.add("selected-wrong");
                        btn.innerHTML += `<span class="ml-auto text-white text-2xl">✕</span>`;
                    }
                }
                btn.onclick = null;
                btn.style.cursor = "default";
            }
        }

        function updateProgress() {
            const progress = ((currentIndex + 1) / 30) * 100;
            document.getElementById("progress-bar").style.width = `${progress}%`;
        }

        function updateNavigation() {
            const prevBtn = document.getElementById("btn-prev");
            const nextText = document.getElementById("next-text");
            prevBtn.disabled = currentIndex === 0;
            prevBtn.style.opacity = currentIndex === 0 ? "0.4" : "1";
            nextText.textContent = currentIndex === 29 ? "Finish Quiz" : "Next";
        }

        function nextQuestion() {
            if (currentIndex < 29) {
                currentIndex++;
                renderQuestion();
            } else {
                showResults();
            }
        }

        function prevQuestion() {
            if (currentIndex > 0) {
                currentIndex--;
                renderQuestion();
            }
        }

        function calculateResults() {
            let correct = 0, incorrect = 0, skipped = 0;
            for (let i = 0; i < 30; i++) {
                if (!isAnswered[i]) skipped++;
                else if (userAnswers[i] === shuffledQuestions[i].correctIndex) correct++;
                else incorrect++;
            }
            const percentage = Math.round((correct / 30) * 100);
            return { correct, incorrect, skipped, percentage };
        }

        function showResults() {
            document.getElementById("quiz-screen").classList.add("hidden");
            const resultsScreen = document.getElementById("results-screen");
            resultsScreen.classList.remove("hidden");
            
            const stats = calculateResults();
            document.getElementById("score").textContent = stats.correct;
            document.getElementById("percentage").textContent = stats.percentage;
            document.getElementById("correct-count").textContent = stats.correct;
            document.getElementById("incorrect-count").textContent = stats.incorrect;
            document.getElementById("skipped-count").textContent = stats.skipped;
            
            const trophyEl = document.getElementById("trophy");
            trophyEl.innerHTML = stats.percentage >= 80 ? "🏆" : stats.percentage >= 60 ? "🎉" : "🌐";
            
            let insight = stats.percentage >= 90 ? "Outstanding! You mastered network definitions, applications, architectures, types, protocols, OSI, TCP/IP, and their critiques." :
                          stats.percentage >= 75 ? "Excellent! Strong grasp of client-server vs P2P, LAN/MAN/WAN, and model comparisons." :
                          stats.percentage >= 60 ? "Good job! Review PDU names, layer functions, and de facto vs de jure standards." :
                          "Keep learning! Focus on OSI layers and TCP/IP practical differences.";
            document.getElementById("insight-text").innerHTML = insight;
        }

        function showReviewModal() {
            const modal = document.getElementById("review-modal");
            const list = document.getElementById("review-list");
            list.innerHTML = "";
            
            shuffledQuestions.forEach((q, i) => {
                const answered = isAnswered[i];
                const userIdx = userAnswers[i];
                const isCorrect = answered && (userIdx === q.correctIndex);
                
                const div = document.createElement("div");
                div.className = "border border-zinc-700 rounded-3xl p-6";
                div.innerHTML = `
                    <div class="flex items-start justify-between">
                        <div class="flex-1">
                            <div class="flex items-center gap-x-3">
                                <span class="font-mono text-xs bg-zinc-800 px-3 py-1 rounded-2xl">${i+1}</span>
                                <p class="font-medium text-white leading-tight">${q.question}</p>
                            </div>
                            <div class="mt-6 grid grid-cols-1 gap-4">
                                ${q.options.map((opt, idx) => {
                                    let statusHTML = "";
                                    if (answered && idx === userIdx) {
                                        statusHTML = isCorrect ? `<span class="text-emerald-400 text-xs font-bold">YOUR ANSWER ✓</span>` : `<span class="text-red-400 text-xs font-bold">YOUR ANSWER ✕</span>`;
                                    }
                                    if (idx === q.correctIndex) statusHTML += ` <span class="text-emerald-400 text-xs font-bold">CORRECT</span>`;
                                    return `
                                        <div class="flex justify-between items-center ${idx === q.correctIndex ? 'text-emerald-400' : 'text-zinc-300'}">
                                            <span>${String.fromCharCode(65 + idx)}. ${opt}</span>
                                            ${statusHTML}
                                        </div>
                                    `;
                                }).join("")}
                            </div>
                        </div>
                    </div>
                `;
                list.appendChild(div);
            });
            modal.classList.remove("hidden");
            modal.classList.add("flex");
        }

        function hideReviewModal() {
            const modal = document.getElementById("review-modal");
            modal.classList.add("hidden");
            modal.classList.remove("flex");
        }

        function shareResults() {
            const stats = calculateResults();
            const text = `🌐 I just scored ${stats.percentage}% on Quizzy Pro • Unit 1: Introduction to Computer Networks!\n\n✅ Correct: ${stats.correct}\n❌ Incorrect: ${stats.incorrect}\n⏭️ Skipped: ${stats.skipped}\n\nMastered OSI, TCP/IP, LAN/WAN & protocols? Try Quizzy Pro!`;
            navigator.clipboard.writeText(text).then(() => {
                const btn = event.currentTarget;
                const origHTML = btn.innerHTML;
                btn.innerHTML = `<i class="fas fa-check"></i> COPIED!`;
                setTimeout(() => btn.innerHTML = origHTML, 2000);
            });
        }

        function restartQuiz() {
            currentIndex = 0;
            userAnswers = new Array(30).fill(null);
            isAnswered = new Array(30).fill(false);
            prepareShuffledQuestions();
            document.getElementById("quiz-screen").classList.remove("hidden");
            document.getElementById("results-screen").classList.add("hidden");
            renderQuestion();
            console.log("%cQuizzy Pro • Unit 1: Introduction to Computer Networks restarted with fresh random order!", "color:#67e8f9; font-weight:600");
        }

        function handleKeyboard(e) {
            if (!document.getElementById("results-screen").classList.contains("hidden")) return;
            if (e.key === "ArrowRight") nextQuestion();
            if (e.key === "ArrowLeft") prevQuestion();
            if (e.key >= "1" && e.key <= "4" && !isAnswered[currentIndex]) {
                selectOption(parseInt(e.key) - 1);
            }
        }

        function startQuiz() {
            prepareShuffledQuestions();
            userAnswers = new Array(30).fill(null);
            isAnswered = new Array(30).fill(false);
            currentIndex = 0;
            renderQuestion();
            document.addEventListener("keydown", handleKeyboard);
            console.log("%c✅ Quizzy Pro • Unit 1: Introduction to Computer Networks loaded successfully! (30 tricky MCQs from official PDF)", "color:#67e8f9; font-family:monospace; font-size:13px");
        }

        window.onload = startQuiz;
    </script>
</body>
</html>
