<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizzy Pro • Unit 1: Introduction to Computer Networks (30 MCQs)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&amp;family=Inter:wght@400;500;600&amp;display=swap');
        
        :root {
            --primary: 103 232 249;
        }
        
        body {
            font-family: 'Inter', system_ui, sans-serif;
        }
        
        .title-font {
            font-family: 'Poppins', sans-serif;
        }

        .option-btn {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .option-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 15px -3px rgb(103 232 249 / 0.3);
        }
        
        .option-btn.selected-correct {
            background-color: #10b981;
            color: white;
            border-color: #10b981;
        }
        
        .option-btn.selected-wrong {
            background-color: #ef4444;
            color: white;
            border-color: #ef4444;
        }
        
        .option-btn.correct {
            background-color: #10b981;
            color: white;
            border-color: #10b981;
        }
        
        .progress-bar {
            transition: width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .modal {
            animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .question-card {
            animation: fadeSlide 0.4s ease forwards;
        }
        
        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200 min-h-screen">
    <div class="max-w-3xl mx-auto">
        <!-- HEADER -->
        <header class="bg-gradient-to-r from-cyan-600 to-teal-600 text-white shadow-2xl">
            <div class="px-6 py-5 flex items-center justify-between">
                <div class="flex items-center gap-x-4">
                    <div class="w-12 h-12 bg-white/20 backdrop-blur-md rounded-3xl flex items-center justify-center text-4xl shadow-inner">
                        🌐
                    </div>
                    <div>
                        <h1 class="title-font text-3xl font-semibold tracking-tighter">Quizzy Pro</h1>
                        <p class="text-cyan-100 text-sm font-medium -mt-1">Unit 1: Introduction to Computer Networks (30 MCQs)</p>
                    </div>
                </div>
                <div class="flex items-center gap-x-3">
                    <div onclick="restartQuiz()" 
                         class="flex items-center gap-x-2 bg-white/20 hover:bg-white/30 transition-colors px-5 py-2.5 rounded-3xl text-sm font-semibold cursor-pointer">
                        <i class="fas fa-redo"></i>
                        <span>Restart</span>
                    </div>
                </div>
            </div>
            
            <!-- PROGRESS -->
            <div class="h-2 bg-black/30 relative">
                <div id="progress-bar" 
                     class="progress-bar h-2 bg-white rounded-r-full w-0"></div>
            </div>
        </header>

        <!-- QUIZ CONTAINER -->
        <div id="quiz-screen" class="p-6">
            <div class="flex justify-between items-center mb-8">
                <div class="flex items-center gap-x-3">
                    <div class="px-5 py-1.5 bg-zinc-900 rounded-3xl text-sm font-mono font-medium text-cyan-400" id="question-counter">1 / 30</div>
                </div>
            </div>

            <!-- QUESTION -->
            <div id="question-card" class="question-card bg-zinc-900 rounded-3xl p-8 shadow-2xl border border-zinc-800">
                <p id="question-text" class="text-2xl leading-tight font-medium text-white"></p>
                
                <!-- OPTIONS -->
                <div id="options-container" class="mt-10 space-y-4"></div>
            </div>

            <!-- NAVIGATION -->
            <div class="flex gap-4 mt-10">
                <button onclick="prevQuestion()" 
                        id="btn-prev"
                        class="flex-1 bg-zinc-900 hover:bg-zinc-800 transition-colors text-white font-semibold py-5 rounded-3xl flex items-center justify-center gap-x-3 shadow-inner">
                    <i class="fas fa-chevron-left"></i>
                    <span>Previous</span>
                </button>
                
                <button onclick="nextQuestion()" 
                        id="btn-next"
                        class="flex-1 bg-gradient-to-r from-cyan-500 to-teal-500 hover:from-cyan-400 hover:to-teal-400 transition-all font-semibold py-5 rounded-3xl flex items-center justify-center gap-x-3 shadow-lg shadow-cyan-500/30">
                    <span id="next-text">Next</span>
                    <i class="fas fa-chevron-right"></i>
                </button>
            </div>
        </div>

        <!-- RESULTS SCREEN -->
        <div id="results-screen" class="hidden p-6">
            <div class="bg-zinc-900 rounded-3xl p-10 text-center">
                <!-- Trophy -->
                <div id="trophy" class="mx-auto w-32 h-32 flex items-center justify-center text-8xl mb-6"></div>
                
                <h2 class="text-6xl font-bold text-white mb-1" id="score">92</h2>
                <p class="text-cyan-400 text-2xl font-semibold">Score • <span id="percentage">92</span>%</p>
                
                <div class="grid grid-cols-3 gap-6 mt-12">
                    <div class="bg-zinc-800 rounded-3xl p-6">
                        <div class="flex items-center justify-center gap-x-3 text-emerald-400">
                            <i class="fas fa-check-circle text-3xl"></i>
                        </div>
                        <div id="correct-count" class="text-5xl font-bold mt-4 text-white">28</div>
                        <div class="text-zinc-400 text-sm font-medium mt-1">CORRECT</div>
                    </div>
                    <div class="bg-zinc-800 rounded-3xl p-6">
                        <div class="flex items-center justify-center gap-x-3 text-red-400">
                            <i class="fas fa-times-circle text-3xl"></i>
                        </div>
                        <div id="incorrect-count" class="text-5xl font-bold mt-4 text-white">1</div>
                        <div class="text-zinc-400 text-sm font-medium mt-1">INCORRECT</div>
                    </div>
                    <div class="bg-zinc-800 rounded-3xl p-6">
                        <div class="flex items-center justify-center gap-x-3 text-amber-400">
                            <i class="fas fa-forward text-3xl"></i>
                        </div>
                        <div id="skipped-count" class="text-5xl font-bold mt-4 text-white">1</div>
                        <div class="text-zinc-400 text-sm font-medium mt-1">SKIPPED</div>
                    </div>
                </div>

                <!-- Insight -->
                <div class="mt-10 bg-zinc-800/70 rounded-3xl p-8 text-left">
                    <p id="insight-text" class="text-zinc-300 leading-relaxed text-lg"></p>
                </div>

                <!-- Actions -->
                <div class="flex flex-col sm:flex-row gap-4 mt-12">
                    <button onclick="showReviewModal()" 
                            class="flex-1 py-6 bg-white text-zinc-900 rounded-3xl font-semibold flex items-center justify-center gap-x-3 hover:scale-105 transition-transform">
                        <i class="fas fa-list-check"></i>
                        REVIEW ALL ANSWERS
                    </button>
                    
                    <button onclick="shareResults()" 
                            class="flex-1 py-6 bg-zinc-800 hover:bg-zinc-700 rounded-3xl font-semibold flex items-center justify-center gap-x-3 transition-colors">
                        <i class="fas fa-share-nodes"></i>
                        SHARE RESULT
                    </button>
                </div>
                
                <button onclick="restartQuiz()" 
                        class="mt-6 w-full py-5 text-cyan-400 font-medium flex items-center justify-center gap-x-2 hover:text-cyan-300">
                    <i class="fas fa-rotate"></i>
                    <span>Restart Quiz</span>
                </button>
            </div>
        </div>
    </div>

    <!-- REVIEW MODAL -->
    <div id="review-modal" onclick="if(event.target.id==='review-modal')hideReviewModal()" 
         class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
        <div onclick="event.stopImmediatePropagation()" 
             class="modal bg-zinc-900 w-full max-w-2xl max-h-[85vh] rounded-3xl shadow-2xl flex flex-col">
            
            <!-- Modal Header -->
            <div class="px-8 py-6 border-b border-zinc-700 flex items-center justify-between">
                <div class="font-semibold text-xl">Review All Answers</div>
                <button onclick="hideReviewModal()" 
                        class="w-9 h-9 flex items-center justify-center text-3xl leading-none text-zinc-400 hover:text-white">×</button>
            </div>
            
            <!-- Content -->
            <div id="review-list" class="flex-1 overflow-auto p-6 space-y-8">
                <!-- JS injected -->
            </div>
            
            <div class="p-6 border-t border-zinc-700">
                <button onclick="hideReviewModal()" 
                        class="w-full py-5 bg-cyan-500 hover:bg-cyan-400 transition-colors rounded-3xl text-white font-semibold">
                    Close Review
                </button>
            </div>
        </div>
    </div>

    <script>
        // ====================== ORIGINAL QUESTIONS (30 exact from PDF) ======================
        const originalQuestions = [
            {
                question: "What is the definition of a computer network?",
                options: [
                    "A single computer connected to the internet",
                    "An infrastructure that connects two or more computers and devices (nodes) together to facilitate data communication and resource sharing",
                    "Only wireless devices communicating",
                    "A collection of cables only"
                ],
                correctAnswer: "An infrastructure that connects two or more computers and devices (nodes) together to facilitate data communication and resource sharing"
            },
            {
                question: "What is the purpose of a computer network, as compared to a highway system?",
                options: [
                    "To store data permanently",
                    "It provides the foundational pathway for data to travel from sender to receiver",
                    "To print documents",
                    "To play games only"
                ],
                correctAnswer: "It provides the foundational pathway for data to travel from sender to receiver"
            },
            {
                question: "Which is a hardware component of the network infrastructure?",
                options: [
                    "Protocols only",
                    "NIC (wired/wireless), cables, switches, routers",
                    "Email applications",
                    "Social media platforms"
                ],
                correctAnswer: "NIC (wired/wireless), cables, switches, routers"
            },
            {
                question: "Which is a software component of the network infrastructure?",
                options: [
                    "Cables and routers",
                    "Protocols and network operating systems",
                    "Physical hard drives",
                    "Printers"
                ],
                correctAnswer: "Protocols and network operating systems"
            },
            {
                question: "What are transmission media in a computer network?",
                options: [
                    "Only software rules",
                    "The physical path (guided like cables, unguided like radio waves)",
                    "User applications",
                    "Central servers only"
                ],
                correctAnswer: "The physical path (guided like cables, unguided like radio waves)"
            },
            {
                question: "What is the function of a computer network?",
                options: [
                    "Only to play online games",
                    "It governs how data is formatted, addressed, transmitted, and received, ensuring all devices can communicate effectively",
                    "To store movies only",
                    "To design websites"
                ],
                correctAnswer: "It governs how data is formatted, addressed, transmitted, and received, ensuring all devices can communicate effectively"
            },
            {
                question: "Which is a Business Application of computer networks?",
                options: [
                    "Streaming Netflix",
                    "Resource Sharing: Sharing hardware (printers, scanners) and software across an organization",
                    "Online gaming",
                    "Social media posting"
                ],
                correctAnswer: "Resource Sharing: Sharing hardware (printers, scanners) and software across an organization"
            },
            {
                question: "Which communication application uses SMTP?",
                options: [
                    "Video calls",
                    "Email (SMTP): Primary mode of professional and personal written communication",
                    "Online shopping",
                    "Streaming music"
                ],
                correctAnswer: "Email (SMTP): Primary mode of professional and personal written communication"
            },
            {
                question: "Which is an E-commerce Application of computer networks?",
                options: [
                    "Online learning portals",
                    "Online Transactions: Enabling financial transactions, online banking, and shopping",
                    "Video conferencing only",
                    "Resource sharing in offices"
                ],
                correctAnswer: "Online Transactions: Enabling financial transactions, online banking, and shopping"
            },
            {
                question: "Which entertainment application uses platforms like Netflix and YouTube?",
                options: [
                    "Email communication",
                    "Streaming Services: On-demand video (Netflix, YouTube) and music (Spotify) streaming",
                    "Centralized data management",
                    "LAN in college labs"
                ],
                correctAnswer: "Streaming Services: On-demand video (Netflix, YouTube) and music (Spotify) streaming"
            },
            {
                question: "Which is an Educational Application of computer networks?",
                options: [
                    "Online gaming",
                    "Online learning platforms (Coursera, TU e-Learning portal), virtual classrooms, and access to digital libraries",
                    "VoIP calls",
                    "Digital marketing"
                ],
                correctAnswer: "Online learning platforms (Coursera, TU e-Learning portal), virtual classrooms, and access to digital libraries"
            },
            {
                question: "What is the concept of Client-Server Architecture?",
                options: [
                    "All devices are equal with no central server",
                    "A central, powerful server provides services and multiple clients request these services",
                    "Only peer-to-peer file sharing",
                    "Wireless only networks"
                ],
                correctAnswer: "A central, powerful server provides services and multiple clients request these services"
            },
            {
                question: "Which is the exact Real-World Example given for Client-Server Architecture?",
                options: [
                    "Bluetooth file sharing between mobiles",
                    "Accessing the TU exam form portal. Your laptop (client) requests the form from the TU server",
                    "BitTorrent downloads",
                    "Home Wi-Fi only"
                ],
                correctAnswer: "Accessing the TU exam form portal. Your laptop (client) requests the form from the TU server"
            },
            {
                question: "What is an advantage of Client-Server Architecture?",
                options: [
                    "No single point of failure",
                    "Centralized management, better security, high performance",
                    "Inexpensive setup",
                    "Decentralized management"
                ],
                correctAnswer: "Centralized management, better security, high performance"
            },
            {
                question: "What is the concept of Peer-to-Peer (P2P) Architecture?",
                options: [
                    "Central server provides all services",
                    "All devices have equal status and can both request and provide services. There is no central server",
                    "Only used for email",
                    "High cost infrastructure"
                ],
                correctAnswer: "All devices have equal status and can both request and provide services. There is no central server"
            },
            {
                question: "Which is the exact Real-World Example given for P2P Architecture?",
                options: [
                    "TU exam portal",
                    "Sharing files via Bluetooth between two mobiles or using BitTorrent for downloads",
                    "Netflix streaming",
                    "Company database servers"
                ],
                correctAnswer: "Sharing files via Bluetooth between two mobiles or using BitTorrent for downloads"
            },
            {
                question: "What is the geographical span of a Local Area Network (LAN)?",
                options: [
                    "Entire country",
                    "Small area like a room, building, or campus (typically up to 2 miles)",
                    "City-wide",
                    "Global continents"
                ],
                correctAnswer: "Small area like a room, building, or campus (typically up to 2 miles)"
            },
            {
                question: "Which is the exact Real-World Example given for LAN?",
                options: [
                    "The Internet",
                    "Computer lab in your BCA college, a cyber cafe, or a home network",
                    "Cable TV network in a city",
                    "Bank branches across Nepal"
                ],
                correctAnswer: "Computer lab in your BCA college, a cyber cafe, or a home network"
            },
            {
                question: "What is the geographical span of a Metropolitan Area Network (MAN)?",
                options: [
                    "Small room only",
                    "Covers a city or town (larger than LAN, smaller than WAN)",
                    "Global only",
                    "Single building"
                ],
                correctAnswer: "Covers a city or town (larger than LAN, smaller than WAN)"
            },
            {
                question: "Which is the exact Real-World Example given for MAN?",
                options: [
                    "Home Wi-Fi",
                    "Cable TV network connecting a whole city, or the network connecting different branches of a bank within Kathmandu valley",
                    "International university links",
                    "Bluetooth pairing"
                ],
                correctAnswer: "Cable TV network connecting a whole city, or the network connecting different branches of a bank within Kathmandu valley"
            },
            {
                question: "What is the geographical span of a Wide Area Network (WAN)?",
                options: [
                    "Single building",
                    "Covers large geographical areas like countries or continents",
                    "City only",
                    "Campus only"
                ],
                correctAnswer: "Covers large geographical areas like countries or continents"
            },
            {
                question: "Which is the exact Real-World Example given for WAN?",
                options: [
                    "College lab network",
                    "The Internet itself is the largest WAN. Connection between TU Central Library and a university in the USA",
                    "Home Bluetooth",
                    "Local cyber cafe"
                ],
                correctAnswer: "The Internet itself is the largest WAN. Connection between TU Central Library and a university in the USA"
            },
            {
                question: "What is the definition of Protocols in computer networks?",
                options: [
                    "Physical cables only",
                    "A set of rules governing data communication. It defines what, how, and when to communicate",
                    "Only email applications",
                    "Hardware components"
                ],
                correctAnswer: "A set of rules governing data communication. It defines what, how, and when to communicate"
            },
            {
                question: "What is the 'Syntax' element of a Protocol?",
                options: [
                    "Meaning of each section of bits",
                    "Structure or format of the data (e.g., first 8 bits are sender's address)",
                    "When data should be sent",
                    "Only timing"
                ],
                correctAnswer: "Structure or format of the data (e.g., first 8 bits are sender's address)"
            },
            {
                question: "What is the 'Semantics' element of a Protocol?",
                options: [
                    "Structure of data",
                    "Meaning of each section of bits (e.g., what does a specific pattern mean?)",
                    "Speed of transmission",
                    "Only hardware"
                ],
                correctAnswer: "Meaning of each section of bits (e.g., what does a specific pattern mean?)"
            },
            {
                question: "What is the 'Timing' element of a Protocol?",
                options: [
                    "Format of data",
                    "When data should be sent and how fast (synchronization and speed matching)",
                    "Meaning of bits",
                    "Only physical cables"
                ],
                correctAnswer: "When data should be sent and how fast (synchronization and speed matching)"
            },
            {
                question: "Which is the exact Real-World Example given for the protocol of conversation?",
                options: [
                    "A person asking 'How are you?' expects a reply about well-being, not their shoe size",
                    "Ethernet cabling",
                    "IP addressing",
                    "HTTP requests"
                ],
                correctAnswer: "A person asking 'How are you?' expects a reply about well-being, not their shoe size"
            },
            {
                question: "What is a De Facto Standard?",
                options: [
                    "Officially legislated by ISO",
                    "Standards that have happened by history or widespread use, not officially approved (e.g., HTTP, Ethernet)",
                    "Only OSI model",
                    "Physical layer only"
                ],
                correctAnswer: "Standards that have happened by history or widespread use, not officially approved (e.g., HTTP, Ethernet)"
            },
            {
                question: "What is a De Jure Standard?",
                options: [
                    "Widespread use only",
                    "Standards legislated by an official recognized body (e.g., OSI model by ISO)",
                    "Only TCP/IP",
                    "Bluetooth"
                ],
                correctAnswer: "Standards legislated by an official recognized body (e.g., OSI model by ISO)"
            },
            {
                question: "How many layers does the OSI Reference Model have?",
                options: [
                    "4 layers",
                    "7 layers",
                    "5 layers",
                    "10 layers"
                ],
                correctAnswer: "7 layers"
            },
            {
                question: "What is the PDU (Protocol Data Unit) and a key function of the Physical Layer in the OSI model?",
                options: [
                    "Frame - Error control",
                    "Bits - Transmission of raw bit stream over physical medium",
                    "Packet - Routing",
                    "Segment - End-to-end connection"
                ],
                correctAnswer: "Bits - Transmission of raw bit stream over physical medium"
            }
        ];

        // ====================== QUIZ STATE ======================
        let shuffledQuestions = [];
        let currentIndex = 0;
        let userAnswers = [];
        let isAnswered = [];

        function shuffleArray(array) {
            let arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function prepareShuffledQuestions() {
            shuffledQuestions = originalQuestions.map(q => {
                const shuffledOpts = shuffleArray(q.options);
                const correctIndex = shuffledOpts.indexOf(q.correctAnswer);
                return {
                    question: q.question,
                    options: shuffledOpts,
                    correctIndex: correctIndex
                };
            });
        }

        function renderQuestion() {
            const q = shuffledQuestions[currentIndex];
            
            document.getElementById("question-counter").textContent = `${currentIndex + 1} / 30`;
            document.getElementById("question-text").textContent = q.question;
            
            const container = document.getElementById("options-container");
            container.innerHTML = "";
            
            const labels = ["A", "B", "C", "D"];
            
            q.options.forEach((option, idx) => {
                const btn = document.createElement("button");
                btn.className = `option-btn w-full text-left px-7 py-6 rounded-3xl border-2 border-zinc-700 bg-zinc-800 hover:border-cyan-400 transition-all flex items-start gap-4 group`;
                btn.innerHTML = `
                    <span class="w-8 h-8 flex-shrink-0 rounded-2xl bg-zinc-700 text-cyan-400 font-bold flex items-center justify-center text-lg transition-colors group-hover:bg-cyan-400 group-hover:text-white">${labels[idx]}</span>
                    <span class="text-lg leading-tight">${option}</span>
                `;
                
                btn.onclick = () => selectOption(idx);
                container.appendChild(btn);
            });
            
            updateProgress();
            updateNavigation();
            
            if (isAnswered[currentIndex]) {
                showFeedback();
            }
        }

        function selectOption(selectedIdx) {
            if (isAnswered[currentIndex]) return;
            
            isAnswered[currentIndex] = true;
            userAnswers[currentIndex] = selectedIdx;
            
            showFeedback();
            updateNavigation();
        }

        function showFeedback() {
            const q = shuffledQuestions[currentIndex];
            const container = document.getElementById("options-container");
            const buttons = container.children;
            const userChoice = userAnswers[currentIndex];
            
            for (let i = 0; i < buttons.length; i++) {
                const btn = buttons[i];
                
                if (i === q.correctIndex) {
                    btn.classList.add("correct");
                    btn.innerHTML += `<span class="ml-auto text-white text-2xl">✓</span>`;
                }
                
                if (i === userChoice) {
                    if (userChoice === q.correctIndex) {
                        btn.classList.add("selected-correct");
                    } else {
                        btn.classList.add("selected-wrong");
                        btn.innerHTML += `<span class="ml-auto text-white text-2xl">✕</span>`;
                    }
                }
                
                btn.onclick = null;
                btn.style.cursor = "default";
            }
        }

        function updateProgress() {
            const progress = ((currentIndex + 1) / 30) * 100;
            document.getElementById("progress-bar").style.width = `${progress}%`;
        }

        function updateNavigation() {
            const prevBtn = document.getElementById("btn-prev");
            const nextBtn = document.getElementById("btn-next");
            const nextText = document.getElementById("next-text");
            
            prevBtn.disabled = currentIndex === 0;
            prevBtn.style.opacity = currentIndex === 0 ? "0.4" : "1";
            
            if (currentIndex === 29) {
                nextText.textContent = "Finish Quiz";
            } else {
                nextText.textContent = "Next";
            }
        }

        function nextQuestion() {
            if (currentIndex < 29) {
                currentIndex++;
                renderQuestion();
            } else {
                showResults();
            }
        }

        function prevQuestion() {
            if (currentIndex > 0) {
                currentIndex--;
                renderQuestion();
            }
        }

        function calculateResults() {
            let correct = 0;
            let incorrect = 0;
            let skipped = 0;
            
            for (let i = 0; i < 30; i++) {
                if (!isAnswered[i]) {
                    skipped++;
                } else if (userAnswers[i] === shuffledQuestions[i].correctIndex) {
                    correct++;
                } else {
                    incorrect++;
                }
            }
            
            const percentage = Math.round((correct / 30) * 100);
            return { correct, incorrect, skipped, percentage };
        }

        function showResults() {
            document.getElementById("quiz-screen").classList.add("hidden");
            const resultsScreen = document.getElementById("results-screen");
            resultsScreen.classList.remove("hidden");
            
            const stats = calculateResults();
            
            document.getElementById("score").textContent = stats.correct;
            document.getElementById("percentage").textContent = stats.percentage;
            document.getElementById("correct-count").textContent = stats.correct;
            document.getElementById("incorrect-count").textContent = stats.incorrect;
            document.getElementById("skipped-count").textContent = stats.skipped;
            
            const trophyEl = document.getElementById("trophy");
            if (stats.percentage >= 80) {
                trophyEl.innerHTML = "🏆";
            } else if (stats.percentage >= 60) {
                trophyEl.innerHTML = "🎉";
            } else {
                trophyEl.innerHTML = "🌐";
            }
            
            let insight = "";
            if (stats.percentage >= 90) {
                insight = "Outstanding performance! You have completely mastered network infrastructure, architecture, types, protocols, OSI model, TCP/IP, and their comparisons.";
            } else if (stats.percentage >= 75) {
                insight = "Excellent work! Strong understanding of client-server vs P2P, LAN/MAN/WAN, and the 7 layers of OSI.";
            } else if (stats.percentage >= 60) {
                insight = "Good job! Solid grasp of the fundamentals. Review PDU names, layer functions, and critiques of both models.";
            } else {
                insight = "Keep learning! Focus on the 7 OSI layers and how TCP/IP maps to them.";
            }
            document.getElementById("insight-text").innerHTML = insight;
        }

        function showReviewModal() {
            const modal = document.getElementById("review-modal");
            const list = document.getElementById("review-list");
            list.innerHTML = "";
            
            shuffledQuestions.forEach((q, i) => {
                const answered = isAnswered[i];
                const userIdx = userAnswers[i];
                const isCorrect = answered && (userIdx === q.correctIndex);
                
                const div = document.createElement("div");
                div.className = "border border-zinc-700 rounded-3xl p-6";
                div.innerHTML = `
                    <div class="flex items-start justify-between">
                        <div class="flex-1">
                            <div class="flex items-center gap-x-3">
                                <span class="font-mono text-xs bg-zinc-800 px-3 py-1 rounded-2xl">${i+1}</span>
                                <p class="font-medium text-white leading-tight">${q.question}</p>
                            </div>
                            
                            <div class="mt-6 grid grid-cols-1 gap-4">
                                ${q.options.map((opt, idx) => {
                                    let statusHTML = "";
                                    if (answered && idx === userIdx) {
                                        statusHTML = isCorrect 
                                            ? `<span class="text-emerald-400 text-xs font-bold">YOUR ANSWER ✓</span>` 
                                            : `<span class="text-red-400 text-xs font-bold">YOUR ANSWER ✕</span>`;
                                    }
                                    if (idx === q.correctIndex) {
                                        statusHTML += ` <span class="text-emerald-400 text-xs font-bold">CORRECT</span>`;
                                    }
                                    return `
                                        <div class="flex justify-between items-center ${idx === q.correctIndex ? 'text-emerald-400' : 'text-zinc-300'}">
                                            <span>${String.fromCharCode(65 + idx)}. ${opt}</span>
                                            ${statusHTML}
                                        </div>
                                    `;
                                }).join("")}
                            </div>
                        </div>
                    </div>
                `;
                list.appendChild(div);
            });
            
            modal.classList.remove("hidden");
            modal.classList.add("flex");
        }

        function hideReviewModal() {
            const modal = document.getElementById("review-modal");
            modal.classList.add("hidden");
            modal.classList.remove("flex");
        }

        function shareResults() {
            const stats = calculateResults();
            const text = `🌐 I just scored ${stats.percentage}% on Quizzy Pro • Unit 1: Introduction to Computer Networks!\n\n✅ Correct: ${stats.correct}\n❌ Incorrect: ${stats.incorrect}\n⏭️ Skipped: ${stats.skipped}\n\nMastered OSI, TCP/IP, LAN/WAN & protocols? Try Quizzy Pro!`;
            
            navigator.clipboard.writeText(text).then(() => {
                const btn = event.currentTarget;
                const origHTML = btn.innerHTML;
                btn.innerHTML = `<i class="fas fa-check"></i> COPIED!`;
                setTimeout(() => btn.innerHTML = origHTML, 2000);
            });
        }

        function restartQuiz() {
            currentIndex = 0;
            userAnswers = new Array(30).fill(null);
            isAnswered = new Array(30).fill(false);
            
            prepareShuffledQuestions();
            
            document.getElementById("quiz-screen").classList.remove("hidden");
            document.getElementById("results-screen").classList.add("hidden");
            
            renderQuestion();
            
            console.log("%cQuizzy Pro • Unit 1: Introduction to Computer Networks restarted with fresh random order!", "color:#67e8f9; font-weight:600");
        }

        function handleKeyboard(e) {
            if (!document.getElementById("results-screen").classList.contains("hidden")) return;
            
            if (e.key === "ArrowRight") nextQuestion();
            if (e.key === "ArrowLeft") prevQuestion();
            if (e.key >= "1" && e.key <= "4" && !isAnswered[currentIndex]) {
                selectOption(parseInt(e.key) - 1);
            }
        }

        function startQuiz() {
            prepareShuffledQuestions();
            userAnswers = new Array(30).fill(null);
            isAnswered = new Array(30).fill(false);
            currentIndex = 0;
            
            renderQuestion();
            document.addEventListener("keydown", handleKeyboard);
            
            console.log("%c✅ Quizzy Pro • Unit 1: Introduction to Computer Networks loaded successfully! (30 MCQs from official PDF)", "color:#67e8f9; font-family:monospace; font-size:13px");
        }

        window.onload = function() {
            startQuiz();
        };
    </script>
</body>
</html>
