<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizzy Pro • Unit 7: Network Security (30 MCQs)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Inter:wght@400;500;600&display=swap');
       
        :root {
            --primary: 129 140 248;
        }
       
        body {
            font-family: 'Inter', system_ui, sans-serif;
        }
       
        .title-font {
            font-family: 'Poppins', sans-serif;
        }
        .option-btn {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
       
        .option-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 15px -3px rgb(129 140 248 / 0.3);
        }
       
        .option-btn.selected-correct {
            background-color: #10b981;
            color: white;
            border-color: #10b981;
        }
       
        .option-btn.selected-wrong {
            background-color: #ef4444;
            color: white;
            border-color: #ef4444;
        }
       
        .option-btn.correct {
            background-color: #10b981;
            color: white;
            border-color: #10b981;
        }
       
        .progress-bar {
            transition: width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .modal {
            animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
       
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .question-card {
            animation: fadeSlide 0.4s ease forwards;
        }
       
        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200 min-h-screen">
    <div class="max-w-3xl mx-auto">
        <!-- HEADER -->
        <header class="bg-gradient-to-r from-indigo-600 to-violet-600 text-white shadow-2xl">
            <div class="px-6 py-5 flex items-center justify-between">
                <div class="flex items-center gap-x-4">
                    <div class="w-12 h-12 bg-white/20 backdrop-blur-md rounded-3xl flex items-center justify-center text-4xl shadow-inner">
                        🛡️
                    </div>
                    <div>
                        <h1 class="title-font text-3xl font-semibold tracking-tighter">Quizzy Pro</h1>
                        <p class="text-indigo-100 text-sm font-medium -mt-1">Unit 7: Network Security (30 MCQs)</p>
                    </div>
                </div>
                <div onclick="restartQuiz()"
                     class="flex items-center gap-x-2 bg-white/20 hover:bg-white/30 transition-colors px-5 py-2.5 rounded-3xl text-sm font-semibold cursor-pointer">
                    <i class="fas fa-redo"></i>
                    <span>Restart</span>
                </div>
            </div>
           
            <!-- PROGRESS -->
            <div class="h-2 bg-black/30 relative">
                <div id="progress-bar"
                     class="progress-bar h-2 bg-white rounded-r-full w-0"></div>
            </div>
        </header>
        <!-- QUIZ CONTAINER -->
        <div id="quiz-screen" class="p-6">
            <div class="flex justify-center items-center mb-8">
                <div class="px-5 py-1.5 bg-zinc-900 rounded-3xl text-sm font-mono font-medium text-indigo-400" id="question-counter">1 / 30</div>
            </div>
            <!-- QUESTION -->
            <div id="question-card" class="question-card bg-zinc-900 rounded-3xl p-8 shadow-2xl border border-zinc-800">
                <p id="question-text" class="text-2xl leading-tight font-medium text-white"></p>
               
                <!-- OPTIONS -->
                <div id="options-container" class="mt-10 space-y-4"></div>
            </div>
            <!-- NAVIGATION -->
            <div class="flex gap-4 mt-10">
                <button onclick="prevQuestion()"
                        id="btn-prev"
                        class="flex-1 bg-zinc-900 hover:bg-zinc-800 transition-colors text-white font-semibold py-5 rounded-3xl flex items-center justify-center gap-x-3 shadow-inner">
                    <i class="fas fa-chevron-left"></i>
                    <span>Previous</span>
                </button>
               
                <button onclick="nextQuestion()"
                        id="btn-next"
                        class="flex-1 bg-gradient-to-r from-indigo-500 to-violet-500 hover:from-indigo-400 hover:to-violet-400 transition-all font-semibold py-5 rounded-3xl flex items-center justify-center gap-x-3 shadow-lg shadow-indigo-500/30">
                    <span id="next-text">Next</span>
                    <i class="fas fa-chevron-right"></i>
                </button>
            </div>
        </div>
        <!-- RESULTS SCREEN -->
        <div id="results-screen" class="hidden p-6">
            <div class="bg-zinc-900 rounded-3xl p-10 text-center">
                <div id="trophy" class="mx-auto w-32 h-32 flex items-center justify-center text-8xl mb-6"></div>
               
                <h2 class="text-6xl font-bold text-white mb-1" id="score">92</h2>
                <p class="text-indigo-400 text-2xl font-semibold">Score • <span id="percentage">92</span>%</p>
               
                <div class="grid grid-cols-3 gap-6 mt-12">
                    <div class="bg-zinc-800 rounded-3xl p-6">
                        <div class="flex items-center justify-center gap-x-3 text-emerald-400">
                            <i class="fas fa-check-circle text-3xl"></i>
                        </div>
                        <div id="correct-count" class="text-5xl font-bold mt-4 text-white">28</div>
                        <div class="text-zinc-400 text-sm font-medium mt-1">CORRECT</div>
                    </div>
                    <div class="bg-zinc-800 rounded-3xl p-6">
                        <div class="flex items-center justify-center gap-x-3 text-red-400">
                            <i class="fas fa-times-circle text-3xl"></i>
                        </div>
                        <div id="incorrect-count" class="text-5xl font-bold mt-4 text-white">1</div>
                        <div class="text-zinc-400 text-sm font-medium mt-1">INCORRECT</div>
                    </div>
                    <div class="bg-zinc-800 rounded-3xl p-6">
                        <div class="flex items-center justify-center gap-x-3 text-amber-400">
                            <i class="fas fa-forward text-3xl"></i>
                        </div>
                        <div id="skipped-count" class="text-5xl font-bold mt-4 text-white">1</div>
                        <div class="text-zinc-400 text-sm font-medium mt-1">SKIPPED</div>
                    </div>
                </div>
                <div class="mt-10 bg-zinc-800/70 rounded-3xl p-8 text-left">
                    <p id="insight-text" class="text-zinc-300 leading-relaxed text-lg"></p>
                </div>
                <div class="flex flex-col sm:flex-row gap-4 mt-12">
                    <button onclick="showReviewModal()"
                            class="flex-1 py-6 bg-white text-zinc-900 rounded-3xl font-semibold flex items-center justify-center gap-x-3 hover:scale-105 transition-transform">
                        <i class="fas fa-list-check"></i>
                        REVIEW ALL ANSWERS
                    </button>
                   
                    <button onclick="shareResults()"
                            class="flex-1 py-6 bg-zinc-800 hover:bg-zinc-700 rounded-3xl font-semibold flex items-center justify-center gap-x-3 transition-colors">
                        <i class="fas fa-share-nodes"></i>
                        SHARE RESULT
                    </button>
                </div>
               
                <button onclick="restartQuiz()"
                        class="mt-6 w-full py-5 text-indigo-400 font-medium flex items-center justify-center gap-x-2 hover:text-indigo-300">
                    <i class="fas fa-rotate"></i>
                    <span>Restart Quiz</span>
                </button>
            </div>
        </div>
    </div>
    <!-- REVIEW MODAL -->
    <div id="review-modal" onclick="if(event.target.id==='review-modal')hideReviewModal()"
         class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
        <div onclick="event.stopImmediatePropagation()"
             class="modal bg-zinc-900 w-full max-w-2xl max-h-[85vh] rounded-3xl shadow-2xl flex flex-col">
            <div class="px-8 py-6 border-b border-zinc-700 flex items-center justify-between">
                <div class="font-semibold text-xl">Review All Answers</div>
                <button onclick="hideReviewModal()"
                        class="w-9 h-9 flex items-center justify-center text-3xl leading-none text-zinc-400 hover:text-white">×</button>
            </div>
           
            <div id="review-list" class="flex-1 overflow-auto p-6 space-y-8"></div>
           
            <div class="p-6 border-t border-zinc-700">
                <button onclick="hideReviewModal()"
                        class="w-full py-5 bg-indigo-500 hover:bg-indigo-400 transition-colors rounded-3xl text-white font-semibold">
                    Close Review
                </button>
            </div>
        </div>
    </div>
    <script>
        const originalQuestions = [
            { question: "In the network security model, a Trusted Third Party is typically used for", options: ["Encrypting data", "Key distribution or certificate issuance", "Packet filtering", "Traffic padding"], answer: 1 },
            { question: "Passive attacks primarily involve", options: ["Modifying data in transit", "Eavesdropping or traffic analysis", "Denial of service", "Masquerading"], answer: 1 },
            { question: "According to X.800, which service prevents denial of previous actions?", options: ["Data Confidentiality", "Non-Repudiation", "Access Control", "Availability"], answer: 1 },
            { question: "Kerckhoffs's Principle states that security should rely only on", options: ["The algorithm being secret", "The secrecy of the key", "Both algorithm and key", "Hardware protection"], answer: 1 },
            { question: "Symmetric key cryptography uses", options: ["Two different keys", "The same key for encryption and decryption", "Only public keys", "Mathematical problems like factorization"], answer: 1 },
            { question: "AES operates as a", options: ["Stream cipher", "Block cipher", "Hash function", "Digital signature"], answer: 1 },
            { question: "Which block cipher mode provides both encryption and authentication?", options: ["ECB", "CBC", "CTR", "GCM"], answer: 3 },
            { question: "The primary disadvantage of symmetric cryptography is", options: ["Slow performance", "Key distribution problem", "Large key sizes", "Quantum vulnerability"], answer: 1 },
            { question: "In public-key cryptography, the public key is used for", options: ["Decryption and signing", "Encryption and signature verification", "Both encryption and decryption", "Only hashing"], answer: 1 },
            { question: "RSA security is based on the difficulty of", options: ["Discrete logarithm", "Elliptic curve log", "Integer factorization", "SHA-256 collisions"], answer: 2 },
            { question: "In RSA key generation, φ(n) is calculated as", options: ["p + q", "(p-1)(q-1)", "p × q", "e × d mod n"], answer: 1 },
            { question: "Hybrid cryptography in TLS/SSL uses asymmetric for", options: ["Bulk data encryption", "Key exchange only", "Hashing", "Digital signatures only"], answer: 1 },
            { question: "Compared to RSA, ECC provides equivalent security with", options: ["Larger keys", "Much smaller keys", "Same key sizes", "Slower performance"], answer: 1 },
            { question: "A digital signature provides", options: ["Only confidentiality", "Authentication, integrity and non-repudiation", "Only encryption", "Traffic padding"], answer: 1 },
            { question: "In the digital signature process, the message is first", options: ["Encrypted with public key", "Hashed then signed with private key", "Encrypted with symmetric key", "Padded with random data"], answer: 1 },
            { question: "Which algorithm is recommended for modern digital signatures due to speed and constant-time execution?", options: ["RSA", "DSA", "EdDSA (Ed25519)", "SHA-256"], answer: 2 },
            { question: "NIST post-quantum standard FIPS 204 uses", options: ["ML-DSA (CRYSTALS-Dilithium)", "ECDSA", "RSA", "WEP"], answer: 0 },
            { question: "IPSec ESP provides", options: ["Authentication only", "Both confidentiality and integrity", "Only integrity", "Traffic analysis protection"], answer: 1 },
            { question: "IPSec Transport mode is typically used for", options: ["Gateway-to-gateway VPN", "Host-to-host communication", "Remote access", "Site-to-site"], answer: 1 },
            { question: "IKE is used in IPSec for", options: ["Packet filtering", "Automated key management", "Deep packet inspection", "Wireless encryption"], answer: 1 },
            { question: "Site-to-Site VPN is used to connect", options: ["Individual users", "Entire networks (branch to HQ)", "Only mobile devices", "IoT devices only"], answer: 1 },
            { question: "Which VPN protocol is considered the most secure and stable in 2025 research?", options: ["PPTP", "L2TP/IPSec", "SSTP", "WEP"], answer: 1 },
            { question: "Next-Generation Firewall (NGFW) operates at layers", options: ["3 only", "3-7 with application awareness", "2 only", "7 only"], answer: 1 },
            { question: "WPA3 uses", options: ["TKIP", "SAE for key exchange", "WEP", "4-way handshake only"], answer: 1 },
            { question: "The KRACK attack targets", options: ["WPA3 management frames", "WPA2 4-way handshake", "IPSec ESP", "RSA padding"], answer: 1 },
            { question: "In wireless security best practices, IoT devices should be placed on", options: ["Main network", "Guest network", "DMZ only", "VPN tunnel"], answer: 1 },
            { question: "A firewall rule primarily contains", options: ["Only source IP", "Source IP, destination IP, ports, protocol and action", "Only passwords", "Encryption keys"], answer: 1 },
            { question: "DMZ architecture is used to", options: ["Protect internal network from public servers", "Speed up traffic", "Encrypt all packets", "Hide SSID"], answer: 0 },
            { question: "Which security service uses hash functions and MAC for protection?", options: ["Non-Repudiation", "Data Integrity", "Availability", "Authentication Exchange"], answer: 1 },
            { question: "Shor's algorithm on quantum computers breaks", options: ["AES-256", "RSA and ECC", "SHA-256", "WPA3 SAE"], answer: 1 }
        ];

        let shuffledQuestions = [];
        let currentIndex = 0;
        let userAnswers = [];
        let isAnswered = [];

        function shuffleArray(array) {
            let arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function prepareShuffledQuestions() {
            shuffledQuestions = originalQuestions.map(q => {
                const shuffledOpts = shuffleArray(q.options);
                const correctIndex = shuffledOpts.indexOf(q.options[q.answer]);
                return {
                    question: q.question,
                    options: shuffledOpts,
                    correctIndex: correctIndex
                };
            });
        }

        function renderQuestion() {
            const q = shuffledQuestions[currentIndex];
            document.getElementById("question-counter").textContent = `${currentIndex + 1} / 30`;
            document.getElementById("question-text").textContent = q.question;
           
            const container = document.getElementById("options-container");
            container.innerHTML = "";
            const labels = ["A", "B", "C", "D"];
           
            q.options.forEach((option, idx) => {
                const btn = document.createElement("button");
                btn.className = `option-btn w-full text-left px-7 py-6 rounded-3xl border-2 border-zinc-700 bg-zinc-800 hover:border-indigo-400 transition-all flex items-start gap-4 group`;
                btn.innerHTML = `
                    <span class="w-8 h-8 flex-shrink-0 rounded-2xl bg-zinc-700 text-indigo-400 font-bold flex items-center justify-center text-lg transition-colors group-hover:bg-indigo-400 group-hover:text-white">${labels[idx]}</span>
                    <span class="text-lg leading-tight">${option}</span>
                `;
                btn.onclick = () => selectOption(idx);
                container.appendChild(btn);
            });
           
            updateProgress();
            updateNavigation();
            if (isAnswered[currentIndex]) showFeedback();
        }

        function selectOption(selectedIdx) {
            if (isAnswered[currentIndex]) return;
            isAnswered[currentIndex] = true;
            userAnswers[currentIndex] = selectedIdx;
            showFeedback();
            updateNavigation();
        }

        function showFeedback() {
            const q = shuffledQuestions[currentIndex];
            const container = document.getElementById("options-container");
            const buttons = container.children;
            const userChoice = userAnswers[currentIndex];
           
            for (let i = 0; i < buttons.length; i++) {
                const btn = buttons[i];
                if (i === q.correctIndex) {
                    btn.classList.add("correct");
                    btn.innerHTML += `<span class="ml-auto text-white text-2xl">✓</span>`;
                }
                if (i === userChoice) {
                    if (userChoice === q.correctIndex) {
                        btn.classList.add("selected-correct");
                    } else {
                        btn.classList.add("selected-wrong");
                        btn.innerHTML += `<span class="ml-auto text-white text-2xl">✕</span>`;
                    }
                }
                btn.onclick = null;
                btn.style.cursor = "default";
            }
        }

        function updateProgress() {
            const progress = ((currentIndex + 1) / 30) * 100;
            document.getElementById("progress-bar").style.width = `${progress}%`;
        }

        function updateNavigation() {
            const prevBtn = document.getElementById("btn-prev");
            const nextText = document.getElementById("next-text");
            prevBtn.disabled = currentIndex === 0;
            prevBtn.style.opacity = currentIndex === 0 ? "0.4" : "1";
            nextText.textContent = currentIndex === 29 ? "Finish Quiz" : "Next";
        }

        function nextQuestion() {
            if (currentIndex < 29) {
                currentIndex++;
                renderQuestion();
            } else {
                showResults();
            }
        }

        function prevQuestion() {
            if (currentIndex > 0) {
                currentIndex--;
                renderQuestion();
            }
        }

        function calculateResults() {
            let correct = 0, incorrect = 0, skipped = 0;
            for (let i = 0; i < 30; i++) {
                if (!isAnswered[i]) skipped++;
                else if (userAnswers[i] === shuffledQuestions[i].correctIndex) correct++;
                else incorrect++;
            }
            const percentage = Math.round((correct / 30) * 100);
            return { correct, incorrect, skipped, percentage };
        }

        function showResults() {
            document.getElementById("quiz-screen").classList.add("hidden");
            const resultsScreen = document.getElementById("results-screen");
            resultsScreen.classList.remove("hidden");
           
            const stats = calculateResults();
            document.getElementById("score").textContent = stats.correct;
            document.getElementById("percentage").textContent = stats.percentage;
            document.getElementById("correct-count").textContent = stats.correct;
            document.getElementById("incorrect-count").textContent = stats.incorrect;
            document.getElementById("skipped-count").textContent = stats.skipped;
           
            const trophyEl = document.getElementById("trophy");
            trophyEl.innerHTML = stats.percentage >= 80 ? "🏆" : stats.percentage >= 60 ? "🎉" : "🛡️";
           
            let insight = stats.percentage >= 90 ? "Masterful command of cryptography, IPSec, digital signatures and wireless security! Ready for any network security exam." :
                          stats.percentage >= 75 ? "Strong grasp of RSA, VPN protocols, firewalls and WPA3. Review post-quantum signatures and IPSec modes." :
                          stats.percentage >= 60 ? "Solid effort. Focus on symmetric vs asymmetric differences, digital signature process and firewall types." :
                          "Critical review needed — concentrate on security model components, RSA math, WPA evolution and IPSec ESP vs AH.";
            document.getElementById("insight-text").innerHTML = insight;
        }

        function showReviewModal() {
            const modal = document.getElementById("review-modal");
            const list = document.getElementById("review-list");
            list.innerHTML = "";
           
            shuffledQuestions.forEach((q, i) => {
                const answered = isAnswered[i];
                const userIdx = userAnswers[i];
                const isCorrect = answered && (userIdx === q.correctIndex);
               
                const div = document.createElement("div");
                div.className = "border border-zinc-700 rounded-3xl p-6";
                div.innerHTML = `
                    <div class="flex items-start justify-between">
                        <div class="flex-1">
                            <div class="flex items-center gap-x-3">
                                <span class="font-mono text-xs bg-zinc-800 px-3 py-1 rounded-2xl">${i+1}</span>
                                <p class="font-medium text-white leading-tight">${q.question}</p>
                            </div>
                            <div class="mt-6 grid grid-cols-1 gap-4">
                                ${q.options.map((opt, idx) => {
                                    let statusHTML = "";
                                    if (answered && idx === userIdx) {
                                        statusHTML = isCorrect ? `<span class="text-emerald-400 text-xs font-bold">YOUR ANSWER ✓</span>` : `<span class="text-red-400 text-xs font-bold">YOUR ANSWER ✕</span>`;
                                    }
                                    if (idx === q.correctIndex) statusHTML += ` <span class="text-emerald-400 text-xs font-bold">CORRECT</span>`;
                                    return `
                                        <div class="flex justify-between items-center ${idx === q.correctIndex ? 'text-emerald-400' : 'text-zinc-300'}">
                                            <span>${String.fromCharCode(65 + idx)}. ${opt}</span>
                                            ${statusHTML}
                                        </div>
                                    `;
                                }).join("")}
                            </div>
                        </div>
                    </div>
                `;
                list.appendChild(div);
            });
            modal.classList.remove("hidden");
            modal.classList.add("flex");
        }

        function hideReviewModal() {
            const modal = document.getElementById("review-modal");
            modal.classList.add("hidden");
            modal.classList.remove("flex");
        }

        function shareResults() {
            const stats = calculateResults();
            const text = `🛡️ I scored ${stats.percentage}% on Quizzy Pro • Unit 7: Network Security!\n\n✅ Correct: ${stats.correct}\n❌ Incorrect: ${stats.incorrect}\n⏭️ Skipped: ${stats.skipped}\n\nTest your knowledge of cryptography, digital signatures, IPSec, VPN, firewalls & wireless security!`;
            navigator.clipboard.writeText(text).then(() => {
                const btn = event.currentTarget;
                const orig = btn.innerHTML;
                btn.innerHTML = `<i class="fas fa-check"></i> COPIED!`;
                setTimeout(() => btn.innerHTML = orig, 2000);
            });
        }

        function restartQuiz() {
            currentIndex = 0;
            userAnswers = new Array(30).fill(null);
            isAnswered = new Array(30).fill(false);
            prepareShuffledQuestions();
            document.getElementById("quiz-screen").classList.remove("hidden");
            document.getElementById("results-screen").classList.add("hidden");
            renderQuestion();
            console.log("%cQuizzy Pro • Unit 7: Network Security restarted with fresh random order!", "color:#a78bfa; font-weight:600");
        }

        function handleKeyboard(e) {
            if (!document.getElementById("results-screen").classList.contains("hidden")) return;
            if (e.key === "ArrowRight") nextQuestion();
            if (e.key === "ArrowLeft") prevQuestion();
            if (e.key >= "1" && e.key <= "4" && !isAnswered[currentIndex]) {
                selectOption(parseInt(e.key) - 1);
            }
        }

        function startQuiz() {
            prepareShuffledQuestions();
            userAnswers = new Array(30).fill(null);
            isAnswered = new Array(30).fill(false);
            currentIndex = 0;
            renderQuestion();
            document.addEventListener("keydown", handleKeyboard);
            console.log("%c✅ Quizzy Pro • Unit 7: Network Security loaded successfully! (30 tricky MCQs)", "color:#a78bfa; font-family:monospace; font-size:13px");
        }

        window.onload = startQuiz;
    </script>
</body>
</html>
