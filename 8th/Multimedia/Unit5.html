<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizzy Pro • Unit 5: Data Compression (30 MCQs)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&amp;family=Inter:wght@400;500;600&amp;display=swap');
        
        :root {
            --primary: 245 158 11;
        }
        
        body {
            font-family: 'Inter', system_ui, sans-serif;
        }
        
        .title-font {
            font-family: 'Poppins', sans-serif;
        }

        .option-btn {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .option-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 15px -3px rgb(245 158 11 / 0.3);
        }
        
        .option-btn.selected-correct {
            background-color: #10b981;
            color: white;
            border-color: #10b981;
        }
        
        .option-btn.selected-wrong {
            background-color: #ef4444;
            color: white;
            border-color: #ef4444;
        }
        
        .option-btn.correct {
            background-color: #10b981;
            color: white;
            border-color: #10b981;
        }
        
        .progress-bar {
            transition: width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .modal {
            animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .question-card {
            animation: fadeSlide 0.4s ease forwards;
        }
        
        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200 min-h-screen">
    <div class="max-w-3xl mx-auto">
        <!-- HEADER -->
        <header class="bg-gradient-to-r from-amber-600 to-orange-600 text-white shadow-2xl">
            <div class="px-6 py-5 flex items-center justify-between">
                <div class="flex items-center gap-x-4">
                    <div class="w-12 h-12 bg-white/20 backdrop-blur-md rounded-3xl flex items-center justify-center text-4xl shadow-inner">
                        🗜️
                    </div>
                    <div>
                        <h1 class="title-font text-3xl font-semibold tracking-tighter">Quizzy Pro</h1>
                        <p class="text-amber-100 text-sm font-medium -mt-1">Unit 5: Data Compression (30 MCQs)</p>
                    </div>
                </div>
                <div class="flex items-center gap-x-3">
                    <div onclick="restartQuiz()" 
                         class="flex items-center gap-x-2 bg-white/20 hover:bg-white/30 transition-colors px-5 py-2.5 rounded-3xl text-sm font-semibold cursor-pointer">
                        <i class="fas fa-redo"></i>
                        <span>Restart</span>
                    </div>

            </div>
            
            <!-- PROGRESS -->

            </div>
        </header>

        <!-- QUIZ CONTAINER -->
        <div id="quiz-screen" class="p-6">
            <div class="flex justify-between items-center mb-8">
                <div class="flex items-center gap-x-3">
                    <div class="px-5 py-1.5 bg-zinc-900 rounded-3xl text-sm font-mono font-medium text-amber-400" id="question-counter">1 / 30</div>
                </div>
                <div onclick="showReviewModal()"

                </div>
            </div>

            <!-- QUESTION -->
            <div id="question-card" class="question-card bg-zinc-900 rounded-3xl p-8 shadow-2xl border border-zinc-800">

            <!-- NAVIGATION -->

        <!-- RESULTS SCREEN -->

                <div class="grid grid-cols-3 gap-6 mt-12">

                    <div class="bg-zinc-800 rounded-3xl p-6">

                        </div>

                </div>

                <!-- Insight -->
                <div class="mt-10 bg-zinc-800/70 rounded-3xl p-8 text-left">

                <!-- Actions -->

                </button>

    <!-- REVIEW MODAL -->
    <div id="review-modal" onclick="if(event.target.id==='review-modal')hideReviewModal()" 
         class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
        <div onclick="event.stopImmediatePropagation()" 
             class="modal bg-zinc-900 w-full max-w-2xl max-h-[85vh] rounded-3xl shadow-2xl flex flex-col">
            
            <!-- Modal Header -->
            <div class="px-8 py-6 border-b border-zinc-700 flex items-center justify-between">

                <button onclick="hideReviewModal()" 
                        class="w-9 h-9 flex items-center justify-center text-3xl leading-none text-zinc-400 hover:text-white">×</button>

            <!-- Content -->
            <div id="review-list" class="flex-1 overflow-auto p-6 space-y-8">

            </div>
            
            <div class="p-6 border-t border-zinc-700">
                <button onclick="hideReviewModal()" 
                        class="w-full py-5 bg-amber-500 hover:bg-amber-400 transition-colors rounded-3xl text-white font-semibold">
                    Close Review
                </button>
            </div>

    <script>
        // ====================== ORIGINAL QUESTIONS (30 exact from PDF) ======================
        const originalQuestions = [
            {
                question: "What is the definition of Data Compression?",
                options: [
                    "The process of increasing file size for better quality",
                    "The process of encoding information using fewer bits than the original representation",
                    "Only removing data permanently",
                    "Storing files without any processing"
                ],
                correctAnswer: "The process of encoding information using fewer bits than the original representation"
            },
            {
                question: "Which primary need of data compression addresses the enormous storage capacity required by multimedia data?",
                options: [
                    "Faster Transmission",
                    "Storage Space Reduction",
                    "Cost Savings only",
                    "High Quality Preservation"
                ],
                correctAnswer: "Storage Space Reduction"
            },
            {
                question: "Which Real-World Example is given for Storage Space Reduction in data compression?",
                options: [
                    "Streaming on Netflix",
                    "A single minute of uncompressed HD video can be several gigabytes. Compression allows storing a full-length movie on a Blu-ray disc",
                    "Cloud storage providers",
                    "Real-time video calls"
                ],
                correctAnswer: "A single minute of uncompressed HD video can be several gigabytes. Compression allows storing a full-length movie on a Blu-ray disc"
            },
            {
                question: "Which primary need of data compression reduces bandwidth consumption and improves user experience on networks?",
                options: [
                    "Storage Space Reduction",
                    "Faster Transmission/Bandwidth Efficiency",
                    "Faster Data Backup",
                    "Low Complexity Algorithms"
                ],
                correctAnswer: "Faster Transmission/Bandwidth Efficiency"
            },
            {
                question: "Which Real-World Example is given for Faster Transmission/Bandwidth Efficiency?",
                options: [
                    "Zipping a Word document",
                    "Streaming a 4K movie on Netflix would be impossible without compression",
                    "Medical imaging archives",
                    "Software executables"
                ],
                correctAnswer: "Streaming a 4K movie on Netflix would be impossible without compression"
            },
            {
                question: "Which primary need of data compression lowers operational costs for cloud storage providers and data centers?",
                options: [
                    "High Quality Preservation",
                    "Cost Savings",
                    "Instantaneous Decoding",
                    "Lossless Reversibility"
                ],
                correctAnswer: "Cost Savings"
            },
            {
                question: "Which benefit of data compression allows backups to complete more quickly and require less tape or disk space?",
                options: [
                    "High Compression Ratio",
                    "Faster Data Backup and Recovery",
                    "Adaptability",
                    "Entropy Coding"
                ],
                correctAnswer: "Faster Data Backup and Recovery"
            },
            {
                question: "What is the core concept of how data compression works?",
                options: [
                    "Adding extra redundant information",
                    "Finding and eliminating redundancy in data",
                    "Only using lossy methods",
                    "Increasing bit rate"
                ],
                correctAnswer: "Finding and eliminating redundancy in data"
            },
            {
                question: "What are the two key processes in data compression?",
                options: [
                    "Only Encoding",
                    "Encoding (compressing with a codec) and Decoding (reconstructing the data)",
                    "Only Quantization",
                    "Only Zig-Zag Scan"
                ],
                correctAnswer: "Encoding (compressing with a codec) and Decoding (reconstructing the data)"
            },
            {
                question: "What is the formula for Compression Ratio?",
                options: [
                    "Compressed Size / Original Size",
                    "Original Size / Compressed Size",
                    "Bits per second",
                    "Frame rate"
                ],
                correctAnswer: "Original Size / Compressed Size"
            },
            {
                question: "What does a compression ratio of 10:1 mean?",
                options: [
                    "The file is 10 times larger",
                    "The compressed file is one-tenth the size of the original",
                    "No reduction in size",
                    "Quality is increased by 10 times"
                ],
                correctAnswer: "The compressed file is one-tenth the size of the original"
            },
            {
                question: "Which is a key requirement of a good compression algorithm?",
                options: [
                    "Low Compression Ratio",
                    "High Compression Ratio: Achieves maximum size reduction",
                    "High Complexity",
                    "Slow Encoding"
                ],
                correctAnswer: "High Compression Ratio: Achieves maximum size reduction"
            },
            {
                question: "Which requirement ensures encoding and decoding are fast enough for real-time applications like video streaming?",
                options: [
                    "High Quality",
                    "High Speed",
                    "Low Compression Ratio",
                    "No Adaptability"
                ],
                correctAnswer: "High Speed"
            },
            {
                question: "Which requirement is especially important for lossy compression to minimize perceivable loss?",
                options: [
                    "Low Complexity",
                    "High Quality (for lossy)",
                    "Uniquely Decodable",
                    "Instantaneous Decoding"
                ],
                correctAnswer: "High Quality (for lossy)"
            },
            {
                question: "Which requirement is critical for devices with limited battery power like mobile phones?",
                options: [
                    "High Compression Ratio",
                    "Low Complexity",
                    "High Speed only",
                    "Adaptability"
                ],
                correctAnswer: "Low Complexity"
            },
            {
                question: "According to the storage space example, what is the approximate size of a 5-minute uncompressed CD-quality audio song?",
                options: [
                    "5 MB",
                    "About 50 MB",
                    "500 MB",
                    "5 GB"
                ],
                correctAnswer: "About 50 MB"
            },
            {
                question: "What trade-off occurs when using more compression (smaller storage)?",
                options: [
                    "Faster processing and no quality loss",
                    "Often requires more complex algorithms, which can increase processing time and may introduce quality loss",
                    "Larger file size",
                    "Perfect reversibility"
                ],
                correctAnswer: "Often requires more complex algorithms, which can increase processing time and may introduce quality loss"
            },
            {
                question: "Which Real-World Example illustrates the impact of compression on storage?",
                options: [
                    "A Blu-ray disc without compression",
                    "A smartphone with 128GB storage can hold thousands of photos because photos are stored as compressed JPEGs",
                    "Uncompressed 4K Netflix streaming",
                    "Analog tape backups"
                ],
                correctAnswer: "A smartphone with 128GB storage can hold thousands of photos because photos are stored as compressed JPEGs"
            },
            {
                question: "Which coding requirement means a given compressed bitstream must correspond to one and only one original message?",
                options: [
                    "Adaptability",
                    "Uniquely Decodable",
                    "High Speed",
                    "Lossy Quality"
                ],
                correctAnswer: "Uniquely Decodable"
            },
            {
                question: "Which desirable property allows the decoder to decode each codeword immediately without looking ahead (prefix-free codes)?",
                options: [
                    "Efficiency",
                    "Instantaneous/Self-Synchronizing",
                    "High Compression Ratio",
                    "Lossless Reversibility"
                ],
                correctAnswer: "Instantaneous/Self-Synchronizing"
            },
            {
                question: "Which coding requirement ensures the process is computationally efficient?",
                options: [
                    "Adaptability",
                    "Efficiency",
                    "Uniquely Decodable",
                    "High Quality"
                ],
                correctAnswer: "Efficiency"
            },
            {
                question: "Which desirable coding property allows codes to adapt to changing statistics in the data (e.g., adaptive Huffman)?",
                options: [
                    "Instantaneous",
                    "Adaptability",
                    "Low Complexity",
                    "High Speed"
                ],
                correctAnswer: "Adaptability"
            },
            {
                question: "According to the comparison table, what is the reversibility of Lossless Compression?",
                options: [
                    "Irreversible",
                    "Fully reversible",
                    "Partially reversible",
                    "Only for video"
                ],
                correctAnswer: "Fully reversible"
            },
            {
                question: "According to the comparison table, what is the typical compression ratio range for Lossy Compression?",
                options: [
                    "2:1 to 4:1",
                    "High to very high (10:1 to 100:1 or more for images/video)",
                    "Always 1:1",
                    "Lower than lossless"
                ],
                correctAnswer: "High to very high (10:1 to 100:1 or more for images/video)"
            },
            {
                question: "According to the comparison table, what are typical uses of Lossless Compression?",
                options: [
                    "Photographs and video streaming",
                    "Text files (ZIP), software executables, medical imaging",
                    "Music (MP3)",
                    "Netflix movies"
                ],
                correctAnswer: "Text files (ZIP), software executables, medical imaging"
            },
            {
                question: "Which Real-World Example is given for Lossless Compression?",
                options: [
                    "Watching a movie on Netflix",
                    "Zipping a folder containing a Word document to email it",
                    "JPEG photos",
                    "H.264 video"
                ],
                correctAnswer: "Zipping a folder containing a Word document to email it"
            },
            {
                question: "What is Source Coding?",
                options: [
                    "Only entropy coding",
                    "A broad term for any process that represents information from a source in digital form (foundation of both lossless and lossy compression)",
                    "Only hybrid coding",
                    "Only DCT-based mode"
                ],
                correctAnswer: "A broad term for any process that represents information from a source in digital form (foundation of both lossless and lossy compression)"
            },
            {
                question: "What is Entropy Coding?",
                options: [
                    "A lossy technique",
                    "A specific class of lossless compression techniques that assign shorter codes to frequently occurring symbols (based on entropy)",
                    "Only used in MPEG",
                    "Progressive scanning"
                ],
                correctAnswer: "A specific class of lossless compression techniques that assign shorter codes to frequently occurring symbols (based on entropy)"
            },
            {
                question: "Which is a Real-World Example of Hybrid Coding?",
                options: [
                    "Zipping a text file",
                    "JPEG uses a hybrid method: Discrete Cosine Transform (DCT) and quantization (lossy) followed by Huffman coding (lossless)",
                    "Pure lossless ZIP",
                    "Uncompressed audio"
                ],
                correctAnswer: "JPEG uses a hybrid method: Discrete Cosine Transform (DCT) and quantization (lossy) followed by Huffman coding (lossless)"
            },
            {
                question: "What is the first step in the Lossy Sequential DCT-based Mode (JPEG)?",
                options: [
                    "Quantization",
                    "Block Preparation: The image is divided into 8x8 pixel blocks",
                    "Zig-Zag Scan",
                    "Entropy Coding"
                ],
                correctAnswer: "Block Preparation: The image is divided into 8x8 pixel blocks"
            },
            {
                question: "What is the lossy step in the JPEG sequential DCT-based mode?",
                options: [
                    "Zig-Zag Scan",
                    "Quantization: Each coefficient is divided by a value from the quantization table (discards information)",
                    "Huffman Coding",
                    "Block Preparation"
                ],
                correctAnswer: "Quantization: Each coefficient is divided by a value from the quantization table (discards information)"
            }
        ];

        // ====================== QUIZ STATE ======================
        let shuffledQuestions = [];
        let currentIndex = 0;
        let userAnswers = [];
        let isAnswered = [];

        // Fisher-Yates shuffle
        function shuffleArray(array) {
            let arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function prepareShuffledQuestions() {
            shuffledQuestions = originalQuestions.map(q => {
                const shuffledOpts = shuffleArray(q.options);
                const correctIndex = shuffledOpts.indexOf(q.correctAnswer);
                return {
                    question: q.question,
                    options: shuffledOpts,
                    correctIndex: correctIndex
                };
            });
        }

        // ====================== RENDER QUESTION ======================
        function renderQuestion() {
            const q = shuffledQuestions[currentIndex];
            
            document.getElementById("question-counter").textContent = `${currentIndex + 1} / 30`;
            document.getElementById("question-text").textContent = q.question;
            
            const container = document.getElementById("options-container");
            container.innerHTML = "";
            
            const labels = ["A", "B", "C", "D"];
            
            q.options.forEach((option, idx) => {
                const btn = document.createElement("button");
                btn.className = `option-btn w-full text-left px-7 py-6 rounded-3xl border-2 border-zinc-700 bg-zinc-800 hover:border-amber-400 transition-all flex items-start gap-4 group`;
                btn.innerHTML = `
                    <span class="w-8 h-8 flex-shrink-0 rounded-2xl bg-zinc-700 text-amber-400 font-bold flex items-center justify-center text-lg transition-colors group-hover:bg-amber-400 group-hover:text-white">${labels[idx]}</span>
                    <span class="text-lg leading-tight">${option}</span>
                `;
                
                btn.onclick = () => selectOption(idx);
                container.appendChild(btn);
            });
            
            updateProgress();
            updateNavigation();
            
            if (isAnswered[currentIndex]) {
                showFeedback();
            }
        }

        function selectOption(selectedIdx) {
            if (isAnswered[currentIndex]) return;
            
            isAnswered[currentIndex] = true;
            userAnswers[currentIndex] = selectedIdx;
            
            showFeedback();
            updateNavigation();
        }

        function showFeedback() {
            const q = shuffledQuestions[currentIndex];
            const container = document.getElementById("options-container");
            const buttons = container.children;
            const userChoice = userAnswers[currentIndex];
            
            for (let i = 0; i < buttons.length; i++) {
                const btn = buttons[i];
                
                if (i === q.correctIndex) {
                    btn.classList.add("correct");
                    btn.innerHTML += `<span class="ml-auto text-white text-2xl">✓</span>`;
                }
                
                if (i === userChoice) {
                    if (userChoice === q.correctIndex) {
                        btn.classList.add("selected-correct");
                    } else {
                        btn.classList.add("selected-wrong");
                        btn.innerHTML += `<span class="ml-auto text-white text-2xl">✕</span>`;
                    }
                }
                
                btn.onclick = null;
                btn.style.cursor = "default";
            }
        }

        function updateProgress() {
            const progress = ((currentIndex + 1) / 30) * 100;
            document.getElementById("progress-bar").style.width = `${progress}%`;
        }

        function updateNavigation() {
            const prevBtn = document.getElementById("btn-prev");
            const nextBtn = document.getElementById("btn-next");
            const nextText = document.getElementById("next-text");
            
            prevBtn.disabled = currentIndex === 0;
            prevBtn.style.opacity = currentIndex === 0 ? "0.4" : "1";
            
            if (currentIndex === 29) {
                nextText.textContent = "Finish Quiz";
            } else {
                nextText.textContent = "Next";
            }
        }

        function nextQuestion() {
            if (currentIndex < 29) {
                currentIndex++;
                renderQuestion();
            } else {
                showResults();
            }
        }

        function prevQuestion() {
            if (currentIndex > 0) {
                currentIndex--;
                renderQuestion();
            }
        }

        // ====================== RESULTS ======================
        function calculateResults() {
            let correct = 0;
            let incorrect = 0;
            let skipped = 0;
            
            for (let i = 0; i < 30; i++) {
                if (!isAnswered[i]) {
                    skipped++;
                } else if (userAnswers[i] === shuffledQuestions[i].correctIndex) {
                    correct++;
                } else {
                    incorrect++;
                }
            }
            
            const percentage = Math.round((correct / 30) * 100);
            return { correct, incorrect, skipped, percentage };
        }

        function showResults() {
            document.getElementById("quiz-screen").classList.add("hidden");
            const resultsScreen = document.getElementById("results-screen");
            resultsScreen.classList.remove("hidden");
            
            const stats = calculateResults();
            
            document.getElementById("score").textContent = stats.correct;
            document.getElementById("percentage").textContent = stats.percentage;
            document.getElementById("correct-count").textContent = stats.correct;
            document.getElementById("incorrect-count").textContent = stats.incorrect;
            document.getElementById("skipped-count").textContent = stats.skipped;
            
            const trophyEl = document.getElementById("trophy");
            if (stats.percentage >= 80) {
                trophyEl.innerHTML = "🏆";
            } else if (stats.percentage >= 60) {
                trophyEl.innerHTML = "🎉";
            } else {
                trophyEl.innerHTML = "🗜️";
            }
            
            let insight = "";
            if (stats.percentage >= 90) {
                insight = "Outstanding performance! You have completely mastered the need for compression, lossless vs lossy techniques, hybrid coding, JPEG DCT process, and MPEG standards.";
            } else if (stats.percentage >= 75) {
                insight = "Excellent work! Strong understanding of compression basics, coding requirements, and modern standards like JPEG and MPEG.";
            } else if (stats.percentage >= 60) {
                insight = "Good job! Solid grasp of fundamentals. Review entropy coding, hybrid approach, and DCT steps for perfection.";
            } else {
                insight = "Keep learning! Focus on redundancy elimination, compression ratio, and the difference between lossless and lossy methods.";
            }
            document.getElementById("insight-text").innerHTML = insight;
        }

        // ====================== REVIEW MODAL ======================
        function showReviewModal() {
            const modal = document.getElementById("review-modal");
            const list = document.getElementById("review-list");
            list.innerHTML = "";
            
            shuffledQuestions.forEach((q, i) => {
                const answered = isAnswered[i];
                const userIdx = userAnswers[i];
                const isCorrect = answered && (userIdx === q.correctIndex);
                
                const div = document.createElement("div");
                div.className = "border border-zinc-700 rounded-3xl p-6";
                div.innerHTML = `
                    <div class="flex items-start justify-between">
                        <div class="flex-1">
                            <div class="flex items-center gap-x-3">
                                <span class="font-mono text-xs bg-zinc-800 px-3 py-1 rounded-2xl">${i+1}</span>
                                <p class="font-medium text-white leading-tight">${q.question}</p>
                            </div>
                            
                            <div class="mt-6 grid grid-cols-1 gap-4">
                                ${q.options.map((opt, idx) => {
                                    let statusHTML = "";
                                    if (answered && idx === userIdx) {
                                        statusHTML = isCorrect 
                                            ? `<span class="text-emerald-400 text-xs font-bold">YOUR ANSWER ✓</span>` 
                                            : `<span class="text-red-400 text-xs font-bold">YOUR ANSWER ✕</span>`;
                                    }
                                    if (idx === q.correctIndex) {
                                        statusHTML += ` <span class="text-emerald-400 text-xs font-bold">CORRECT</span>`;
                                    }
                                    return `
                                        <div class="flex justify-between items-center ${idx === q.correctIndex ? 'text-emerald-400' : 'text-zinc-300'}">
                                            <span>${String.fromCharCode(65 + idx)}. ${opt}</span>
                                            ${statusHTML}
                                        </div>
                                    `;
                                }).join("")}
                            </div>
                        </div>
                    </div>
                `;
                list.appendChild(div);
            });
            
            modal.classList.remove("hidden");
            modal.classList.add("flex");
        }

        function hideReviewModal() {
            const modal = document.getElementById("review-modal");
            modal.classList.add("hidden");
            modal.classList.remove("flex");
        }

        // ====================== SHARE ======================
        function shareResults() {
            const stats = calculateResults();
            const text = `🗜️ I just scored ${stats.percentage}% on Quizzy Pro • Unit 5: Data Compression!\n\n✅ Correct: ${stats.correct}\n❌ Incorrect: ${stats.incorrect}\n⏭️ Skipped: ${stats.skipped}\n\nMastered lossless/lossy, JPEG DCT & MPEG? Try Quizzy Pro!`;
            
            navigator.clipboard.writeText(text).then(() => {
                const btn = event.currentTarget;
                const origHTML = btn.innerHTML;
                btn.innerHTML = `<i class="fas fa-check"></i> COPIED!`;
                setTimeout(() => btn.innerHTML = origHTML, 2000);
            });
        }

        // ====================== RESTART ======================
        function restartQuiz() {
            currentIndex = 0;
            userAnswers = new Array(30).fill(null);
            isAnswered = new Array(30).fill(false);
            
            prepareShuffledQuestions();
            
            document.getElementById("quiz-screen").classList.remove("hidden");
            document.getElementById("results-screen").classList.add("hidden");
            
            renderQuestion();
            
            console.log("%cQuizzy Pro • Unit 5: Data Compression restarted with fresh random order!", "color:#fbbf24; font-weight:600");
        }

        // ====================== KEYBOARD SUPPORT ======================
        function handleKeyboard(e) {
            if (!document.getElementById("results-screen").classList.contains("hidden")) return;
            
            if (e.key === "ArrowRight") nextQuestion();
            if (e.key === "ArrowLeft") prevQuestion();
            if (e.key >= "1" && e.key <= "4" && !isAnswered[currentIndex]) {
                selectOption(parseInt(e.key) - 1);
            }
        }

        // ====================== START ======================
        function startQuiz() {
            prepareShuffledQuestions();
            userAnswers = new Array(30).fill(null);
            isAnswered = new Array(30).fill(false);
            currentIndex = 0;
            
            renderQuestion();
            document.addEventListener("keydown", handleKeyboard);
            
            console.log("%c✅ Quizzy Pro • Unit 5: Data Compression loaded successfully! (30 MCQs from official PDF)", "color:#fbbf24; font-family:monospace; font-size:13px");
        }

        window.onload = function() {
            startQuiz();
        };
    </script>
</body>
</html>
