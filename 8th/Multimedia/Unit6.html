<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizzy Pro • Unit 6: Abstractions for Programming (30 MCQs)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&amp;family=Inter:wght@400;500;600&amp;display=swap');
        
        :root {
            --primary: 165 243 252;
        }
        
        body {
            font-family: 'Inter', system_ui, sans-serif;
        }
        
        .title-font {
            font-family: 'Poppins', sans-serif;
        }

        .option-btn {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .option-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 15px -3px rgb(165 243 252 / 0.3);
        }
        
        .option-btn.selected-correct {
            background-color: #10b981;
            color: white;
            border-color: #10b981;
        }
        
        .option-btn.selected-wrong {
            background-color: #ef4444;
            color: white;
            border-color: #ef4444;
        }
        
        .option-btn.correct {
            background-color: #10b981;
            color: white;
            border-color: #10b981;
        }
        
        .progress-bar {
            transition: width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .modal {
            animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .question-card {
            animation: fadeSlide 0.4s ease forwards;
        }
        
        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200 min-h-screen">
    <div class="max-w-3xl mx-auto">
        <!-- HEADER -->
        <header class="bg-gradient-to-r from-cyan-600 to-sky-600 text-white shadow-2xl">
            <div class="px-6 py-5 flex items-center justify-between">
                <div class="flex items-center gap-x-4">
                    <div class="w-12 h-12 bg-white/20 backdrop-blur-md rounded-3xl flex items-center justify-center text-4xl shadow-inner">
                        🧩
                    </div>
                    <div>
                        <h1 class="title-font text-3xl font-semibold tracking-tighter">Quizzy Pro</h1>
                        <p class="text-cyan-100 text-sm font-medium -mt-1">Unit 6: Abstractions for Programming (30 MCQs)</p>
                    </div>
                </div>
                <div class="flex items-center gap-x-3">
                    <div onclick="restartQuiz()" 
                         class="flex items-center gap-x-2 bg-white/20 hover:bg-white/30 transition-colors px-5 py-2.5 rounded-3xl text-sm font-semibold cursor-pointer">
                        <i class="fas fa-redo"></i>
                        <span>Restart</span>
                    </div>
                </div>
            </div>
            
            <!-- PROGRESS -->
            <div class="h-2 bg-black/30 relative">
                <div id="progress-bar" 
                     class="progress-bar h-2 bg-white rounded-r-full w-0"></div>
            </div>
        </header>

        <!-- QUIZ CONTAINER -->
        <div id="quiz-screen" class="p-6">
            <div class="flex justify-between items-center mb-8">
                <div class="flex items-center gap-x-3">
                    <div class="px-5 py-1.5 bg-zinc-900 rounded-3xl text-sm font-mono font-medium text-cyan-400" id="question-counter">1 / 30</div>
                </div>
                <!-- <div onclick="showReviewModal()" 
                     class="text-xs uppercase tracking-widest font-semibold text-zinc-400 hover:text-cyan-300 cursor-pointer flex items-center gap-x-1">
                    <i class="fas fa-list-check"></i>
                    <span>Review All</span>
                </div> -->
            </div>

            <!-- QUESTION -->
            <div id="question-card" class="question-card bg-zinc-900 rounded-3xl p-8 shadow-2xl border border-zinc-800">
                <p id="question-text" class="text-2xl leading-tight font-medium text-white"></p>
                
                <!-- OPTIONS -->
                <div id="options-container" class="mt-10 space-y-4"></div>
            </div>

            <!-- NAVIGATION -->
            <div class="flex gap-4 mt-10">
                <button onclick="prevQuestion()" 
                        id="btn-prev"
                        class="flex-1 bg-zinc-900 hover:bg-zinc-800 transition-colors text-white font-semibold py-5 rounded-3xl flex items-center justify-center gap-x-3 shadow-inner">
                    <i class="fas fa-chevron-left"></i>
                    <span>Previous</span>
                </button>
                
                <button onclick="nextQuestion()" 
                        id="btn-next"
                        class="flex-1 bg-gradient-to-r from-cyan-500 to-sky-500 hover:from-cyan-400 hover:to-sky-400 transition-all font-semibold py-5 rounded-3xl flex items-center justify-center gap-x-3 shadow-lg shadow-cyan-500/30">
                    <span id="next-text">Next</span>
                    <i class="fas fa-chevron-right"></i>
                </button>
            </div>
        </div>

        <!-- RESULTS SCREEN -->
        <div id="results-screen" class="hidden p-6">
            <div class="bg-zinc-900 rounded-3xl p-10 text-center">
                <!-- Trophy -->
                <div id="trophy" class="mx-auto w-32 h-32 flex items-center justify-center text-8xl mb-6"></div>
                
                <h2 class="text-6xl font-bold text-white mb-1" id="score">92</h2>
                <p class="text-cyan-400 text-2xl font-semibold">Score • <span id="percentage">92</span>%</p>
                
                <div class="grid grid-cols-3 gap-6 mt-12">
                    <div class="bg-zinc-800 rounded-3xl p-6">
                        <div class="flex items-center justify-center gap-x-3 text-emerald-400">
                            <i class="fas fa-check-circle text-3xl"></i>
                        </div>

                            <i class="fas fa-forward text-3xl"></i>
                        </div>
                        <div id="skipped-count" class="text-5xl font-bold mt-4 text-white">1</div>

                <!-- Insight -->

                    <p id="insight-text" class="text-zinc-300 leading-relaxed text-lg"></p>
                </div>

                <!-- Actions -->
                <div class="flex flex-col sm:flex-row gap-4 mt-12">
                    <button onclick="showReviewModal()" 
                            class="flex-1 py-6 bg-white text-zinc-900 rounded-3xl font-semibold flex items-center justify-center gap-x-3 hover:scale-105 transition-transform">
                        <i class="fas fa-list-check"></i>
                        REVIEW ALL ANSWERS
                    </button>
                    
                    <button onclick="shareResults()" 
                            class="flex-1 py-6 bg-zinc-800 hover:bg-zinc-700 rounded-3xl font-semibold flex items-center justify-center gap-x-3 transition-colors">
                        <i class="fas fa-share-nodes"></i>
                        SHARE RESULT
                    </button>
                </div>
                
                <button onclick="restartQuiz()" 
                        class="mt-6 w-full py-5 text-cyan-400 font-medium flex items-center justify-center gap-x-2 hover:text-cyan-300">
                    <i class="fas fa-rotate"></i>
                    <span>Restart Quiz</span>
                </button>
            </div>
        </div>
    </div>

    <!-- REVIEW MODAL -->
    <div id="review-modal" onclick="if(event.target.id==='review-modal')hideReviewModal()" 
         class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
        <div onclick="event.stopImmediatePropagation()" 
             class="modal bg-zinc-900 w-full max-w-2xl max-h-[85vh] rounded-3xl shadow-2xl flex flex-col">
            
            <!-- Modal Header -->
            <div class="px-8 py-6 border-b border-zinc-700 flex items-center justify-between">

                <button onclick="hideReviewModal()" 
                        class="w-9 h-9 flex items-center justify-center text-3xl leading-none text-zinc-400 hover:text-white">×</button>
            </div>
            
            <!-- Content -->
            <div id="review-list" class="flex-1 overflow-auto p-6 space-y-8">
                <!-- JS injected -->
            </div>
            
            <div class="p-6 border-t border-zinc-700">
                <button onclick="hideReviewModal()" 
                        class="w-full py-5 bg-cyan-500 hover:bg-cyan-400 transition-colors rounded-3xl text-white font-semibold">
                    Close Review
                </button>
            </div>
        </div>
    </div>

    <script>
        // ====================== ORIGINAL QUESTIONS (30 exact from PDF) ======================
        const originalQuestions = [
            {
                question: "What is the definition of Abstraction in programming?",
                options: [
                    "Writing code directly in machine language",
                    "The process of hiding complex underlying details and providing a simplified interface for the programmer to interact with",
                    "Only using high-level frameworks",
                    "Storing multimedia files in compressed format"
                ],
                correctAnswer: "The process of hiding complex underlying details and providing a simplified interface for the programmer to interact with"
            },
            {
                question: "What is the lowest level of abstraction in multimedia programming?",
                options: [
                    "Application Level",
                    "Hardware Level: The physical components (CPU, GPU, sound card, camera sensor)",
                    "Library Level",
                    "Toolkit/Framework Level"
                ],
                correctAnswer: "Hardware Level: The physical components (CPU, GPU, sound card, camera sensor)"
            },
            {
                question: "What is the Firmware/Driver Level of abstraction?",
                options: [
                    "The final user-facing software",
                    "Software that directly controls the hardware, providing a basic, consistent interface to the operating system",
                    "Collections of pre-written code for specific tasks",
                    "System calls and APIs"
                ],
                correctAnswer: "Software that directly controls the hardware, providing a basic, consistent interface to the operating system"
            },
            {
                question: "What does the Operating System Level provide in multimedia programming?",
                options: [
                    "Machine code for hardware",
                    "System calls and APIs for basic multimedia I/O (e.g., reading a file, playing a beep)",
                    "Pre-written code for JPEG images",
                    "High-level GUI components"
                ],
                correctAnswer: "System calls and APIs for basic multimedia I/O (e.g., reading a file, playing a beep)"
            },
            {
                question: "What is the Library Level of abstraction?",
                options: [
                    "The final user-facing application",
                    "Collections of pre-written code that handle specific multimedia tasks (e.g., libjpeg for JPEG images, FFmpeg for video processing)",
                    "Physical hardware components",
                    "Cross-platform game engines"
                ],
                correctAnswer: "Collections of pre-written code that handle specific multimedia tasks (e.g., libjpeg for JPEG images, FFmpeg for video processing)"
            },
            {
                question: "What is the Toolkit/Framework Level of abstraction?",
                options: [
                    "Low-level device drivers",
                    "Higher-level, more integrated sets of libraries and tools that provide comprehensive functionality for building multimedia applications (e.g., Qt, JUCE, OpenFrameworks)",
                    "Only static libraries",
                    "Machine code"
                ],
                correctAnswer: "Higher-level, more integrated sets of libraries and tools that provide comprehensive functionality for building multimedia applications (e.g., Qt, JUCE, OpenFrameworks)"
            },
            {
                question: "What is the highest level of abstraction in multimedia programming?",
                options: [
                    "Library Level",
                    "Application Level: The final user-facing software (e.g., Adobe Photoshop, VLC Media Player, a video game)",
                    "Firmware/Driver Level",
                    "Hardware Level"
                ],
                correctAnswer: "Application Level: The final user-facing software (e.g., Adobe Photoshop, VLC Media Player, a video game)"
            },
            {
                question: "In the Real-World Example of playing a video, what does the user do first?",
                options: [
                    "Calls FFmpeg directly",
                    "Double-clicks an MP4 file in VLC",
                    "Writes machine code",
                    "Interacts with the GPU"
                ],
                correctAnswer: "Double-clicks an MP4 file in VLC"
            },
            {
                question: "In the video playing example, what does the Application (VLC) do?",
                options: [
                    "Communicates directly with hardware",
                    "Calls functions from a high-level multimedia toolkit/framework",
                    "Decodes the video using machine code",
                    "Manages physical storage"
                ],
                correctAnswer: "Calls functions from a high-level multimedia toolkit/framework"
            },
            {
                question: "In the video playing example, what does the Toolkit do?",
                options: [
                    "Sends raw bits to the hard drive",
                    "Uses a library like FFmpeg to decode the video stream",
                    "Displays the final image on the monitor",
                    "Provides system calls only"
                ],
                correctAnswer: "Uses a library like FFmpeg to decode the video stream"
            },
            {
                question: "In the video playing example, what does the Library (FFmpeg) do?",
                options: [
                    "Interacts with the storage driver",
                    "Makes system calls to the OS to read the file from disk",
                    "Renders frames on the GPU",
                    "Controls the physical camera sensor"
                ],
                correctAnswer: "Makes system calls to the OS to read the file from disk"
            },
            {
                question: "In the video playing example, what does the OS do?",
                options: [
                    "Decodes the MP4 file",
                    "Interacts with the storage driver to fetch the file data",
                    "Provides the final user interface",
                    "Executes firmware instructions"
                ],
                correctAnswer: "Interacts with the storage driver to fetch the file data"
            },
            {
                question: "In the video playing example, what does the Driver do?",
                options: [
                    "Calls high-level toolkit functions",
                    "Communicates with the hard drive hardware to retrieve the raw bits",
                    "Displays the video on the monitor",
                    "Manages application-level logic"
                ],
                correctAnswer: "Communicates with the hard drive hardware to retrieve the raw bits"
            },
            {
                question: "What is the definition of a Library?",
                options: [
                    "A complete application for end users",
                    "A collection of pre-compiled, reusable code (functions, classes, data structures) that programmers can use to perform common tasks",
                    "Physical hardware components",
                    "System software that runs the OS"
                ],
                correctAnswer: "A collection of pre-compiled, reusable code (functions, classes, data structures) that programmers can use to perform common tasks"
            },
            {
                question: "What is the role of libraries in multimedia?",
                options: [
                    "Only to provide user interfaces",
                    "Provide optimized, tested implementations for complex multimedia operations (encoding, decoding, rendering, effects)",
                    "Replace the need for an operating system",
                    "Directly control physical hardware"
                ],
                correctAnswer: "Provide optimized, tested implementations for complex multimedia operations (encoding, decoding, rendering, effects)"
            },
            {
                question: "What are Static Libraries?",
                options: [
                    "Linked at run-time and shared by multiple programs",
                    "Linked into the program at compile-time. The library code becomes part of the final executable",
                    "Only used for dynamic web content",
                    "Firmware-level drivers"
                ],
                correctAnswer: "Linked into the program at compile-time. The library code becomes part of the final executable"
            },
            {
                question: "What are Dynamic/Shared Libraries?",
                options: [
                    "Linked at compile-time",
                    "Linked at run-time. The library code is stored in separate files (e.g., .dll on Windows, .so on Linux, .dylib on macOS)",
                    "Only for hardware level",
                    "Application-level executables"
                ],
                correctAnswer: "Linked at run-time. The library code is stored in separate files (e.g., .dll on Windows, .so on Linux, .dylib on macOS)"
            },
            {
                question: "Which library is used for reading and writing JPEG and PNG image files?",
                options: [
                    "FFmpeg",
                    "libjpeg / libpng",
                    "OpenGL",
                    "Qt"
                ],
                correctAnswer: "libjpeg / libpng"
            },
            {
                question: "Which library is a complete, cross-platform solution to record, convert, and stream audio and video (used by VLC and YouTube)?",
                options: [
                    "OpenAL",
                    "FFmpeg",
                    "libpng",
                    "JUCE"
                ],
                correctAnswer: "FFmpeg"
            },
            {
                question: "Which libraries are low-level graphics libraries for rendering 2D and 3D graphics (used in games)?",
                options: [
                    "OpenAL / XAudio2",
                    "OpenGL / DirectX / Vulkan",
                    "libjpeg / libpng",
                    "FFmpeg"
                ],
                correctAnswer: "OpenGL / DirectX / Vulkan"
            },
            {
                question: "Which libraries are used for 3D audio positioning and playback?",
                options: [
                    "OpenGL / Vulkan",
                    "OpenAL / XAudio2",
                    "FFmpeg",
                    "libpng"
                ],
                correctAnswer: "OpenAL / XAudio2"
            },
            {
                question: "What is a key advantage of using libraries?",
                options: [
                    "Increased program complexity",
                    "Reusability: Saves significant development time and effort",
                    "Versioning problems",
                    "Hardware-specific code"
                ],
                correctAnswer: "Reusability: Saves significant development time and effort"
            },
            {
                question: "What is another advantage of libraries?",
                options: [
                    "Learning curve for every project",
                    "Reliability: Libraries are usually well-tested and optimized",
                    "DLL hell",
                    "Increased overhead"
                ],
                correctAnswer: "Reliability: Libraries are usually well-tested and optimized"
            },
            {
                question: "What advantage do many libraries provide across different operating systems?",
                options: [
                    "Portability: Many libraries are cross-platform",
                    "Higher learning curve",
                    "Vendor lock-in",
                    "Bloat"
                ],
                correctAnswer: "Portability: Many libraries are cross-platform"
            },
            {
                question: "What is a disadvantage of libraries related to programmer knowledge?",
                options: [
                    "Portability",
                    "Learning Curve: Programmers must learn the library's specific API",
                    "Reusability",
                    "Reliability"
                ],
                correctAnswer: "Learning Curve: Programmers must learn the library's specific API"
            },
            {
                question: "What is a disadvantage of libraries related to versions?",
                options: [
                    "Reusability",
                    "Versioning: Dependency on specific library versions can lead to compatibility issues ('DLL hell')",
                    "High speed",
                    "Low complexity"
                ],
                correctAnswer: "Versioning: Dependency on specific library versions can lead to compatibility issues ('DLL hell')"
            },
            {
                question: "What is a disadvantage of libraries when used for small tasks?",
                options: [
                    "Portability",
                    "Overhead: Using a large library for a small task can increase program size and complexity",
                    "Reliability",
                    "Cross-platform support"
                ],
                correctAnswer: "Overhead: Using a large library for a small task can increase program size and complexity"
            },
            {
                question: "What is the definition of System Software?",
                options: [
                    "User-facing applications like VLC",
                    "A type of computer program designed to run a computer's hardware and application programs. It provides a platform for other software",
                    "Pre-compiled libraries only",
                    "High-level frameworks"
                ],
                correctAnswer: "A type of computer program designed to run a computer's hardware and application programs. It provides a platform for other software"
            },
            {
                question: "Which is the core system software that manages hardware resources and provides multimedia services?",
                options: [
                    "Device Drivers only",
                    "Operating System (OS) (e.g., Windows, macOS, Linux)",
                    "Static libraries",
                    "Application level software"
                ],
                correctAnswer: "Operating System (OS) (e.g., Windows, macOS, Linux)"
            },
            {
                question: "What are Device Drivers in the context of system software?",
                options: [
                    "High-level toolkits",
                    "Specialized software that allows the OS and higher-level programs to communicate with hardware devices",
                    "Programming languages",
                    "User applications"
                ],
                correctAnswer: "Specialized software that allows the OS and higher-level programs to communicate with hardware devices"
            },
            {
                question: "What is the definition of a Toolkit (or framework)?",
                options: [
                    "A single pre-compiled library",
                    "A collection of libraries, tools, conventions, and guidelines that provide a higher-level and more integrated environment for developing applications",
                    "Machine code for hardware",
                    "Only dynamic libraries"
                ],
                correctAnswer: "A collection of libraries, tools, conventions, and guidelines that provide a higher-level and more integrated environment for developing applications"
            }
        ];

        // ====================== QUIZ STATE ======================
        let shuffledQuestions = [];
        let currentIndex = 0;
        let userAnswers = [];
        let isAnswered = [];

        // Fisher-Yates shuffle
        function shuffleArray(array) {
            let arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function prepareShuffledQuestions() {
            shuffledQuestions = originalQuestions.map(q => {
                const shuffledOpts = shuffleArray(q.options);
                const correctIndex = shuffledOpts.indexOf(q.correctAnswer);
                return {
                    question: q.question,
                    options: shuffledOpts,
                    correctIndex: correctIndex
                };
            });
        }

        // ====================== RENDER QUESTION ======================
        function renderQuestion() {
            const q = shuffledQuestions[currentIndex];
            
            document.getElementById("question-counter").textContent = `${currentIndex + 1} / 30`;
            document.getElementById("question-text").textContent = q.question;
            
            const container = document.getElementById("options-container");
            container.innerHTML = "";
            
            const labels = ["A", "B", "C", "D"];
            
            q.options.forEach((option, idx) => {
                const btn = document.createElement("button");
                btn.className = `option-btn w-full text-left px-7 py-6 rounded-3xl border-2 border-zinc-700 bg-zinc-800 hover:border-cyan-400 transition-all flex items-start gap-4 group`;
                btn.innerHTML = `
                    <span class="w-8 h-8 flex-shrink-0 rounded-2xl bg-zinc-700 text-cyan-400 font-bold flex items-center justify-center text-lg transition-colors group-hover:bg-cyan-400 group-hover:text-white">${labels[idx]}</span>
                    <span class="text-lg leading-tight">${option}</span>
                `;
                
                btn.onclick = () => selectOption(idx);
                container.appendChild(btn);
            });
            
            updateProgress();
            updateNavigation();
            
            if (isAnswered[currentIndex]) {
                showFeedback();
            }
        }

        function selectOption(selectedIdx) {
            if (isAnswered[currentIndex]) return;
            
            isAnswered[currentIndex] = true;
            userAnswers[currentIndex] = selectedIdx;
            
            showFeedback();
            updateNavigation();
        }

        function showFeedback() {
            const q = shuffledQuestions[currentIndex];
            const container = document.getElementById("options-container");
            const buttons = container.children;
            const userChoice = userAnswers[currentIndex];
            
            for (let i = 0; i < buttons.length; i++) {
                const btn = buttons[i];
                
                if (i === q.correctIndex) {
                    btn.classList.add("correct");
                    btn.innerHTML += `<span class="ml-auto text-white text-2xl">✓</span>`;
                }
                
                if (i === userChoice) {
                    if (userChoice === q.correctIndex) {
                        btn.classList.add("selected-correct");
                    } else {
                        btn.classList.add("selected-wrong");
                        btn.innerHTML += `<span class="ml-auto text-white text-2xl">✕</span>`;
                    }
                }
                
                btn.onclick = null;
                btn.style.cursor = "default";
            }
        }

        function updateProgress() {
            const progress = ((currentIndex + 1) / 30) * 100;
            document.getElementById("progress-bar").style.width = `${progress}%`;
        }

        function updateNavigation() {
            const prevBtn = document.getElementById("btn-prev");
            const nextBtn = document.getElementById("btn-next");
            const nextText = document.getElementById("next-text");
            
            prevBtn.disabled = currentIndex === 0;
            prevBtn.style.opacity = currentIndex === 0 ? "0.4" : "1";
            
            if (currentIndex === 29) {
                nextText.textContent = "Finish Quiz";
            } else {
                nextText.textContent = "Next";
            }
        }

        function nextQuestion() {
            if (currentIndex < 29) {
                currentIndex++;
                renderQuestion();
            } else {
                showResults();
            }
        }

        function prevQuestion() {
            if (currentIndex > 0) {
                currentIndex--;
                renderQuestion();
            }
        }

        // ====================== RESULTS ======================
        function calculateResults() {
            let correct = 0;
            let incorrect = 0;
            let skipped = 0;
            
            for (let i = 0; i < 30; i++) {
                if (!isAnswered[i]) {
                    skipped++;
                } else if (userAnswers[i] === shuffledQuestions[i].correctIndex) {
                    correct++;
                } else {
                    incorrect++;
                }
            }
            
            const percentage = Math.round((correct / 30) * 100);
            return { correct, incorrect, skipped, percentage };
        }

        function showResults() {
            document.getElementById("quiz-screen").classList.add("hidden");
            const resultsScreen = document.getElementById("results-screen");
            resultsScreen.classList.remove("hidden");
            
            const stats = calculateResults();
            
            document.getElementById("score").textContent = stats.correct;
            document.getElementById("percentage").textContent = stats.percentage;
            document.getElementById("correct-count").textContent = stats.correct;
            document.getElementById("incorrect-count").textContent = stats.incorrect;
            document.getElementById("skipped-count").textContent = stats.skipped;
            
            const trophyEl = document.getElementById("trophy");
            if (stats.percentage >= 80) {
                trophyEl.innerHTML = "🏆";
            } else if (stats.percentage >= 60) {
                trophyEl.innerHTML = "🎉";
            } else {
                trophyEl.innerHTML = "🧩";
            }
            
            let insight = "";
            if (stats.percentage >= 90) {
                insight = "Outstanding performance! You have completely mastered abstraction levels, libraries, system software, toolkits, higher languages, and OOP concepts for multimedia.";
            } else if (stats.percentage >= 75) {
                insight = "Excellent work! Strong understanding of how abstractions enable efficient multimedia programming.";
            } else if (stats.percentage >= 60) {
                insight = "Good job! Solid grasp of the fundamentals. Review OOP concepts (encapsulation, inheritance, polymorphism) and toolkit examples.";
            } else {
                insight = "Keep learning! Focus on the 6 levels of abstraction and the difference between libraries and toolkits.";
            }
            document.getElementById("insight-text").innerHTML = insight;
        }

        // ====================== REVIEW MODAL ======================
        function showReviewModal() {
            const modal = document.getElementById("review-modal");
            const list = document.getElementById("review-list");
            list.innerHTML = "";
            
            shuffledQuestions.forEach((q, i) => {
                const answered = isAnswered[i];
                const userIdx = userAnswers[i];
                const isCorrect = answered && (userIdx === q.correctIndex);
                
                const div = document.createElement("div");
                div.className = "border border-zinc-700 rounded-3xl p-6";
                div.innerHTML = `
                    <div class="flex items-start justify-between">
                        <div class="flex-1">
                            <div class="flex items-center gap-x-3">
                                <span class="font-mono text-xs bg-zinc-800 px-3 py-1 rounded-2xl">${i+1}</span>
                                <p class="font-medium text-white leading-tight">${q.question}</p>
                            </div>
                            
                            <div class="mt-6 grid grid-cols-1 gap-4">
                                ${q.options.map((opt, idx) => {
                                    let statusHTML = "";
                                    if (answered && idx === userIdx) {
                                        statusHTML = isCorrect 
                                            ? `<span class="text-emerald-400 text-xs font-bold">YOUR ANSWER ✓</span>` 
                                            : `<span class="text-red-400 text-xs font-bold">YOUR ANSWER ✕</span>`;
                                    }
                                    if (idx === q.correctIndex) {
                                        statusHTML += ` <span class="text-emerald-400 text-xs font-bold">CORRECT</span>`;
                                    }
                                    return `
                                        <div class="flex justify-between items-center ${idx === q.correctIndex ? 'text-emerald-400' : 'text-zinc-300'}">
                                            <span>${String.fromCharCode(65 + idx)}. ${opt}</span>
                                            ${statusHTML}
                                        </div>
                                    `;
                                }).join("")}
                            </div>
                        </div>
                    </div>
                `;
                list.appendChild(div);
            });
            
            modal.classList.remove("hidden");
            modal.classList.add("flex");
        }

        function hideReviewModal() {
            const modal = document.getElementById("review-modal");
            modal.classList.add("hidden");
            modal.classList.remove("flex");
        }

        // ====================== SHARE ======================
        function shareResults() {
            const stats = calculateResults();
            const text = `🧩 I just scored ${stats.percentage}% on Quizzy Pro • Unit 6: Abstractions for Programming!\n\n✅ Correct: ${stats.correct}\n❌ Incorrect: ${stats.incorrect}\n⏭️ Skipped: ${stats.skipped}\n\nMastered abstraction levels, libraries, toolkits & OOP? Try Quizzy Pro!`;
            
            navigator.clipboard.writeText(text).then(() => {
                const btn = event.currentTarget;
                const origHTML = btn.innerHTML;
                btn.innerHTML = `<i class="fas fa-check"></i> COPIED!`;
                setTimeout(() => btn.innerHTML = origHTML, 2000);
            });
        }

        // ====================== RESTART ======================
        function restartQuiz() {
            currentIndex = 0;
            userAnswers = new Array(30).fill(null);
            isAnswered = new Array(30).fill(false);
            
            prepareShuffledQuestions();
            
            document.getElementById("quiz-screen").classList.remove("hidden");
            document.getElementById("results-screen").classList.add("hidden");
            
            renderQuestion();
            
            console.log("%cQuizzy Pro • Unit 6: Abstractions for Programming restarted with fresh random order!", "color:#67e8f9; font-weight:600");
        }

        // ====================== KEYBOARD SUPPORT ======================
        function handleKeyboard(e) {
            if (!document.getElementById("results-screen").classList.contains("hidden")) return;
            
            if (e.key === "ArrowRight") nextQuestion();
            if (e.key === "ArrowLeft") prevQuestion();
            if (e.key >= "1" && e.key <= "4" && !isAnswered[currentIndex]) {
                selectOption(parseInt(e.key) - 1);
            }
        }

        // ====================== START ======================
        function startQuiz() {
            prepareShuffledQuestions();
            userAnswers = new Array(30).fill(null);
            isAnswered = new Array(30).fill(false);
            currentIndex = 0;
            
            renderQuestion();
            document.addEventListener("keydown", handleKeyboard);
            
            console.log("%c✅ Quizzy Pro • Unit 6: Abstractions for Programming loaded successfully! (30 MCQs from official PDF)", "color:#67e8f9; font-family:monospace; font-size:13px");
        }

        window.onload = function() {
            startQuiz();
        };
    </script>
</body>
</html>
