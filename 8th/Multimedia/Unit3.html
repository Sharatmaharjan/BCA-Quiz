<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizzy Pro • Unit 3: Images and Graphics (30 MCQs)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&amp;family=Inter:wght@400;500;600&amp;display=swap');
        
        :root {
            --primary: 165 243 252;
        }
        
        body {
            font-family: 'Inter', system_ui, sans-serif;
        }
        
        .title-font {
            font-family: 'Poppins', sans-serif;
        }

        .option-btn {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .option-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 15px -3px rgb(129 140 248 / 0.3);
        }
        
        .option-btn.selected-correct {
            background-color: #10b981;
            color: white;
            border-color: #10b981;
        }
        
        .option-btn.selected-wrong {
            background-color: #ef4444;
            color: white;
            border-color: #ef4444;
        }
        
        .option-btn.correct {
            background-color: #10b981;
            color: white;
            border-color: #10b981;
        }
        
        .progress-bar {
            transition: width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .modal {
            animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .question-card {
            animation: fadeSlide 0.4s ease forwards;
        }
        
        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200 min-h-screen">
    <div class="max-w-3xl mx-auto">
        <!-- HEADER -->
        <header class="bg-gradient-to-r from-indigo-600 to-violet-600 text-white shadow-2xl">
            <div class="px-6 py-5 flex items-center justify-between">
                <div class="flex items-center gap-x-4">
                    <div class="w-12 h-12 bg-white/20 backdrop-blur-md rounded-3xl flex items-center justify-center text-4xl shadow-inner">
                        🖼️
                    </div>
                    <div>
                        <h1 class="title-font text-3xl font-semibold tracking-tighter">Quizzy Pro</h1>
                        <p class="text-indigo-100 text-sm font-medium -mt-1">Unit 3: Images and Graphics (30 MCQs)</p>
                    </div>
                </div>
                <div class="flex items-center gap-x-3">
                    <div onclick="restartQuiz()" 
                         class="flex items-center gap-x-2 bg-white/20 hover:bg-white/30 transition-colors px-5 py-2.5 rounded-3xl text-sm font-semibold cursor-pointer">
                        <i class="fas fa-redo"></i>
                        <span>Restart</span>
                    </div>
                </div>
            </div>
            
            <!-- PROGRESS -->
            <div class="h-2 bg-black/30 relative">
                <div id="progress-bar" 
                     class="progress-bar h-2 bg-white rounded-r-full w-0"></div>
            </div>
        </header>

        <!-- QUIZ CONTAINER -->
        <div id="quiz-screen" class="p-6">
            <div class="flex justify-between items-center mb-8">
                <div class="flex items-center gap-x-3">
                    <div class="px-5 py-1.5 bg-zinc-900 rounded-3xl text-sm font-mono font-medium text-indigo-400" id="question-counter">1 / 30</div>
                </div>
                <div onclick="showReviewModal()" 
                     class="text-xs uppercase tracking-widest font-semibold text-zinc-400 hover:text-indigo-300 cursor-pointer flex items-center gap-x-1">
                    <i class="fas fa-list-check"></i>
                    <span>Review All</span>
                </div>
            </div>

            <!-- QUESTION -->
            <div id="question-card" class="question-card bg-zinc-900 rounded-3xl p-8 shadow-2xl border border-zinc-800">
                <p id="question-text" class="text-2xl leading-tight font-medium text-white"></p>
                
                <!-- OPTIONS -->
                <div id="options-container" class="mt-10 space-y-4"></div>
            </div>

            <!-- NAVIGATION -->
            <div class="flex gap-4 mt-10">
                <button onclick="prevQuestion()" 
                        id="btn-prev"
                        class="flex-1 bg-zinc-900 hover:bg-zinc-800 transition-colors text-white font-semibold py-5 rounded-3xl flex items-center justify-center gap-x-3 shadow-inner">
                    <i class="fas fa-chevron-left"></i>
                    <span>Previous</span>
                </button>
                
                <button onclick="nextQuestion()" 
                        id="btn-next"
                        class="flex-1 bg-gradient-to-r from-indigo-500 to-violet-500 hover:from-indigo-400 hover:to-violet-400 transition-all font-semibold py-5 rounded-3xl flex items-center justify-center gap-x-3 shadow-lg shadow-indigo-500/30">
                    <span id="next-text">Next</span>
                    <i class="fas fa-chevron-right"></i>
                </button>
            </div>
        </div>

        <!-- RESULTS SCREEN -->
        <div id="results-screen" class="hidden p-6">
            <div class="bg-zinc-900 rounded-3xl p-10 text-center">
                <!-- Trophy -->
                <div id="trophy" class="mx-auto w-32 h-32 flex items-center justify-center text-8xl mb-6"></div>
                
                <h2 class="text-6xl font-bold text-white mb-1" id="score">92</h2>
                <p class="text-indigo-400 text-2xl font-semibold">Score • <span id="percentage">92</span>%</p>
                
                <div class="grid grid-cols-3 gap-6 mt-12">
                    <div class="bg-zinc-800 rounded-3xl p-6">
                        <div class="flex items-center justify-center gap-x-3 text-emerald-400">
                            <i class="fas fa-check-circle text-3xl"></i>
                        </div>
                        <div id="correct-count" class="text-5xl font-bold mt-4 text-white">28</div>
                        <div class="text-zinc-400 text-sm font-medium mt-1">CORRECT</div>
                    </div>
                    <div class="bg-zinc-800 rounded-3xl p-6">
                        <div class="flex items-center justify-center gap-x-3 text-red-400">
                            <i class="fas fa-times-circle text-3xl"></i>
                        </div>
                        <div id="incorrect-count" class="text-5xl font-bold mt-4 text-white">1</div>
                        <div class="text-zinc-400 text-sm font-medium mt-1">INCORRECT</div>
                    </div>
                    <div class="bg-zinc-800 rounded-3xl p-6">
                        <div class="flex items-center justify-center gap-x-3 text-amber-400">
                            <i class="fas fa-forward text-3xl"></i>
                        </div>
                        <div id="skipped-count" class="text-5xl font-bold mt-4 text-white">1</div>
                        <div class="text-zinc-400 text-sm font-medium mt-1">SKIPPED</div>
                    </div>
                </div>

                <!-- Insight -->
                <div class="mt-10 bg-zinc-800/70 rounded-3xl p-8 text-left">
                    <p id="insight-text" class="text-zinc-300 leading-relaxed text-lg"></p>
                </div>

                <!-- Actions -->
                <div class="flex flex-col sm:flex-row gap-4 mt-12">
                    <button onclick="showReviewModal()" 
                            class="flex-1 py-6 bg-white text-zinc-900 rounded-3xl font-semibold flex items-center justify-center gap-x-3 hover:scale-105 transition-transform">
                        <i class="fas fa-list-check"></i>
                        REVIEW ALL ANSWERS
                    </button>
                    
                    <button onclick="shareResults()" 
                            class="flex-1 py-6 bg-zinc-800 hover:bg-zinc-700 rounded-3xl font-semibold flex items-center justify-center gap-x-3 transition-colors">
                        <i class="fas fa-share-nodes"></i>
                        SHARE RESULT
                    </button>
                </div>
                
                <button onclick="restartQuiz()" 
                        class="mt-6 w-full py-5 text-indigo-400 font-medium flex items-center justify-center gap-x-2 hover:text-indigo-300">
                    <i class="fas fa-rotate"></i>
                    <span>Restart Quiz</span>
                </button>
            </div>
        </div>
    </div>

    <!-- REVIEW MODAL -->
    <div id="review-modal" onclick="if(event.target.id==='review-modal')hideReviewModal()" 
         class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
        <div onclick="event.stopImmediatePropagation()" 
             class="modal bg-zinc-900 w-full max-w-2xl max-h-[85vh] rounded-3xl shadow-2xl flex flex-col">
            
            <!-- Modal Header -->
            <div class="px-8 py-6 border-b border-zinc-700 flex items-center justify-between">
                <div class="font-semibold text-xl">Review All Answers</div>
                <button onclick="hideReviewModal()" 
                        class="w-9 h-9 flex items-center justify-center text-3xl leading-none text-zinc-400 hover:text-white">×</button>
            </div>
            
            <!-- Content -->
            <div id="review-list" class="flex-1 overflow-auto p-6 space-y-8">
                <!-- JS injected -->
            </div>
            
            <div class="p-6 border-t border-zinc-700">
                <button onclick="hideReviewModal()" 
                        class="w-full py-5 bg-indigo-500 hover:bg-indigo-400 transition-colors rounded-3xl text-white font-semibold">
                    Close Review
                </button>
            </div>
        </div>
    </div>

    <script>
        // ====================== ORIGINAL QUESTIONS (30 exact from PDF) ======================
        const originalQuestions = [
            {
                question: "Which use of images and graphics makes multimedia applications attractive and engaging?",
                options: [
                    "Building Brand Identity",
                    "Enhancing Visual Appeal and Aesthetics",
                    "Facilitating Learning and Retention",
                    "Image Transmission"
                ],
                correctAnswer: "Enhancing Visual Appeal and Aesthetics"
            },
            {
                question: "Which use of images and graphics helps convey information quickly and effectively because visuals are processed faster by the human brain?",
                options: [
                    "Artistic and Creative Expression",
                    "Conveying Information Quickly and Effectively",
                    "Supporting Communication and User Interface Design",
                    "Image Synthesis"
                ],
                correctAnswer: "Conveying Information Quickly and Effectively"
            },
            {
                question: "Which use of images and graphics improves understanding and memory when paired with educational material?",
                options: [
                    "Building Brand Identity",
                    "Facilitating Learning and Retention",
                    "Image Analysis",
                    "Enhancing Visual Appeal and Aesthetics"
                ],
                correctAnswer: "Facilitating Learning and Retention"
            },
            {
                question: "Which use of images and graphics provides intuitive navigation through icons and symbols?",
                options: [
                    "Conveying Information Quickly and Effectively",
                    "Supporting Communication and User Interface Design",
                    "Artistic and Creative Expression",
                    "Image Transmission"
                ],
                correctAnswer: "Supporting Communication and User Interface Design"
            },
            {
                question: "Which use of images and graphics helps create a recognizable brand image using logos and specific color schemes?",
                options: [
                    "Facilitating Learning and Retention",
                    "Building Brand Identity",
                    "Image Synthesis",
                    "Enhancing Visual Appeal and Aesthetics"
                ],
                correctAnswer: "Building Brand Identity"
            },
            {
                question: "Which use of images and graphics includes digital art, photo manipulation, and illustration?",
                options: [
                    "Supporting Communication and User Interface Design",
                    "Artistic and Creative Expression",
                    "Conveying Information Quickly and Effectively",
                    "Image Analysis"
                ],
                correctAnswer: "Artistic and Creative Expression"
            },
            {
                question: "What are the two primary models of Digital Image Representation?",
                options: [
                    "JPEG and PNG",
                    "Raster (Bitmap) and Vector",
                    "MIDI and Digital Audio",
                    "Lossy and Lossless"
                ],
                correctAnswer: "Raster (Bitmap) and Vector"
            },
            {
                question: "What is the definition of Raster (Bitmap) Images?",
                options: [
                    "Composed of mathematical formulas and primitives",
                    "Composed of a rectangular grid of tiny squares called pixels. Each pixel stores color information.",
                    "Stored as XML-based instructions",
                    "Infinitely scalable without loss of quality"
                ],
                correctAnswer: "Composed of a rectangular grid of tiny squares called pixels. Each pixel stores color information."
            },
            {
                question: "How are Raster images represented in a computer?",
                options: [
                    "As a set of drawing commands",
                    "Stored as a 2D array or matrix of pixel values",
                    "As SVG code",
                    "As MIDI messages"
                ],
                correctAnswer: "Stored as a 2D array or matrix of pixel values"
            },
            {
                question: "Which key characteristic applies to Raster images?",
                options: [
                    "Resolution-Independent",
                    "Resolution-Dependent: Image quality is fixed at capture. Enlarging causes pixelation.",
                    "File size is always smaller",
                    "Best for logos and typography"
                ],
                correctAnswer: "Resolution-Dependent: Image quality is fixed at capture. Enlarging causes pixelation."
            },
            {
                question: "Raster images are best suited for:",
                options: [
                    "Logos, illustrations and technical drawings",
                    "Photographs and complex images with continuous tones",
                    "Fonts and typography",
                    "Scalable web icons"
                ],
                correctAnswer: "Photographs and complex images with continuous tones"
            },
            {
                question: "Which is the exact Real-World Example given for Raster images?",
                options: [
                    "A company logo in SVG format",
                    "A photo taken on a smartphone (JPEG) or a scanned document (TIFF)",
                    "TrueType fonts",
                    "Procedural generation in games"
                ],
                correctAnswer: "A photo taken on a smartphone (JPEG) or a scanned document (TIFF)"
            },
            {
                question: "What is the definition of Vector Graphics?",
                options: [
                    "Composed of a grid of pixels",
                    "Composed of mathematical formulas, commands, and primitives (points, lines, curves, shapes)",
                    "Always uses lossy compression",
                    "Fixed resolution at capture"
                ],
                correctAnswer: "Composed of mathematical formulas, commands, and primitives (points, lines, curves, shapes)"
            },
            {
                question: "How are Vector graphics represented in a computer?",
                options: [
                    "As a 2D matrix of pixel values",
                    "Stored as a set of instructions (e.g., 'draw a circle with radius r at coordinates (x,y)')",
                    "As raw sensor data",
                    "As PCM audio samples"
                ],
                correctAnswer: "Stored as a set of instructions (e.g., 'draw a circle with radius r at coordinates (x,y)')"
            },
            {
                question: "Which key characteristic applies to Vector graphics?",
                options: [
                    "Resolution-Dependent and causes pixelation when enlarged",
                    "Resolution-Independent: Can be scaled infinitely without any loss of quality or increase in file size",
                    "Best for photographs",
                    "Larger file size than raster"
                ],
                correctAnswer: "Resolution-Independent: Can be scaled infinitely without any loss of quality or increase in file size"
            },
            {
                question: "Vector graphics are best suited for:",
                options: [
                    "Photographs with continuous tones",
                    "Logos, illustrations, typography, and technical drawings",
                    "Scanned documents",
                    "High-resolution selfies"
                ],
                correctAnswer: "Logos, illustrations, typography, and technical drawings"
            },
            {
                question: "Which is the exact Real-World Example given for Vector graphics?",
                options: [
                    "A smartphone photo in JPEG",
                    "A company logo (SVG), fonts (TrueType/OpenType), and maps",
                    "A scanned TIFF document",
                    "A 24-bit true color image"
                ],
                correctAnswer: "A company logo (SVG), fonts (TrueType/OpenType), and maps"
            },
            {
                question: "According to the Raster vs Vector comparison table, what is the composition of Raster Graphics?",
                options: [
                    "Mathematical paths",
                    "Pixels (dots)",
                    "XML-based instructions",
                    "MIDI messages"
                ],
                correctAnswer: "Pixels (dots)"
            },
            {
                question: "According to the Raster vs Vector comparison table, what is the scalability of Raster Graphics?",
                options: [
                    "Infinitely scalable",
                    "Not scalable; loses quality",
                    "Depends on file format",
                    "Always smaller file size"
                ],
                correctAnswer: "Not scalable; loses quality"
            },
            {
                question: "According to the Raster vs Vector comparison table, which generally has a larger file size?",
                options: [
                    "Vector Graphics",
                    "Raster Graphics",
                    "Both are equal",
                    "SVG only"
                ],
                correctAnswer: "Raster Graphics"
            },
            {
                question: "What does Resolution mean in Raster Representation?",
                options: [
                    "The number of bits per pixel",
                    "The number of pixels in an image (e.g., 1920x1080)",
                    "The compression method used",
                    "The color support level"
                ],
                correctAnswer: "The number of pixels in an image (e.g., 1920x1080)"
            },
            {
                question: "What does 24-bit color depth (Bit Depth) represent in digital images?",
                options: [
                    "Black and white only",
                    "True Color, over 16 million colors (8 bits each for Red, Green, and Blue)",
                    "256 colors or shades of gray",
                    "Unprocessed sensor data"
                ],
                correctAnswer: "True Color, over 16 million colors (8 bits each for Red, Green, and Blue)"
            },
            {
                question: "What is the process of converting an analog image to a digital one called?",
                options: [
                    "Image Transmission",
                    "Sampling and Quantization",
                    "Procedural Generation",
                    "Geometric Transformation"
                ],
                correctAnswer: "Sampling and Quantization"
            },
            {
                question: "Which image format uses Lossy compression, supports 24-bit RGB, and is typically used for photographs and web images?",
                options: [
                    "PNG",
                    "JPEG/JPG",
                    "GIF",
                    "SVG"
                ],
                correctAnswer: "JPEG/JPG"
            },
            {
                question: "Which image format supports Alpha Transparency and is ideal for logos and web graphics with transparent backgrounds?",
                options: [
                    "JPEG",
                    "PNG",
                    "BMP",
                    "RAW"
                ],
                correctAnswer: "PNG"
            },
            {
                question: "Which image format supports animation and is limited to 256 colors?",
                options: [
                    "TIFF",
                    "GIF",
                    "WebP",
                    "SVG"
                ],
                correctAnswer: "GIF"
            },
            {
                question: "Which image format has no compression (very large files) and is a legacy Windows format?",
                options: [
                    "PNG",
                    "BMP",
                    "FLAC",
                    "SVG"
                ],
                correctAnswer: "BMP"
            },
            {
                question: "Which image format is lossless, supports layers, and is used in professional photography and desktop publishing?",
                options: [
                    "GIF",
                    "TIFF/TIF",
                    "WebP",
                    "JPEG"
                ],
                correctAnswer: "TIFF/TIF"
            },
            {
                question: "Which modern image format supports both lossy & lossless compression, transparency, animation, and produces smaller files than JPEG/PNG for the web?",
                options: [
                    "BMP",
                    "WebP",
                    "RAW",
                    "AIFF"
                ],
                correctAnswer: "WebP"
            },
            {
                question: "Which image format is a vector format, XML-based, scalable, and ideal for logos and icons on the web?",
                options: [
                    "TIFF",
                    "SVG",
                    "RAW",
                    "PNG"
                ],
                correctAnswer: "SVG"
            },
            {
                question: "Which image format stores unprocessed sensor data and is used in professional photography workflows?",
                options: [
                    "GIF",
                    "RAW",
                    "JPEG",
                    "BMP"
                ],
                correctAnswer: "RAW"
            }
        ];

        // ====================== QUIZ STATE ======================
        let shuffledQuestions = [];
        let currentIndex = 0;
        let userAnswers = [];
        let isAnswered = [];

        // Fisher-Yates shuffle
        function shuffleArray(array) {
            let arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function prepareShuffledQuestions() {
            shuffledQuestions = originalQuestions.map(q => {
                const shuffledOpts = shuffleArray(q.options);
                const correctIndex = shuffledOpts.indexOf(q.correctAnswer);
                return {
                    question: q.question,
                    options: shuffledOpts,
                    correctIndex: correctIndex
                };
            });
        }

        // ====================== RENDER QUESTION ======================
        function renderQuestion() {
            const q = shuffledQuestions[currentIndex];
            
            document.getElementById("question-counter").textContent = `${currentIndex + 1} / 30`;
            document.getElementById("question-text").textContent = q.question;
            
            const container = document.getElementById("options-container");
            container.innerHTML = "";
            
            const labels = ["A", "B", "C", "D"];
            
            q.options.forEach((option, idx) => {
                const btn = document.createElement("button");
                btn.className = `option-btn w-full text-left px-7 py-6 rounded-3xl border-2 border-zinc-700 bg-zinc-800 hover:border-indigo-400 transition-all flex items-start gap-4 group`;
                btn.innerHTML = `
                    <span class="w-8 h-8 flex-shrink-0 rounded-2xl bg-zinc-700 text-indigo-400 font-bold flex items-center justify-center text-lg transition-colors group-hover:bg-indigo-400 group-hover:text-white">${labels[idx]}</span>
                    <span class="text-lg leading-tight">${option}</span>
                `;
                
                btn.onclick = () => selectOption(idx);
                container.appendChild(btn);
            });
            
            updateProgress();
            updateNavigation();
            
            if (isAnswered[currentIndex]) {
                showFeedback();
            }
        }

        function selectOption(selectedIdx) {
            if (isAnswered[currentIndex]) return;
            
            isAnswered[currentIndex] = true;
            userAnswers[currentIndex] = selectedIdx;
            
            showFeedback();
            updateNavigation();
        }

        function showFeedback() {
            const q = shuffledQuestions[currentIndex];
            const container = document.getElementById("options-container");
            const buttons = container.children;
            const userChoice = userAnswers[currentIndex];
            
            for (let i = 0; i < buttons.length; i++) {
                const btn = buttons[i];
                
                if (i === q.correctIndex) {
                    btn.classList.add("correct");
                    btn.innerHTML += `<span class="ml-auto text-white text-2xl">✓</span>`;
                }
                
                if (i === userChoice) {
                    if (userChoice === q.correctIndex) {
                        btn.classList.add("selected-correct");
                    } else {
                        btn.classList.add("selected-wrong");
                        btn.innerHTML += `<span class="ml-auto text-white text-2xl">✕</span>`;
                    }
                }
                
                btn.onclick = null;
                btn.style.cursor = "default";
            }
        }

        function updateProgress() {
            const progress = ((currentIndex + 1) / 30) * 100;
            document.getElementById("progress-bar").style.width = `${progress}%`;
        }

        function updateNavigation() {
            const prevBtn = document.getElementById("btn-prev");
            const nextBtn = document.getElementById("btn-next");
            const nextText = document.getElementById("next-text");
            
            prevBtn.disabled = currentIndex === 0;
            prevBtn.style.opacity = currentIndex === 0 ? "0.4" : "1";
            
            if (currentIndex === 29) {
                nextText.textContent = "Finish Quiz";
            } else {
                nextText.textContent = "Next";
            }
        }

        function nextQuestion() {
            if (currentIndex < 29) {
                currentIndex++;
                renderQuestion();
            } else {
                showResults();
            }
        }

        function prevQuestion() {
            if (currentIndex > 0) {
                currentIndex--;
                renderQuestion();
            }
        }

        // ====================== RESULTS ======================
        function calculateResults() {
            let correct = 0;
            let incorrect = 0;
            let skipped = 0;
            
            for (let i = 0; i < 30; i++) {
                if (!isAnswered[i]) {
                    skipped++;
                } else if (userAnswers[i] === shuffledQuestions[i].correctIndex) {
                    correct++;
                } else {
                    incorrect++;
                }
            }
            
            const percentage = Math.round((correct / 30) * 100);
            return { correct, incorrect, skipped, percentage };
        }

        function showResults() {
            document.getElementById("quiz-screen").classList.add("hidden");
            const resultsScreen = document.getElementById("results-screen");
            resultsScreen.classList.remove("hidden");
            
            const stats = calculateResults();
            
            document.getElementById("score").textContent = stats.correct;
            document.getElementById("percentage").textContent = stats.percentage;
            document.getElementById("correct-count").textContent = stats.correct;
            document.getElementById("incorrect-count").textContent = stats.incorrect;
            document.getElementById("skipped-count").textContent = stats.skipped;
            
            const trophyEl = document.getElementById("trophy");
            if (stats.percentage >= 80) {
                trophyEl.innerHTML = "🏆";
            } else if (stats.percentage >= 60) {
                trophyEl.innerHTML = "🎉";
            } else {
                trophyEl.innerHTML = "🖼️";
            }
            
            let insight = "";
            if (stats.percentage >= 90) {
                insight = "Outstanding performance! You have completely mastered Raster vs Vector graphics, all major image formats, and the full lifecycle of image synthesis, analysis & transmission.";
            } else if (stats.percentage >= 75) {
                insight = "Excellent work! Strong understanding of digital image representation and professional workflows.";
            } else if (stats.percentage >= 60) {
                insight = "Good job! Solid grasp of the fundamentals. Review the format comparison table and Raster vs Vector differences.";
            } else {
                insight = "Keep learning! Focus on resolution, bit depth, and when to use each image format.";
            }
            document.getElementById("insight-text").innerHTML = insight;
        }

        // ====================== REVIEW MODAL ======================
        function showReviewModal() {
            const modal = document.getElementById("review-modal");
            const list = document.getElementById("review-list");
            list.innerHTML = "";
            
            shuffledQuestions.forEach((q, i) => {
                const answered = isAnswered[i];
                const userIdx = userAnswers[i];
                const isCorrect = answered && (userIdx === q.correctIndex);
                
                const div = document.createElement("div");
                div.className = "border border-zinc-700 rounded-3xl p-6";
                div.innerHTML = `
                    <div class="flex items-start justify-between">
                        <div class="flex-1">
                            <div class="flex items-center gap-x-3">
                                <span class="font-mono text-xs bg-zinc-800 px-3 py-1 rounded-2xl">${i+1}</span>
                                <p class="font-medium text-white leading-tight">${q.question}</p>
                            </div>
                            
                            <div class="mt-6 grid grid-cols-1 gap-4">
                                ${q.options.map((opt, idx) => {
                                    let statusHTML = "";
                                    if (answered && idx === userIdx) {
                                        statusHTML = isCorrect 
                                            ? `<span class="text-emerald-400 text-xs font-bold">YOUR ANSWER ✓</span>` 
                                            : `<span class="text-red-400 text-xs font-bold">YOUR ANSWER ✕</span>`;
                                    }
                                    if (idx === q.correctIndex) {
                                        statusHTML += ` <span class="text-emerald-400 text-xs font-bold">CORRECT</span>`;
                                    }
                                    return `
                                        <div class="flex justify-between items-center ${idx === q.correctIndex ? 'text-emerald-400' : 'text-zinc-300'}">
                                            <span>${String.fromCharCode(65 + idx)}. ${opt}</span>
                                            ${statusHTML}
                                        </div>
                                    `;
                                }).join("")}
                            </div>
                        </div>
                    </div>
                `;
                list.appendChild(div);
            });
            
            modal.classList.remove("hidden");
            modal.classList.add("flex");
        }

        function hideReviewModal() {
            const modal = document.getElementById("review-modal");
            modal.classList.add("hidden");
            modal.classList.remove("flex");
        }

        // ====================== SHARE ======================
        function shareResults() {
            const stats = calculateResults();
            const text = `🖼️ I just scored ${stats.percentage}% on Quizzy Pro • Unit 3: Images and Graphics!\n\n✅ Correct: ${stats.correct}\n❌ Incorrect: ${stats.incorrect}\n⏭️ Skipped: ${stats.skipped}\n\nMastered Raster vs Vector and every image format? Try Quizzy Pro!`;
            
            navigator.clipboard.writeText(text).then(() => {
                const btn = event.currentTarget;
                const origHTML = btn.innerHTML;
                btn.innerHTML = `<i class="fas fa-check"></i> COPIED!`;
                setTimeout(() => btn.innerHTML = origHTML, 2000);
            });
        }

        // ====================== RESTART ======================
        function restartQuiz() {
            currentIndex = 0;
            userAnswers = new Array(30).fill(null);
            isAnswered = new Array(30).fill(false);
            
            prepareShuffledQuestions();
            
            document.getElementById("quiz-screen").classList.remove("hidden");
            document.getElementById("results-screen").classList.add("hidden");
            
            renderQuestion();
            
            console.log("%cQuizzy Pro • Unit 3: Images and Graphics restarted with fresh random order!", "color:#a5b4fc; font-weight:600");
        }

        // ====================== KEYBOARD SUPPORT ======================
        function handleKeyboard(e) {
            if (!document.getElementById("results-screen").classList.contains("hidden")) return;
            
            if (e.key === "ArrowRight") nextQuestion();
            if (e.key === "ArrowLeft") prevQuestion();
            if (e.key >= "1" && e.key <= "4" && !isAnswered[currentIndex]) {
                selectOption(parseInt(e.key) - 1);
            }
        }

        // ====================== START ======================
        function startQuiz() {
            prepareShuffledQuestions();
            userAnswers = new Array(30).fill(null);
            isAnswered = new Array(30).fill(false);
            currentIndex = 0;
            
            renderQuestion();
            document.addEventListener("keydown", handleKeyboard);
            
            console.log("%c✅ Quizzy Pro • Unit 3: Images and Graphics loaded successfully! (30 MCQs from official PDF)", "color:#a5b4fc; font-family:monospace; font-size:13px");
        }

        window.onload = function() {
            startQuiz();
        };
    </script>
</body>
</html>
