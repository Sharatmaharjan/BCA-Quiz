<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizzy Pro • Unit 6: File Handling in Java (30 MCQs)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&amp;family=Inter:wght@400;500;600&amp;display=swap');
        body { font-family: 'Inter', system_ui, sans-serif; }
        .title-font { font-family: 'Poppins', sans-serif; }
        .option-btn { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .option-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgb(34 211 238 / 0.3); }
        .option-btn.selected-correct { background-color: #10b981; color: white; border-color: #10b981; }
        .option-btn.selected-wrong { background-color: #ef4444; color: white; border-color: #ef4444; }
        .option-btn.correct { background-color: #10b981; color: white; border-color: #10b981; }
        .progress-bar { transition: width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .modal { animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .question-card { animation: fadeSlide 0.4s ease forwards; }
        @keyframes fadeSlide { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200 min-h-screen">
    <div class="max-w-3xl mx-auto">
        <header class="bg-gradient-to-r from-cyan-600 to-blue-600 text-white shadow-2xl">
            <div class="px-6 py-5 flex items-center justify-between">
                <div class="flex items-center gap-x-4">
                    <div class="w-12 h-12 bg-white/20 backdrop-blur-md rounded-3xl flex items-center justify-center text-4xl shadow-inner">💾</div>
                    <div>
                        <h1 class="title-font text-3xl font-semibold tracking-tighter">Quizzy Pro</h1>
                        <p class="text-cyan-100 text-sm font-medium -mt-1">Unit 6: File Handling in Java (30 MCQs)</p>
                    </div>
                </div>
                <div onclick="restartQuiz()" class="flex items-center gap-x-2 bg-white/20 hover:bg-white/30 px-5 py-2.5 rounded-3xl text-sm font-semibold cursor-pointer">
                    <i class="fas fa-redo"></i><span>Restart</span>
                </div>
            </div>
            <div class="h-2 bg-black/30 relative">
                <div id="progress-bar" class="progress-bar h-2 bg-white rounded-r-full w-0"></div>
            </div>
        </header>

        <div id="quiz-screen" class="p-6">
            <div class="flex justify-center mb-8">
                <div class="px-5 py-1.5 bg-zinc-900 rounded-3xl text-sm font-mono font-medium text-cyan-400" id="question-counter">1 / 30</div>
            </div>
            <div id="question-card" class="question-card bg-zinc-900 rounded-3xl p-8 shadow-2xl border border-zinc-800">
                <p id="question-text" class="text-2xl leading-tight font-medium text-white"></p>
                <div id="options-container" class="mt-10 space-y-4"></div>
            </div>
            <div class="flex gap-4 mt-10">
                <button onclick="prevQuestion()" id="btn-prev" class="flex-1 bg-zinc-900 hover:bg-zinc-800 text-white font-semibold py-5 rounded-3xl flex items-center justify-center gap-x-3">
                    <i class="fas fa-chevron-left"></i><span>Previous</span>
                </button>
                <button onclick="nextQuestion()" id="btn-next" class="flex-1 bg-gradient-to-r from-cyan-500 to-blue-500 font-semibold py-5 rounded-3xl flex items-center justify-center gap-x-3">
                    <span id="next-text">Next</span><i class="fas fa-chevron-right"></i>
                </button>
            </div>
        </div>

        <div id="results-screen" class="hidden p-6">
            <div class="bg-zinc-900 rounded-3xl p-10 text-center">
                <div id="trophy" class="mx-auto w-32 h-32 flex items-center justify-center text-8xl mb-6"></div>
                <h2 class="text-6xl font-bold text-white mb-1" id="score">92</h2>
                <p class="text-cyan-400 text-2xl font-semibold">Score • <span id="percentage">92</span>%</p>
                <div class="grid grid-cols-3 gap-6 mt-12">
                    <div class="bg-zinc-800 rounded-3xl p-6"><div class="text-emerald-400"><i class="fas fa-check-circle text-3xl"></i></div><div id="correct-count" class="text-5xl font-bold mt-4 text-white">28</div><div class="text-zinc-400 text-sm">CORRECT</div></div>
                    <div class="bg-zinc-800 rounded-3xl p-6"><div class="text-red-400"><i class="fas fa-times-circle text-3xl"></i></div><div id="incorrect-count" class="text-5xl font-bold mt-4 text-white">1</div><div class="text-zinc-400 text-sm">INCORRECT</div></div>
                    <div class="bg-zinc-800 rounded-3xl p-6"><div class="text-amber-400"><i class="fas fa-forward text-3xl"></i></div><div id="skipped-count" class="text-5xl font-bold mt-4 text-white">1</div><div class="text-zinc-400 text-sm">SKIPPED</div></div>
                </div>
                <div class="mt-10 bg-zinc-800/70 rounded-3xl p-8 text-left">
                    <p id="insight-text" class="text-zinc-300 leading-relaxed text-lg"></p>
                </div>
                <div class="flex flex-col sm:flex-row gap-4 mt-12">
                    <button onclick="showReviewModal()" class="flex-1 py-6 bg-white text-zinc-900 rounded-3xl font-semibold flex items-center justify-center gap-x-3">REVIEW ALL ANSWERS</button>
                    <button onclick="shareResults()" class="flex-1 py-6 bg-zinc-800 hover:bg-zinc-700 rounded-3xl font-semibold flex items-center justify-center gap-x-3">SHARE RESULT</button>
                </div>
                <button onclick="restartQuiz()" class="mt-6 w-full py-5 text-cyan-400 font-medium flex items-center justify-center gap-x-2">Restart Quiz</button>
            </div>
        </div>
    </div>

    <!-- REVIEW MODAL -->
    <div id="review-modal" onclick="if(event.target.id==='review-modal')hideReviewModal()" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
        <div onclick="event.stopImmediatePropagation()" class="modal bg-zinc-900 w-full max-w-2xl max-h-[85vh] rounded-3xl shadow-2xl flex flex-col">
            <div class="px-8 py-6 border-b border-zinc-700 flex items-center justify-between">
                <div class="font-semibold text-xl">Review All Answers</div>
                <button onclick="hideReviewModal()" class="w-9 h-9 flex items-center justify-center text-3xl text-zinc-400 hover:text-white">×</button>
            </div>
            <div id="review-list" class="flex-1 overflow-auto p-6 space-y-8"></div>
            <div class="p-6 border-t border-zinc-700">
                <button onclick="hideReviewModal()" class="w-full py-5 bg-cyan-500 hover:bg-cyan-400 rounded-3xl text-white font-semibold">Close Review</button>
            </div>
        </div>
    </div>

    <script>
        const originalQuestions = [
            {question:"System.in represents",options:["Standard Output","Standard Input (keyboard)","Standard Error","File Input Stream"],correctAnswer:"Standard Input (keyboard)"},
            {question:"Which class is recommended for reading text from console line by line?",options:["FileReader","BufferedReader","FileInputStream","PrintWriter"],correctAnswer:"BufferedReader"},
            {question:"Byte streams in Java are used primarily for",options:["Text data","Binary data (images, audio, video)","Only console input","Database connections"],correctAnswer:"Binary data (images, audio, video)"},
            {question:"Character streams in Java are used for",options:["Raw bytes","Text data with proper Unicode handling","Binary files only","Network sockets"],correctAnswer:"Text data with proper Unicode handling"},
            {question:"FileInputStream is used for",options:["Reading characters","Reading raw bytes from a file","Writing to a file","Reading lines from console"],correctAnswer:"Reading raw bytes from a file"},
            {question:"BufferedInputStream improves performance by",options:["Reading one byte at a time","Using an internal buffer to reduce system calls","Converting bytes to characters","Compressing data"],correctAnswer:"Using an internal buffer to reduce system calls"},
            {question:"FileReader is a",options:["Byte stream","Character stream","Buffered stream","Random access stream"],correctAnswer:"Character stream"},
            {question:"BufferedReader provides the convenient method",options:["read()","readLine()","writeLine()","getBytes()"],correctAnswer:"readLine()"},
            {question:"try-with-resources is used to",options:["Handle exceptions manually","Automatically close resources","Improve performance","Serialize objects"],correctAnswer:"Automatically close resources"},
            {question:"PrintWriter is commonly used for",options:["Reading binary files","Formatted text output (println, printf)","Random access","Deserialization"],correctAnswer:"Formatted text output (println, printf)"},
            {question:"Serialization in Java is the process of",options:["Converting object to byte stream","Reading data from file","Converting bytes to characters","Deleting a file"],correctAnswer:"Converting object to byte stream"},
            {question:"To make a class serializable, it must implement",options:["Serializable interface","Externalizable interface","Cloneable interface","Runnable interface"],correctAnswer:"Serializable interface"},
            {question:"The transient keyword is used to",options:["Make a field serializable","Skip a field during serialization","Make a field final","Increase performance"],correctAnswer:"Skip a field during serialization"},
            {question:"serialVersionUID is used to",options:["Increase speed","Ensure version compatibility during deserialization","Encrypt data","Compress objects"],correctAnswer:"Ensure version compatibility during deserialization"},
            {question:"RandomAccessFile allows",options:["Only sequential reading","Random read and write access using seek()","Only writing data","Only character data"],correctAnswer:"Random read and write access using seek()"},
            {question:"Which mode opens a file for both reading and writing with RandomAccessFile?",options:["r","w","rw","rws"],correctAnswer:"rw"},
            {question:"Which stream should NOT be used for binary files like images?",options:["FileInputStream","FileOutputStream","FileReader","BufferedInputStream"],correctAnswer:"FileReader"},
            {question:"ObjectOutputStream is used for",options:["Writing primitive data","Serializing Java objects","Reading text files","Console output"],correctAnswer:"Serializing Java objects"},
            {question:"What happens if a class does not implement Serializable during serialization?",options:["It works normally","NotSerializableException is thrown","It is automatically serialized","Only transient fields are saved"],correctAnswer:"NotSerializableException is thrown"},
            {question:"The seek() method in RandomAccessFile is used to",options:["Close the file","Move the file pointer to a specific position","Read the next byte","Write data"],correctAnswer:"Move the file pointer to a specific position"},
            {question:"System.err is used for",options:["Normal output","Error messages","Input from user","File writing"],correctAnswer:"Error messages"},
            {question:"Which of the following is a character stream?",options:["FileInputStream","BufferedReader","FileOutputStream","DataInputStream"],correctAnswer:"BufferedReader"},
            {question:"In serialization, static fields are",options:["Serialized normally","Not serialized","Always transient","Must be marked transient"],correctAnswer:"Not serialized"},
            {question:"Which class provides both read and write capabilities at any position in a file?",options:["FileReader","BufferedWriter","RandomAccessFile","PrintWriter"],correctAnswer:"RandomAccessFile"},
            {question:"try-with-resources automatically calls which method on resources?",options:["flush()","close()","reset()","delete()"],correctAnswer:"close()"},
            {question:"File class in java.io represents",options:["Actual file content","Pathname (abstract representation)","Only directories","Only binary files"],correctAnswer:"Pathname (abstract representation)"},
            {question:"For best performance when reading large text files, use",options:["FileReader directly","BufferedReader wrapping FileReader","FileInputStream","RandomAccessFile"],correctAnswer:"BufferedReader wrapping FileReader"},
            {question:"Externalizable interface is used when",options:["Default serialization is sufficient","Full control over serialization process is needed","Only primitive data is stored","No serialization is required"],correctAnswer:"Full control over serialization process is needed"},
            {question:"Which method is used to write a complete object to a file?",options:["writeObject()","write()","printObject()","serialize()"],correctAnswer:"writeObject()"},
            {question:"The main advantage of character streams over byte streams is",options:["Faster performance","Automatic handling of character encoding (Unicode)","Smaller memory usage","Random access support"],correctAnswer:"Automatic handling of character encoding (Unicode)"}
        ];

        let shuffledQuestions = [];
        let currentIndex = 0;
        let userAnswers = [];
        let isAnswered = [];

        function shuffleArray(array) {
            let arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function prepareShuffledQuestions() {
            shuffledQuestions = originalQuestions.map(q => {
                const shuffledOpts = shuffleArray(q.options);
                const correctIndex = shuffledOpts.indexOf(q.correctAnswer);
                return { question: q.question, options: shuffledOpts, correctIndex };
            });
        }

        function renderQuestion() {
            const q = shuffledQuestions[currentIndex];
            document.getElementById("question-counter").textContent = `${currentIndex + 1} / 30`;
            document.getElementById("question-text").textContent = q.question;
            const container = document.getElementById("options-container");
            container.innerHTML = "";
            const labels = ["A", "B", "C", "D"];
            q.options.forEach((option, idx) => {
                const btn = document.createElement("button");
                btn.className = `option-btn w-full text-left px-7 py-6 rounded-3xl border-2 border-zinc-700 bg-zinc-800 hover:border-cyan-400 transition-all flex items-start gap-4 group`;
                btn.innerHTML = `
                    <span class="w-8 h-8 flex-shrink-0 rounded-2xl bg-zinc-700 text-cyan-400 font-bold flex items-center justify-center text-lg transition-colors group-hover:bg-cyan-400 group-hover:text-white">${labels[idx]}</span>
                    <span class="text-lg leading-tight">${option}</span>
                `;
                btn.onclick = () => selectOption(idx);
                container.appendChild(btn);
            });
            updateProgress();
            updateNavigation();
            if (isAnswered[currentIndex]) showFeedback();
        }

        function selectOption(selectedIdx) {
            if (isAnswered[currentIndex]) return;
            isAnswered[currentIndex] = true;
            userAnswers[currentIndex] = selectedIdx;
            showFeedback();
            updateNavigation();
        }

        function showFeedback() {
            const q = shuffledQuestions[currentIndex];
            const container = document.getElementById("options-container");
            const buttons = container.children;
            const userChoice = userAnswers[currentIndex];
            for (let i = 0; i < buttons.length; i++) {
                const btn = buttons[i];
                if (i === q.correctIndex) {
                    btn.classList.add("correct");
                    btn.innerHTML += `<span class="ml-auto text-white text-2xl">✓</span>`;
                }
                if (i === userChoice) {
                    if (userChoice === q.correctIndex) btn.classList.add("selected-correct");
                    else {
                        btn.classList.add("selected-wrong");
                        btn.innerHTML += `<span class="ml-auto text-white text-2xl">✕</span>`;
                    }
                }
                btn.onclick = null;
                btn.style.cursor = "default";
            }
        }

        function updateProgress() {
            const progress = ((currentIndex + 1) / 30) * 100;
            document.getElementById("progress-bar").style.width = `${progress}%`;
        }

        function updateNavigation() {
            const prevBtn = document.getElementById("btn-prev");
            const nextText = document.getElementById("next-text");
            prevBtn.disabled = currentIndex === 0;
            prevBtn.style.opacity = currentIndex === 0 ? "0.4" : "1";
            nextText.textContent = currentIndex === 29 ? "Finish Quiz" : "Next";
        }

        function nextQuestion() {
            if (currentIndex < 29) {
                currentIndex++;
                renderQuestion();
            } else {
                showResults();
            }
        }

        function prevQuestion() {
            if (currentIndex > 0) {
                currentIndex--;
                renderQuestion();
            }
        }

        function calculateResults() {
            let correct = 0, incorrect = 0, skipped = 0;
            for (let i = 0; i < 30; i++) {
                if (!isAnswered[i]) skipped++;
                else if (userAnswers[i] === shuffledQuestions[i].correctIndex) correct++;
                else incorrect++;
            }
            const percentage = Math.round((correct / 30) * 100);
            return { correct, incorrect, skipped, percentage };
        }

        function showResults() {
            document.getElementById("quiz-screen").classList.add("hidden");
            const resultsScreen = document.getElementById("results-screen");
            resultsScreen.classList.remove("hidden");

            const stats = calculateResults();
            document.getElementById("score").textContent = stats.correct;
            document.getElementById("percentage").textContent = stats.percentage;
            document.getElementById("correct-count").textContent = stats.correct;
            document.getElementById("incorrect-count").textContent = stats.incorrect;
            document.getElementById("skipped-count").textContent = stats.skipped;

            const trophyEl = document.getElementById("trophy");
            trophyEl.innerHTML = stats.percentage >= 80 ? "🏆" : stats.percentage >= 60 ? "🎉" : "💾";

            let insight = stats.percentage >= 90 ? "Outstanding! You have mastered File Handling in Java." :
                          stats.percentage >= 75 ? "Excellent work! Strong understanding of streams, serialization, and RandomAccessFile." :
                          stats.percentage >= 60 ? "Good job! Review byte vs character streams and serialization concepts." :
                          "Keep practicing! Focus on streams hierarchy and try-with-resources.";
            document.getElementById("insight-text").innerHTML = insight;
        }

        function showReviewModal() {
            const modal = document.getElementById("review-modal");
            const list = document.getElementById("review-list");
            list.innerHTML = "";
            shuffledQuestions.forEach((q, i) => {
                const answered = isAnswered[i];
                const userIdx = userAnswers[i];
                const isCorrect = answered && (userIdx === q.correctIndex);
                const div = document.createElement("div");
                div.className = "border border-zinc-700 rounded-3xl p-6";
                div.innerHTML = `
                    <div class="flex items-start justify-between">
                        <div class="flex-1">
                            <div class="flex items-center gap-x-3">
                                <span class="font-mono text-xs bg-zinc-800 px-3 py-1 rounded-2xl">${i+1}</span>
                                <p class="font-medium text-white leading-tight">${q.question}</p>
                            </div>
                            <div class="mt-6 grid grid-cols-1 gap-4">
                                ${q.options.map((opt, idx) => {
                                    let statusHTML = "";
                                    if (answered && idx === userIdx) {
                                        statusHTML = isCorrect ? `<span class="text-emerald-400 text-xs font-bold">YOUR ANSWER ✓</span>` : `<span class="text-red-400 text-xs font-bold">YOUR ANSWER ✕</span>`;
                                    }
                                    if (idx === q.correctIndex) statusHTML += ` <span class="text-emerald-400 text-xs font-bold">CORRECT</span>`;
                                    return `
                                        <div class="flex justify-between items-center ${idx === q.correctIndex ? 'text-emerald-400' : 'text-zinc-300'}">
                                            <span>${String.fromCharCode(65 + idx)}. ${opt}</span>
                                            ${statusHTML}
                                        </div>
                                    `;
                                }).join("")}
                            </div>
                        </div>
                    </div>
                `;
                list.appendChild(div);
            });
            modal.classList.remove("hidden");
            modal.classList.add("flex");
        }

        function hideReviewModal() {
            const modal = document.getElementById("review-modal");
            modal.classList.add("hidden");
            modal.classList.remove("flex");
        }

        function shareResults() {
            const stats = calculateResults();
            const text = `💾 I scored ${stats.percentage}% on Quizzy Pro • Unit 6: File Handling in Java!\n\n✅ Correct: ${stats.correct} | ❌ Incorrect: ${stats.incorrect} | ⏭️ Skipped: ${stats.skipped}`;
            navigator.clipboard.writeText(text).then(() => alert("Result copied to clipboard!"));
        }

        function restartQuiz() {
            currentIndex = 0;
            userAnswers = new Array(30).fill(null);
            isAnswered = new Array(30).fill(false);
            prepareShuffledQuestions();
            document.getElementById("quiz-screen").classList.remove("hidden");
            document.getElementById("results-screen").classList.add("hidden");
            renderQuestion();
        }

        function handleKeyboard(e) {
            if (!document.getElementById("results-screen").classList.contains("hidden")) return;
            if (e.key === "ArrowRight") nextQuestion();
            if (e.key === "ArrowLeft") prevQuestion();
            if (e.key >= "1" && e.key <= "4" && !isAnswered[currentIndex]) {
                selectOption(parseInt(e.key) - 1);
            }
        }

        function startQuiz() {
            prepareShuffledQuestions();
            userAnswers = new Array(30).fill(null);
            isAnswered = new Array(30).fill(false);
            currentIndex = 0;
            renderQuestion();
            document.addEventListener("keydown", handleKeyboard);
            console.log("%c✅ Quizzy Pro • Unit 6: File Handling in Java loaded successfully!", "color:#22d3ee; font-family:monospace; font-size:13px");
        }

        window.onload = startQuiz;
    </script>
</body>
</html>
